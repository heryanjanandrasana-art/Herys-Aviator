<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS MASTER - ULTIMATE</title>
    <style>
        :root {
            --royal: #7300ff; 
            --lvl-bleu: #00d4ff;   /* 1.00 - 1.99 */
            --lvl-violet: #a335ee; /* 2.00 - 4.99 */
            --lvl-rose: #ff00ff;   /* 5.00 - 9.99 */
            --lvl-vert: #00ff88;   /* 10.00+ */
            --bg: #0a0a0a;
            --card-bg: #161616;
            --danger: #ff3e3e;
        }
        
        body {
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            font-weight: 900; color: var(--royal); font-size: 28px; 
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: -1px;
        }
        .header-title span { color: white; font-size: 12px; opacity: 0.5; }

        .engine-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        /* BLOC SAISIE (HAUT) */
        .glass-card {
            background: var(--card-bg); padding: 15px; border-radius: 15px; 
            border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input {
            background: #000; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 8px; font-size: 16px; width: 100%;
            text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--royal); box-shadow: 0 0 10px rgba(115,0,255,0.2); }

        .btn-main {
            width: 100%; background: var(--royal); color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* BOUTON SYNC */
        .btn-sync {
            width: 100%; background: transparent; color: var(--lvl-vert);
            border: 2px solid var(--lvl-vert); padding: 14px; border-radius: 12px;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,136,0.1);
        }

        /* ZONE FLUX */
        .energy-grid {
            height: 50px; display: flex; align-items: flex-end; gap: 4px;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;
        }
        .energy-bar { flex: 1; border-radius: 2px; transition: height 0.5s ease; }

        /* ZONE PREDICTION */
        .prediction-display {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 2px solid #222; text-align: center; position: relative;
        }
        #t1 { font-size: 42px; font-weight: 900; color: var(--lvl-vert); letter-spacing: 2px; margin: 5px 0; }
        #count-label { font-size: 11px; font-weight: bold; color: var(--danger); height: 15px; }

        /* HISTORIQUE */
        .history-item {
            background: #111; margin-top: 8px; padding: 10px 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--royal);
        }
        .badge-x {
            padding: 5px 12px; border-radius: 6px; font-weight: 900; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header-title">HERYS <span>MASTER ELITE</span></div>
    
    <div class="engine-container">
        <div class="glass-card">
            <label>Configuration du Signal</label>
            <div class="input-row">
                <input type="text" id="manualTime" placeholder="00:00:00" style="flex: 1.5;">
                <input type="number" id="inputX" placeholder="X.XX" step="0.01" style="flex: 1;">
            </div>
            <button class="btn-main" onclick="analyze(false)">Lancer l'Analyse</button>
        </div>

        <button class="btn-sync" onclick="analyze(true)">⚡ SYNC EXPLOSION DIRECTE ⚡</button>

        <div class="glass-card">
            <label>Flux d'Énergie du Cycle</label>
            <div id="energy-container" class="energy-grid"></div>
            <div id="cycle-status" style="text-align: center; font-size: 10px; margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="prediction-display">
            <label>Prochaine Fenêtre de Vol</label>
            <div id="t1">--:--:--</div>
            <div id="count-label"></div>
        </div>
    </div>

    <div style="width:100%; max-width:400px; margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #444; padding: 0 5px;">
            <span>LOGS RÉCENTS</span>
            <span onclick="clearHistory()" style="cursor:pointer;">EFFACER</span>
        </div>
        <div id="hist-list"></div>
    </div>

    <script>
        let nextTime = null;
        let historiqueX = JSON.parse(localStorage.getItem('herys_history')) || [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('manualTime').value = now.toTimeString().split(' ')[0];
            refreshUI();
        };

        function getPalierColor(val) {
            if (val < 2) return 'var(--lvl-bleu)';
            if (val < 5) return 'var(--lvl-violet)';
            if (val < 10) return 'var(--lvl-rose)';
            return 'var(--lvl-vert)';
        }

        function analyze(isSync) {
            const inputX = parseFloat(document.getElementById('inputX').value);
            const timeStr = document.getElementById('manualTime').value;
            if (isNaN(inputX)) return;

            let dateRef = new Date();
            if (!isSync) {
                let parts = timeStr.split(':');
                dateRef.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, parseInt(parts[2])||0, 0);
            }

            const dureeVol = Math.log(inputX) / Math.log(1.10);
            nextTime = new Date(dateRef.getTime() + (dureeVol * 1000) + 6250);
            document.getElementById('t1').innerText = nextTime.toTimeString().split(' ')[0];
            
            historiqueX.push(inputX);
            if(historiqueX.length > 10) historiqueX.shift();
            localStorage.setItem('herys_history', JSON.stringify(historiqueX));
            refreshUI();
        }

        function refreshUI() {
            const container = document.getElementById('energy-container');
            const status = document.getElementById('cycle-status');
            const hist = document.getElementById('hist-list');
            
            container.innerHTML = "";
            hist.innerHTML = "";

            historiqueX.forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'energy-bar';
                let color = getPalierColor(val);
                bar.style.backgroundColor = color;
                bar.style.boxShadow = `0 0 8px ${color}66`;
                const h = Math.min((val / 10) * 100, 100);
                bar.style.height = `${Math.max(h, 15)}%`; 
                container.appendChild(bar);
            });

            if(historiqueX.length > 0) {
                const last = historiqueX[historiqueX.length - 1];
                status.innerHTML = `ANALYSE : <span style="color:${getPalierColor(last)}">${last < 2 ? 'RÉCUPÉRATION' : 'PROFIT'}</span>`;
            }

            [...historiqueX].reverse().forEach(x => {
                const item = document.createElement('div');
                item.className = 'history-item';
                let c = getPalierColor(x);
                item.innerHTML = `
                    <span style="color:#555; font-size:11px;">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    <span class="badge-x" style="background:${c}15; color:${c}; border: 1px solid ${c}">${x.toFixed(2)}x</span>
                `;
                hist.appendChild(item);
            });
        }

        function clearHistory() {
            if(confirm("Reset ?")) {
                historiqueX = [];
                localStorage.removeItem('herys_history');
                refreshUI();
            }
        }

        setInterval(() => {
            if (!nextTime) return;
            let diff = Math.floor((nextTime - new Date()) / 1000);
            const label = document.getElementById('count-label');
            if (diff > 0) { label.innerText = `DÉCOLLAGE DANS ${diff}S`; }
            else if (diff > -5) { label.innerText = "VOL EN COURS..."; label.style.color = "var(--lvl-vert)"; }
            else { label.innerText = ""; nextTime = null; }
        }, 1000);
    </script>
</body>
</html>
