<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V7.0 - PROBABILITY ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --royal: #7300ff; --lvl-bleu: #00d4ff; --lvl-vert: #00ff88;
            --lvl-rose: #ff00ff; --bg: #050505; --card-bg: #121212; --danger: #ff2a2a;
        }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .engine-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .glass-card { background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #222; }
        
        input { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 16px; width: 100%; text-align: center; box-sizing: border-box; }
        .btn-scan { width: 100%; background: rgba(0,212,255,0.1); color: var(--lvl-bleu); border: 1px dashed var(--lvl-bleu); padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; margin: 10px 0; }
        .btn-main { width: 100%; background: linear-gradient(45deg, var(--royal), #9d4cff); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        /* Zone de Probabilité */
        .prob-badge { text-align: center; font-size: 10px; font-weight: 900; padding: 5px; border-radius: 5px; margin-bottom: 10px; display: none; }
        .high-prob { display: block; background: var(--lvl-vert); color: black; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }

        .prediction-display { background: #000; padding: 20px; border-radius: 25px; border: 2px solid #222; text-align: center; transition: 0.3s; }
        .timer-val { font-size: 32px; font-weight: 900; }
        .winrate-box { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: #888; }
        #scan-loader { display: none; font-size: 10px; color: var(--lvl-bleu); text-align: center; margin: 5px 0; }
    </style>
</head>
<body>

    <div style="font-weight: 900; color: var(--royal); font-size: 22px;">HERYS ELITE V7.0</div>
    <div style="font-size: 9px; opacity: 0.5; margin-bottom: 15px;">MOTEUR DE PROBABILITÉ AVANCÉ</div>

    <div class="engine-container">
        <div class="glass-card">
            <div id="prob-indicator" class="prob-badge">HAUTE PROBABILITÉ DÉTECTÉE</div>
            
            <label style="font-size: 10px; color: #666; font-weight: 800;">SCORE PRÉCÉDENT</label>
            <input type="number" id="inputX" placeholder="Ex: 1.56" step="0.01">
            
            <button class="btn-scan" onclick="document.getElementById('fileInput').click()">📸 SCANNER LE HASH</button>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanImage(this)">
            <div id="scan-loader">⏳ IA EN COURS...</div>

            <input type="text" id="inputHash" placeholder="Hash s'affichera ici..." style="font-size: 11px; margin-bottom: 10px;">
            <button class="btn-main" onclick="analyze()">ANALYSER LE SIGNAL</button>
            
            <div class="winrate-box">
                <div>PRÉCISION : <span id="stat-winrate" style="color:var(--lvl-vert)">0%</span></div>
                <div style="cursor:pointer; text-decoration: underline;" onclick="localStorage.clear(); location.reload();">RESET</div>
            </div>
        </div>

        <div id="pred-box" class="prediction-display">
            <div style="display: flex; justify-content: space-around;">
                <div><div style="font-size: 10px; color: var(--lvl-vert);">OBJECTIF SAFE</div><div id="t1" class="timer-val">--:--</div></div>
                <div><div style="font-size: 10px; color: var(--lvl-rose);">OBJECTIF RISK</div><div id="t2" class="timer-val">--:--</div></div>
            </div>
            <div id="conf-label" style="font-size: 11px; margin-top: 15px; font-weight: 800; color: #444;">EN ATTENTE DE SCAN</div>
        </div>
    </div>

    <script>
        let currentPrediction = null;
        let totalSignals = parseInt(localStorage.getItem('h_total')) || 0;
        let winSignals = parseInt(localStorage.getItem('h_win')) || 0;

        async function scanImage(input) {
            const loader = document.getElementById('scan-loader');
            if (input.files && input.files[0]) {
                loader.style.display = 'block';
                try {
                    const result = await Tesseract.recognize(input.files[0], 'eng');
                    const hash = result.data.text.match(/[a-fA-F0-9]{32,}/g);
                    if (hash) { document.getElementById('inputHash').value = hash[0]; loader.innerText = "✅ SCAN OK"; }
                } catch (e) { alert("Erreur de lecture"); }
                setTimeout(() => loader.style.display = 'none', 2000);
            }
        }

        function analyze() {
            const valX = parseFloat(document.getElementById('inputX').value);
            const hash = document.getElementById('inputHash').value.trim();
            if (isNaN(valX) || hash.length < 8) return;

            // Auto-Validation
            if (currentPrediction) {
                totalSignals++;
                if (valX >= currentPrediction) winSignals++;
                document.getElementById('stat-winrate').innerText = Math.round((winSignals/totalSignals)*100) + "%";
                localStorage.setItem('h_total', totalSignals); localStorage.setItem('h_win', winSignals);
            }

            // MOTEUR DE PROBABILITÉ V7.0
            const power = (parseInt(hash.substring(0, 8), 16) / 0xffffffff) * 100;
            const probIndicator = document.getElementById('prob-indicator');
            const predBox = document.getElementById('pred-box');
            
            // Logique de détection de "Haute Probabilité"
            const isHighProb = (power > 70 && valX < 2.0) || (power > 85);
            
            let targetS = isHighProb ? "1.65" : "1.25";
            let targetR = isHighProb ? "6.00" : "2.00";
            
            // Sécurité après gros score
            if (valX > 15) { targetS = "1.10"; targetR = "1.30"; }

            // UI Update
            currentPrediction = parseFloat(targetS);
            document.getElementById('t1').innerText = targetS + "X";
            document.getElementById('t2').innerText = targetR + "X";
            document.getElementById('conf-label').innerText = `INDICE DE CONFIANCE : ${Math.round(power)}%`;
            
            if (isHighProb) {
                probIndicator.className = "prob-badge high-prob";
                predBox.style.borderColor = "var(--lvl-vert)";
            } else {
                probIndicator.className = "prob-badge";
                predBox.style.borderColor = "#222";
            }
        }
    </script>
</body>
</html>
