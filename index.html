<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V35</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --sniper: #ff00ff; --flash: #00ffff; --safe: #00ff88; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); width: 100%; padding-bottom: 10px; margin-bottom: 15px; }
        .display-box { background: radial-gradient(circle, #111 0%, #000 100%); border: 2px solid var(--gold); border-radius: 20px; padding: 25px; text-align: center; width: 100%; max-width: 400px; transition: all 0.5s ease; }
        #prob { font-size: 4rem; font-weight: bold; color: var(--safe); text-shadow: 0 0 15px currentColor; }
        .input-group { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; margin-top: 15px; border: 1px solid #333; box-sizing: border-box; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--gold); color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin-top: 10px; }
        .reset-btn { background: transparent; color: #666; border: 1px solid #333; font-size: 0.7rem; margin-top: 15px; padding: 8px; width: auto; }
        #log { width: 100%; max-width: 400px; font-size: 0.75rem; color: #666; margin-top: 20px; max-height: 150px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #222; padding: 5px 0; display: flex; justify-content: space-between; }
        .blink { animation: blink-animation 0.8s steps(5, start) infinite; }
        @keyframes blink-animation { to { visibility: hidden; } }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">HERYS ELITE <span style="color:var(--gold)">V35</span></h2>
    <div id="clock" style="color:#888; font-family: monospace;">00:00:00</div>
</div>

<div class="display-box" id="main-ui">
    <div id="status-label" style="font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;">PRÊT</div>
    <div id="prob">0%</div>
    <div id="signal-text" style="font-weight:bold; color:var(--gold);">ENTREZ LE DERNIER MULTI</div>
    <div id="departure-info" style="font-size:0.75rem; color:#555; margin-top:10px;">Décollage: --:--:--</div>
</div>

<div class="input-group">
    <input type="number" id="val" placeholder="Multiplicateur (ex: 2.5)" step="0.01">
    <input type="text" id="hash" placeholder="Hash (Optionnel)">
    <button id="btn-analyze" onclick="processAnalysis()">ANALYSER</button>
</div>

<button class="reset-btn" onclick="resetSession()">EFFACER LA SESSION</button>

<div id="log"></div>

<script>
    let stagnation = 0;
    let lastBigStart = Date.now();
    let history = [];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function processAnalysis() {
        const valInput = document.getElementById('val');
        const hashInput = document.getElementById('hash');
        const val = parseFloat(valInput.value);
        const hashStr = hashInput.value.trim();
        const now = Date.now();

        if (isNaN(val)) return;

        // Calcul décollage inverse
        const flightTimeMs = Math.log(val + 1) * 8500; 
        const estStart = now - flightTimeMs;
        const startStr = new Date(estStart).toLocaleTimeString();

        if (val < 2.5) stagnation++; else { stagnation = 0; lastBigStart = estStart; }

        const timeGap = (now - lastBigStart) / 1000;
        const hashComplexity = (hashStr.match(/[a-f]/g) || []).length;

        let prob = 45;
        let signal = "ANALYSE...";
        let activeColor = "#d4af37";
        let isBlinking = false;

        if (timeGap >= 45 && timeGap <= 65 && hashComplexity > 30) {
            prob = 89.5; signal = "FLASH (50s)"; activeColor = "var(--flash)"; isBlinking = true;
        } else if (timeGap >= 170 && timeGap <= 195 && stagnation >= 10) {
            prob = 96.8; signal = "SNIPER (3min)"; activeColor = "var(--sniper)"; isBlinking = true;
        } else if (val <= 1.05) {
            prob = 99.9; signal = "SÉCURITÉ"; activeColor = "var(--safe)";
        }

        // UI Update
        document.getElementById('prob').innerText = prob.toFixed(1) + "%";
        document.getElementById('prob').style.color = activeColor;
        document.getElementById('main-ui').style.borderColor = activeColor;
        document.getElementById('signal-text').innerText = signal;
        document.getElementById('signal-text').style.color = activeColor;
        document.getElementById('departure-info').innerText = "Dernier décollage: " + startStr;
        const btn = document.getElementById('btn-analyze');
        btn.style.background = activeColor;
        if(isBlinking) btn.classList.add('blink'); else btn.classList.remove('blink');

        // Log
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span><b>${val}x</b> à ${startStr}</span> <span>${prob.toFixed(1)}%</span>`;
        document.getElementById('log').prepend(entry);

        // AUTO-RESET DES CHAMPS
        setTimeout(() => {
            valInput.value = "";
            hashInput.value = "";
            valInput.focus();
        }, 300);
    }

    function resetSession() {
        if(confirm("Effacer tout l'historique ?")) {
            document.getElementById('log').innerHTML = "";
            stagnation = 0;
            lastBigStart = Date.now();
            document.getElementById('prob').innerText = "0%";
            document.getElementById('signal-text').innerText = "SESSION RÉINITIALISÉE";
            document.getElementById('main-ui').style.borderColor = "var(--gold)";
        }
    }
</script>

</body>
</html>
