<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS PREDICTION V38.5 - FLUX DE ZONE</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #main-container {
            width: 100%;
            max-width: 450px;
            background: #0f0f0f;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        h2 {
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ffd700;
        }

        .dot-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        select {
            background: #333;
            color: white;
            border: 1px solid #00ffcc;
        }

        button {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: #ffcc00;
            box-shadow: 0 0 15px #ffd700;
        }

        #result-display {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            min-height: 60px;
            border: 1px dashed #555;
            border-radius: 8px;
            font-weight: bold;
        }

        #timer-box {
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5em;
            color: #ff3366;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="main-container">
    <h2>HERYS ANALYSE V38.5</h2>

    <div class="section">
        <span style="font-size: 0.8em; color: #888;">FORME RÉCENTE (Cliquez pour éditer)</span>
        <div class="dot-container" id="history">
            <div onclick="toggleDot(this)" class="dot" style="background:#00ff00" data-status="V">V</div>
            <div onclick="toggleDot(this)" class="dot" style="background:#00ff00" data-status="V">V</div>
            <div onclick="toggleDot(this)" class="dot" style="background:#888" data-status="N">N</div>
            <div onclick="toggleDot(this)" class="dot" style="background:#ff0000" data-status="D">D</div>
            <div onclick="toggleDot(this)" class="dot" style="background:#00ff00" data-status="V">V</div>
        </div>
    </div>

    <div class="section">
        <label>Dernier match (Zone C ou D) :</label>
        <select id="lastMatchResult">
            <option value="V">Victoire</option>
            <option value="N">Nul</option>
            <option value="D">Défaite</option>
        </select>

        <div style="margin-top:15px;">
            <input type="checkbox" id="isMovingUp" checked> 
            <label for="isMovingUp">L'équipe monte en Zone A ou B ?</label>
        </div>
    </div>

    <button onclick="genererPrediction()">Analyser le Signal</button>

    <div id="result-display">EN ATTENTE D'ANALYSE...</div>
    <div id="timer-box">00:00</div>
</div>

<script>
    let timerInterval;

    function toggleDot(el) {
        if (el.dataset.status === "V") {
            el.dataset.status = "N";
            el.style.background = "#888";
            el.innerText = "N";
        } else if (el.dataset.status === "N") {
            el.dataset.status = "D";
            el.style.background = "#ff0000";
            el.innerText = "D";
        } else {
            el.dataset.status = "V";
            el.style.background = "#00ff00";
            el.innerText = "V";
        }
    }

    function startTimer(duration) {
        clearInterval(timerInterval);
        let timer = duration, minutes, seconds;
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            document.getElementById('timer-box').textContent = minutes + ":" + seconds;
            if (--timer < 0) {
                clearInterval(timerInterval);
                document.getElementById('timer-box').textContent = "MATCH EN COURS !";
            }
        }, 1000);
    }

    function genererPrediction() {
        const lastRes = document.getElementById('lastMatchResult').value;
        const upZone = document.getElementById('isMovingUp').checked;
        const dots = document.querySelectorAll('.dot');
        const display = document.getElementById('result-display');
        
        let winCount = 0;
        dots.forEach(d => { if(d.dataset.status === "V") winCount++; });

        // Analyse de probabilité
        if (winCount >= 4) {
            display.innerHTML = "<span style='color:#ff9900'>⚠️ ALERTE SATURATION<br>Trop de victoires, l'algorithme va casser la série.</span>";
            display.style.borderColor = "#ff9900";
        } else if (lastRes === "V" && upZone) {
            display.innerHTML = "<span style='color:#00ff00; text-shadow:0 0 5px #00ff00'>🔥 SIGNAL GOLD : VICTOIRE PROBABLE 🔥<br>Flux C/D vers A/B validé.</span>";
            display.style.borderColor = "#00ff00";
        } else if (lastRes === "D") {
            display.innerHTML = "<span style='color:#ff0000'>❌ SIGNAL NÉGATIF<br>Évitez de parier sur ce match.</span>";
            display.style.borderColor = "#ff0000";
        } else {
            display.innerHTML = "<span style='color:#888'>PAS DE SIGNAL CLAIR<br>Attendre la prochaine journée.</span>";
            display.style.borderColor = "#444";
        }

        // Lancer le timer de 90 secondes pour la prochaine session
        startTimer(90);
    }
</script>

</body>
</html>
