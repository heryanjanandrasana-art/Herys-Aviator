<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V30 - QUANTUM</title>
    <style>
        :root { 
            --premium-v: #8e44ff; --neon-b: #00d2ff; --vif-g: #00ff88; --hot-p: #ff00ff; --gold: #FFD700;
            --bg: #050505; --card: #111111; --border: #222; --danger: #ff4444;
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER STATS */
        .journal-card { 
            background: #0b0b0b; border: 1px solid var(--border); border-radius: 0 0 15px 15px; 
            padding: 12px; position: fixed; top: 0; left: 10px; right: 10px; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 101; text-align: center;
        }
        .journal-card.hidden { transform: translateY(-85%); }
        .journal-stats { display: flex; justify-content: space-around; margin-top: 10px; background: #161616; padding: 10px; border-radius: 8px; }
        .stat-val { font-size: 16px; font-weight: 900; color: var(--vif-g); text-shadow: 0 0 5px var(--vif-g); }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .spacer-top { height: 45px; }

        /* MAIN DISPLAY */
        .img-card { 
            background: var(--card); border: 1px solid #1a1a1a; border-radius: 16px; 
            padding: 15px; margin-bottom: 8px; text-align: center; 
            position: relative; transition: all 0.4s ease;
        }
        
        .hybrid-box { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
        .t-val { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .conf-circle { 
            width: 75px; height: 75px; border: 5px solid var(--border); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: 900; background: radial-gradient(#111, #000);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        /* ÉTAT DES SIGNAUX */
        .strong-signal { border-color: var(--gold) !important; color: var(--gold) !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .recovery-mode { border-color: var(--danger) !important; box-shadow: 0 0 20px rgba(255, 68, 68, 0.2); }

        /* SEQUENCES R+ */
        .seq-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .seq-box { background: #161616; padding: 8px; border-radius: 8px; font-size: 9px; border: 1px solid #222; }
        .seq-val { font-weight: 900; display: block; margin-top: 4px; font-size: 12px; }

        /* CLAVIER & INPUT */
        .input-card { 
            background: var(--card); border-top: 2px solid var(--premium-v); border-radius: 25px 25px 0 0; 
            padding: 15px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-box { 
            flex: 1; background: #f0f0f0; color: #000; padding: 12px; border-radius: 10px; 
            font-weight: 900; text-align: center; font-size: 16px; border: 3px solid transparent;
        }
        .input-box.active { border-color: var(--premium-v); background: #fff; }
        
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .k { background: #222; color: #fff; border: none; padding: 14px 0; border-radius: 10px; font-weight: bold; font-size: 16px; transition: 0.1s; }
        .k:active { background: #444; transform: scale(0.95); }
        .k-fn { color: var(--neon-b); background: #2a2a2a; }
        .k-go { background: linear-gradient(45deg, var(--premium-v), var(--hot-p)); color: #fff; grid-column: span 2; font-weight: 900; }

        .hist { display: flex; gap: 6px; overflow-x: auto; padding: 10px 0; flex-direction: row-reverse; height: 35px; }
        .dot { min-width: 45px; height: 22px; font-size: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
        
        .toggle-btn { background: var(--premium-v); color: #fff; border: none; padding: 4px 15px; border-radius: 8px 8px 0 0; font-size: 10px; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

    <div class="journal-card hidden" id="jr-card">
        <div style="font-size:9px; font-weight:900; color:var(--premium-v);">CORE ANALYTICS V30</div>
        <div class="journal-stats">
            <div class="stat-item"><div class="stat-label">Scans</div><div class="stat-val" id="st-scans">0</div></div>
            <div class="stat-item"><div class="stat-label">Winrate</div><div class="stat-val" id="st-rate">0%</div></div>
        </div>
        <div style="margin-top:10px;">
            <button onclick="exportLogs()" style="background:none; border:1px solid #333; color:#888; font-size:9px; padding:5px 10px; border-radius:5px;">DOWNLOAD SESSION</button>
            <button onclick="clearAll()" style="background:none; border:1px solid #333; color:var(--danger); font-size:9px; padding:5px 10px; border-radius:5px;">RESET</button>
        </div>
        <button class="toggle-btn" onclick="document.getElementById('jr-card').classList.toggle('hidden')">📊 STATS</button>
    </div>

    <div class="spacer-top"></div>

    <div class="img-card" id="main-display">
        <div class="hybrid-box">
            <div class="target-group">
                <div style="font-size:9px; color:var(--vif-g); font-weight:bold;">CIBLE SAFE</div>
                <div class="t-val" id="t1-val" style="color:var(--vif-g);">--</div>
            </div>
            <div class="conf-circle" id="conf-circle">--</div>
            <div class="target-group">
                <div style="font-size:9px; color:var(--hot-p); font-weight:bold;">CIBLE RISK</div>
                <div class="t-val" id="t2-val" style="color:var(--hot-p);">--</div>
            </div>
        </div>
        <div id="trend-txt" style="font-size:10px; color:#888; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">EN ATTENTE DE HASH...</div>
    </div>

    <div class="img-card">
        <div style="font-size:8px; color:#555; margin-bottom:8px; text-align:left;">PROCHAINES SÉQUENCES (ESTIMATION)</div>
        <div class="seq-container" id="seq-list">
            <div class="seq-box">R+1 <span class="seq-val">--</span></div>
            <div class="seq-box">R+2 <span class="seq-val">--</span></div>
            <div class="seq-box">R+3 <span class="seq-val">--</span></div>
            <div class="seq-box">R+4 <span class="seq-val">--</span></div>
            <div class="seq-box">R+5 <span class="seq-val">--</span></div>
        </div>
    </div>

    <div class="input-card" id="main-kb">
        <div class="input-group">
            <div id="bH" class="input-box active" onclick="sF('h')">HASH</div>
            <div id="bS" class="input-box" onclick="sF('s')">SCORE</div>
        </div>
        <div class="kb">
            <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k k-fn" onclick="p('A')">A</button>
            <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k k-fn" onclick="p('B')">B</button>
            <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k k-fn" onclick="p('C')">C</button>
            <button class="k k-fn" onclick="p('D')">D</button><button class="k k-fn" onclick="p('E')">E</button><button class="k k-fn" onclick="p('F')">F</button><button class="k" onclick="p('0')">0</button>
            <button class="k" onclick="p('.')">.</button><button class="k" style="color:var(--danger)" onclick="p('DEL')">⌫</button>
            <button class="k-go" onclick="run()">LANCER L'ANALYSE</button>
        </div>
        <div id="ht" class="hist"></div>
    </div>

<script>
    let logs = JSON.parse(localStorage.getItem('h_u_v30')) || [];
    let session = { scans: 0, wins: 0, lastPred: 0 };
    let cur = 'h', vH = "", vS = "";

    // AUDIO ENGINE
    function playSound(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(type==='click'){ 
            osc.frequency.setValueAtTime(900, ctx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.05); 
            osc.start(); osc.stop(ctx.currentTime+0.05); 
        } else { 
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime+0.3); 
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.4); 
            osc.start(); osc.stop(ctx.currentTime+0.4); 
        }
    }

    function sF(m) { 
        cur = m; 
        document.getElementById('bH').classList.toggle('active', m==='h'); 
        document.getElementById('bS').classList.toggle('active', m==='s'); 
    }
    
    function p(v) {
        playSound('click');
        if(v === 'DEL') { 
            if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1); 
        } else { 
            if(cur === 'h' && vH.length < 4) { 
                vH += v; if(vH.length === 4) sF('s'); 
            } else if(cur === 's') {
                vS += v;
            }
        }
        document.getElementById('bH').innerText = vH || "HASH"; 
        document.getElementById('bS').innerText = vS || "SCORE";
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        playSound('success');
        
        const w = parseInt(vH, 16);
        const lastScore = parseFloat(vS);
        const ratio = w / 65535;

        // LOGIQUE QUANTUM ADAPTATIVE
        let safeBase = 1.25 + (ratio * 1.45);
        let riskBase = 98 / (100 - (ratio * 96));

        // Système de récupération si dernier score élevé
        if (lastScore > 8) {
            safeBase *= 0.85;
            riskBase *= 0.50;
            document.getElementById('trend-txt').innerText = "📉 PHASE DE RÉCUPÉRATION";
            document.getElementById('main-display').classList.add('recovery-mode');
        } else {
            document.getElementById('main-display').classList.remove('recovery-mode');
            document.getElementById('trend-txt').innerText = "🚀 CYCLE OPTIMAL";
        }

        // Stats Session
        if(session.lastPred > 0) {
            session.scans++;
            if(lastScore >= session.lastPred) session.wins++;
            document.getElementById('st-scans').innerText = session.scans;
            document.getElementById('st-rate').innerText = Math.floor((session.wins/session.scans)*100) + "%";
        }

        session.lastPred = safeBase;
        document.getElementById('t1-val').innerText = safeBase.toFixed(2) + "X";
        document.getElementById('t2-val').innerText = riskBase.toFixed(2) + "X";
        
        // Confiance
        let conf = Math.floor(60 + (ratio * 39));
        const circle = document.getElementById('conf-circle');
        circle.innerText = conf + "%";
        circle.classList.toggle('strong-signal', conf >= 90);

        // Séquences R+
        const seqList = document.getElementById('seq-list');
        seqList.innerHTML = "";
        for(let i=1; i<=5; i++) {
            let val = (1.15 + (Math.abs(Math.sin(w * i + lastScore)) * 7)).toFixed(2);
            let col = val > 5 ? "var(--hot-p)" : val > 2 ? "var(--premium-v)" : "var(--neon-b)";
            seqList.innerHTML += `<div class="seq-box">R+${i}<span class="seq-val" style="color:${col}">${val}X</span></div>`;
        }

        // Sauvegarde
        logs.unshift(lastScore); if(logs.length > 20) logs.pop();
        localStorage.setItem('h_u_v30', JSON.stringify(logs));
        
        vH = ""; vS = ""; uUI(); sF('h');
        document.getElementById('bH').innerText = "HASH";
        document.getElementById('bS').innerText = "SCORE";
    }

    function uUI() {
        document.getElementById('ht').innerHTML = logs.map(e => {
            let c = e >= 10 ? "var(--gold)" : (e >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            return `<div class="dot" style="background:${c}">${e.toFixed(1)}</div>`;
        }).join('');
    }

    function exportLogs() {
        const data = `HERYS V30 REPORT\nScans: ${session.scans}\nWins: ${session.wins}\nData: ${logs.join(' | ')}`;
        const blob = new Blob([data], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'session_v30.txt'; a.click();
    }

    function clearAll() { if(confirm("RESET TOTAL ?")) { localStorage.clear(); location.reload(); } }

    uUI();
</script>
</body>
</html>
