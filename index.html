<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HERYS ELITE V40 TEST</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
:root { --gold: #d4af37; --pink: #ec4899; --blue: #3b82f6; --violet: #a855f7; --bg: #0a0a0a; }

body {
    background: var(--bg);
    color: #fff;
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 450px;
    background: #161616;
    border-radius: 20px;
    padding: 20px;
}

h1 {
    text-align: center;
    color: var(--gold);
    margin-bottom: 15px;
}

label {
    font-size: 0.7rem;
    color: #aaa;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
}

button {
    width: 100%;
    padding: 15px;
    background: var(--gold);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

#display {
    text-align: center;
    font-size: 3rem;
    margin: 15px 0;
    font-weight: bold;
}

.scan-item {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    padding: 5px 0;
}

.stats {
    margin-top: 15px;
    font-size: 0.9rem;
}

</style>
</head>

<body>

<div class="container">

<h1>HERYS ELITE TEST</h1>

<div id="timeDisplay" style="text-align:center; margin-bottom:10px;"></div>

<label>SERVER SEED</label>
<input id="sSeed" placeholder="hash">

<label>C1</label>
<input id="c1" value="0">

<label>C2</label>
<input id="c2" value="0">

<label>C3</label>
<input id="c3" value="0">

<label>NONCE</label>
<input id="nonce" type="number" value="1">

<button onclick="run()">SCANNER</button>

<div id="display">---</div>

<div id="results"></div>

<div class="stats">
STATUS : <span id="status">PRÊT</span><br>
PROBA ROSE : <span id="prob">0%</span>
</div>

</div>

<script>

function updateTime(){
    document.getElementById("timeDisplay").innerText =
    new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

function calculate(s, c1, c2, c3, n){
    const combined = s + c1 + c2 + c3 + n;
    const hash = CryptoJS.SHA512(combined).toString();

    if (parseInt(hash.substring(0, 8), 16) % 33 === 0) return 1.00;

    const h = parseInt(hash.substring(0, 13), 16) / Math.pow(2, 52);
    return Math.floor((0.97 / (1 - h)) * 100) / 100;
}

function run(){

    const s = document.getElementById("sSeed").value;
    const c1 = document.getElementById("c1").value;
    const c2 = document.getElementById("c2").value;
    const c3 = document.getElementById("c3").value;
    const n = parseInt(document.getElementById("nonce").value);

    if(!s || isNaN(n)){
        alert("Remplis les champs !");
        return;
    }

    let html = "";
    let roseCount = 0;

    for(let i=1;i<=10;i++){

        const next = n + i;
        const res = calculate(s,c1,c2,c3,next);

        let color = "#3b82f6";

        if(res >= 10){
            color = "#ec4899";
            roseCount++;
        } else if(res >= 2){
            color = "#a855f7";
        }

        html += `<div class="scan-item" style="color:${color}">
            <span>Tour ${next}</span>
            <span>${res.toFixed(2)}x</span>
        </div>`;

        if(i === 1){
            const d = document.getElementById("display");
            d.innerText = res.toFixed(2) + "x";
            d.style.color = color;
        }
    }

    document.getElementById("results").innerHTML = html;

    const prob = (roseCount / 10) * 100;
    document.getElementById("prob").innerText = prob.toFixed(1) + "%";

    document.getElementById("status").innerText =
        roseCount > 0 ? "ROSE DÉTECTÉ" : "CALME";
}

</script>

</body>
</html>
