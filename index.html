<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V36 - PRO</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark: #050505; 
            --safe: #00ff88; 
            --sniper: #ff00ff;
            --flash: #00ffff;
        }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .header { text-align: center; border-bottom: 1px solid #222; width: 100%; padding-bottom: 10px; margin-bottom: 20px; }
        .version { background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        .main-display {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            border: 2px solid var(--gold);
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px var(--gold-glow);
        }

        #prob { 
            font-size: 4.5rem; 
            font-weight: 900; 
            margin: 5px 0;
            background: linear-gradient(to bottom, #fff, var(--safe));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grille des Prédictions T1 & T2 */
        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            margin-top: 15px;
        }

        .pred-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
        }

        .label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block;}
        .multi { font-size: 1.5rem; font-weight: bold; color: #fff; margin-bottom: 5px; display: block;}
        .time-slots { font-size: 0.75rem; font-family: monospace; line-height: 1.4; }

        /* Saisie */
        .control-panel { width: 100%; max-width: 380px; margin-top: 20px; }
        input {
            width: 100%;
            padding: 16px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 12px;
            box-sizing: border-box;
            text-align: center;
        }
        input:focus { border-color: var(--gold); outline: none; }

        button#analyze-btn {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        #history-log { width: 100%; max-width: 380px; margin-top: 25px; max-height: 180px; overflow-y: auto; border-top: 1px solid #222; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #111; font-size: 0.8rem; color: #666; }
        
        .blink { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .reset-link { color: #333; font-size: 0.7rem; margin-top: 25px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.1rem; letter-spacing: 2px;">HERYS ELITE <span class="version">V36</span></h1>
    <div id="live-clock" style="font-size: 0.75rem; color: #555; margin-top: 5px;">00:00:00</div>
</div>

<div class="main-display" id="main-ui">
    <div style="font-size: 0.65rem; letter-spacing: 2px; color: #666;">SCANNER ANALYTIQUE</div>
    <div id="prob">0%</div>
    <div id="signal" style="font-weight: bold; color: var(--gold);">SYSTÈME PRÊT</div>
    <div id="last-flight" style="font-size: 0.7rem; color: #444; margin-top: 10px;">Décollage : --:--:--</div>
</div>

<div class="prediction-grid">
    <div class="pred-card">
        <span class="label">Cible T1</span>
        <span id="t1-val" class="multi">--.-x</span>
        <div id="t1-time" class="time-slots">--:-- | --:--</div>
    </div>
    <div class="pred-card">
        <span class="label">Cible T2</span>
        <span id="t2-val" class="multi">--.-x</span>
        <div id="t2-time" class="time-slots">--:-- | --:--</div>
    </div>
</div>

<div class="control-panel">
    <input type="number" id="multi-input" inputmode="decimal" placeholder="Dernière cote (ex: 2.15)">
    <button id="analyze-btn" onclick="runAnalysis()">Analyser le tour</button>
</div>

<div id="history-log"></div>

<span class="reset-link" onclick="clearData()">RÉINITIALISER L'APPLICATION</span>

<script>
    let stagCount = 0;
    let lastLargeWin = Date.now();

    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    window.onload = () => {
        if(localStorage.getItem('herys_v36_log')) {
            document.getElementById('history-log').innerHTML = localStorage.getItem('herys_v36_log');
            stagCount = parseInt(localStorage.getItem('herys_v36_stag')) || 0;
            lastLargeWin = parseFloat(localStorage.getItem('herys_v36_time')) || Date.now();
        }
    };

    function runAnalysis() {
        const input = document.getElementById('multi-input');
        const val = parseFloat(input.value);
        const now = Date.now();
        if (isNaN(val) || val <= 0) return;

        const flightTime = Math.log(val + 1) * 8500;
        const takeoffTime = now - flightTime;
        const takeoffStr = new Date(takeoffTime).toLocaleTimeString();

        if (val < 2.0) stagCount++; else { stagCount = 0; lastLargeWin = takeoffTime; }

        let probability = 45.0;
        let signalLabel = "ANALYSE STABLE";
        let color = "var(--gold)";
        
        if (val <= 1.10) { probability = 98.2; signalLabel = "ZONE SÉCURISÉE"; color = "var(--safe)"; }
        else if (stagCount >= 7) { probability = 95.5; signalLabel = "MODE SNIPER"; color = "var(--sniper)"; }
        else if ((now - lastLargeWin) > 60000 && (now - lastLargeWin) < 130000) { probability = 88.4; signalLabel = "SIGNAL FLASH"; color = "var(--flash)"; }

        // Calcul des Doubles Horaires
        const t1_A = new Date(takeoffTime + 95000); 
        const t1_B = new Date(takeoffTime + 155000);
        const t2_A = new Date(takeoffTime + 280000); 
        const t2_B = new Date(takeoffTime + 360000);
        
        // Mise à jour UI
        document.getElementById('prob').innerText = probability.toFixed(1) + "%";
        document.getElementById('prob').style.color = color;
        document.getElementById('signal').innerText = signalLabel;
        document.getElementById('signal').style.color = color;
        document.getElementById('last-flight').innerText = "Décollage : " + takeoffStr;
        
        document.getElementById('t1-val').innerText = (Math.random() * (3.8 - 2.1) + 2.1).toFixed(2) + "x";
        document.getElementById('t1-time').innerHTML = 
            `<span style="color:var(--safe)">${t1_A.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><br>
             <span style="color:var(--gold)">${t1_B.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;

        document.getElementById('t2-val').innerText = (Math.random() * (12.0 - 5.1) + 5.1).toFixed(2) + "x";
        document.getElementById('t2-time').innerHTML = 
            `<span style="color:var(--sniper)">${t2_A.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><br>
             <span style="color:var(--flash)">${t2_B.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;

        const btn = document.getElementById('analyze-btn');
        btn.style.background = color;
        if(probability > 85) btn.classList.add('blink'); else btn.classList.remove('blink');

        const log = document.getElementById('history-log');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span><b>${val.toFixed(2)}x</b> @ ${takeoffStr}</span> <span>${probability}%</span>`;
        log.prepend(item);

        localStorage.setItem('herys_v36_log', log.innerHTML);
        localStorage.setItem('herys_v36_stag', stagCount);
        localStorage.setItem('herys_v36_time', lastLargeWin);

        setTimeout(() => { input.value = ""; input.focus(); }, 300);
    }

    function clearData() {
        if(confirm("Réinitialiser l'application ?")) { localStorage.clear(); location.reload(); }
    }
</script>

</body>
</html>
