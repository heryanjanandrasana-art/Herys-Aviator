<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVIATOR ANALYSEUR V4.2 - Stats Réelles</title>
    <style>
        :root { 
            --gold: #d4af37; --dark: #050505; --safe: #00ff88; --danger: #ff4444; --info: #00bfff;
        }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; width: 100%; padding: 10px 0; border-bottom: 1px solid #222; }
        .main-stats { background: rgba(26,26,26,0.8); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; width: 100%; max-width: 380px; margin-bottom: 15px; text-align: center; }
        .stat-big { font-size: 3rem; font-weight: 900; margin: 5px 0; }
        .stat-label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; }
        .input-section { width: 100%; max-width: 380px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; border-radius: 10px; color: white; font-size: 1rem; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: linear-gradient(var(--gold), #b8932f); color: black; border: none; border-radius: 10px; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 5px; width: 100%; max-width: 380px; margin-top: 10px; }
        .hist-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .signal { padding: 10px; border-radius: 10px; margin: 10px 0; font-weight: bold; text-align: center; }
        .signal.safe { background: rgba(0,255,136,0.2); color: var(--safe); }
        .signal.danger { background: rgba(255,68,68,0.2); color: var(--danger); }
        .signal.info { background: rgba(0,191,255,0.2); color: var(--info); }
        #history { max-height: 150px; overflow-y: auto; width: 100%; max-width: 380px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; }
        .log-item { font-size: 0.75rem; padding: 4px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AVIATOR ANALYSEUR <span style="color:var(--gold);">V4.2</span></h1>
        <div id="clock" style="font-size:0.8rem;color:#888;"></div>
    </div>

    <div class="main-stats">
        <div class="stat-label">Moyenne</div>
        <div id="avg-multi" class="stat-big">1.50x</div>
        <div class="stat-label">Streak sans >3x</div>
        <div id="streak" class="stat-big">0</div>
        <div class="stat-label">Variance (risque)</div>
        <div id="variance" class="stat-big">Basse</div>
    </div>

    <div class="signal" id="signal">Entrez vos crashes pour analyser</div>

    <div class="input-section">
        <input id="multi-input" type="number" step="0.01" placeholder="Ex: 1.45" inputmode="decimal">
        <button onclick="analyze()">📊 ANALYSER CRASH</button>
    </div>

    <div id="history-grid" class="history-grid"></div>
    <div id="history"></div>
    <button onclick="reset()" style="width:100%; max-width:380px; margin-top:10px; background:#666;">🔄 Réinitialiser</button>

    <script>
        let data = JSON.parse(localStorage.getItem('aviator_data_v42')) || [];
        const updateClock = () => document.getElementById('clock').textContent = new Date().toLocaleTimeString();

        function saveData() { localStorage.setItem('aviator_data_v42', JSON.stringify(data)); }

        function analyze() {
            const input = document.getElementById('multi-input');
            const val = parseFloat(input.value);
            if (isNaN(val) || val <= 0) return alert('Entrez un multi valide');

            data.push(val);
            if (data.length > 50) data.shift(); // Garde 50 derniers
            saveData();
            input.value = '';
            input.focus();
            render();
        }

        function render() {
            if (data.length === 0) return;

            // Stats réelles
            const avg = data.reduce((a,b)=>a+b,0)/data.length;
            const streak = data.slice().reverse().findIndex(x => x > 3) === -1 ? data.length : 0;
            const variance = data.reduce((a,b)=>a+Math.pow(b-avg,2),0)/data.length;
            const varLabel = variance < 0.5 ? 'Basse' : variance < 1.5 ? 'Moyenne' : 'Haute';

            document.getElementById('avg-multi').textContent = avg.toFixed(2) + 'x';
            document.getElementById('streak').textContent = streak;
            document.getElementById('variance').textContent = varLabel;

            // Signal intelligent (maths, pas magie)
            let signalClass = 'info', message;
            if (streak >= 8) { signalClass = 'safe'; message = `🔥 Streak ${streak} : Probable >3x bientôt (stat RTP)`; }
            else if (avg < 1.3) { signalClass = 'danger'; message = '⚠️ Moyenne basse : Sessions perdantes'; }
            else { message = `📈 Moyenne ${avg.toFixed(1)}x : Stable`; }

            const signalEl = document.getElementById('signal');
            signalEl.textContent = message;
            signalEl.className = `signal ${signalClass}`;

            // Grid derniers 10
            const recent = data.slice(-10).reverse();
            const grid = document.getElementById('history-grid');
            grid.innerHTML = recent.map(x => `<div class="hist-item">${x.toFixed(2)}x</div>`).join('');

            // Log complet
            const historyEl = document.getElementById('history');
            historyEl.innerHTML = data.slice(-20).map((x,i) => `<div class="log-item">${i+1}: ${x.toFixed(2)}x</div>`).join('');
        }

        function reset() {
            if (confirm('Réinitialiser stats ?')) {
                data = []; localStorage.removeItem('aviator_data_v42'); render();
            }
        }

        setInterval(updateClock, 1000);
        window.onload = () => { render(); updateClock(); document.getElementById('multi-input').focus(); };
    </script>
</body>
</html>
