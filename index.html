<!DOCTYPE html>
<html>
<head>
  <title>Herys Elite V38 - Simulateur de Séquence</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; }
    .container { max-width: 900px; margin: auto; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; }
    input, button, label { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; width: calc(100% - 25px); }
    button { cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background: #0f0; color: #000; }
    #resultTable { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #0f0; padding: 8px; text-align: center; }
    .rose { color: #ff00ff; font-weight: bold; }
    .violet { color: #bc13fe; }
    .bleu { color: #3498db; }
    .analyse_col { display: none; }
    #modeAnalyse:checked ~ #resultTable .analyse_col { display: table-cell }
    #modeAnalyse:checked ~ #resultTable th { display: table-cell }
  </style>
</head>
<body>
  <div class="container">
    <h2>🛩️ HERYS ELITE - ANALYSEUR DE CHAÎNE (V38+)</h2>
    
    <label>Dernière Server Seed connue (Vidéo) :</label>
    <input id="serverSeed" value="a6824623f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c">

    <label>Client Seed (Combinée) :</label>
    <input id="clientCombined" value="G8UjK9LmN2OpQ4RsT6UvW8XyZ0AbC3De:4rT7Y1uI3oP5aS9dF2gH6jK8lN0qW">

    <label><input type="checkbox" id="modeAnalyse"> 🧠 Mode Analyse (détails avancés)</label>

    <button onclick="simulerSequence()">🔥 GÉNÉRER LA SÉQUENCE FUTURE (10 TOURS)</button>

    <div id="status"></div>

    <table id="resultTable" style="display:none;">
      <thead>
        <tr>
          <th>Vol #</th>
          <th>Multiplicateur</th>
          <th>Couleur</th>
          <th class="analyse_col">h (probabilité)</th>
          <th class="analyse_col">Risque</th>
          <th>Hash (Preview)</th>
        </tr>
      </thead>
      <tbody id="resBody"></tbody>
    </table>

    <div id="historique" style="margin-top:20px; font-size:0.9em; color:#bc13fe; max-height:200px; overflow-y:scroll;"></div>
  </div>

  <script>
    async function sha512(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-512', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function getMultiplier(hashHex) {
      const hex13 = hashHex.slice(0, 13);
      const h = parseInt(hex13, 16) / Math.pow(2, 52);
      if (h < 0.01) return 1.00;
      const mult = 0.97 / (1 - h);
      return Math.max(1.00, Math.floor(mult * 100) / 100);
    }

    async function simulerSequence() {
      const startSeed = document.getElementById('serverSeed').value.trim();
      const clients = document.getElementById('clientCombined').value.trim();
      const resBody = document.getElementById('resBody');
      const table = document.getElementById('resultTable');
      const statusEl = document.getElementById('status');
      const historiqueEl = document.getElementById('historique');

      if (!startSeed || !clients) {
        statusEl.innerHTML = '<span style="color:#ff6b6b">⚠️ Veuillez remplir la Server Seed et le Client Seed.</span>';
        return;
      }

      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.innerText = "Calcul en cours…";

      resBody.innerHTML = "";
      table.style.display = "table";
      let currentSeed = startSeed;

      let total = 0, bleu = 0, violet = 0, rose = 0;
      let sequence = [];

      for (let i = 1; i <= 10; i++) {
        let hashTour = await sha512(`${currentSeed}:${clients}:${i}`);
        const hex13 = hashTour.slice(0, 13);
        const h = parseInt(hex13, 16) / Math.pow(2, 52);
        let mult = getMultiplier(hashTour);

        total += mult;
        if (mult < 2) bleu++;
        else if (mult < 10) violet++;
        else rose++;

        let couleurClass = mult < 2 ? 'bleu' : mult < 10 ? 'violet' : 'rose';
        let couleurNom = mult < 2 ? '🔵 BLEU' : mult < 10 ? '🟣 VIOLET' : '🌸 ROSE';

        let risque;
        if (mult < 1.3) risque = '<span style="color:#ff6b6b;font-weight:bold">⚠️ TRÈS ÉLEVÉ</span>';
        else if (mult < 1.8) risque = '<span style="color:#ffa502">⚠️ ÉLEVÉ</span>';
        else risque = '<span style="color:#2ecc71">✓ STABLE</span>';

        sequence.push({ tour: i, mult: mult, h: h, hashTour });

        resBody.innerHTML += `
          <tr>
            <td>T+${i}</td>
            <td style="font-size:1.2em"><b>${mult.toFixed(2)}x</b></td>
            <td class="${couleurClass}">${couleurNom}</td>
            <td class="analyse_col">${h.toFixed(7)}</td>
            <td class="analyse_col">${risque}</td>
            <td style="font-size:0.8em">${hashTour.slice(0,8)}...</td>
          </tr>
        `;

        currentSeed = await sha512(currentSeed);
      }

      const moyenne = total / 10;
      const pctBleu = (bleu * 100).toFixed(1);
      const pctViolet = (violet * 100).toFixed(1);
      const pctRose = (rose * 100).toFixed(1);
      const safeZone = Math.max(1.6, moyenne * 0.8).toFixed(2);

      statusEl.innerHTML = `
        Moyenne : ${moyenne.toFixed(2)}x |
        Bleus : ${pctBleu}% |
        Violets : ${pctViolet}% |
        Roses : ${pctRose}%
        <br><span style="color:#00ff00">🟢 Zone de cash-out conseillée : ${safeZone}x</span>
      `;

      // Sauvegarde dans l'historique (localStorage)
      let historique = JSON.parse(localStorage.getItem('herysEliteV38_sequences') || '[]');
      historique.push({
        timestamp: Date.now(),
        startSeed: startSeed,
        clients: clients,
        moyenne: moyenne,
        sequence: sequence.map(s => s.mult)
      });
      localStorage.setItem('herysEliteV38_sequences', JSON.stringify(historique));

      // Affichage simplifié de l'historique
      historiqueEl.innerHTML = '';
      for (let i = historique.length - 1; i >= 0 && i >= historique.length - 5; i--) {
        const h = historique[i];
        const date = new Date(h.timestamp).toLocaleString('fr');
        historiqueEl.innerHTML += `<div><b>${date}</b> : moyenne = ${h.moyenne.toFixed(2)}x</div>`;
      }

      btn.disabled = false;
      btn.innerText = "🔥 GÉNÉRER LA SÉQUENCE FUTURE (10 TOURS)";
    }
  </script>
</body>
</html>
