<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS MASTER ELITE - ULTIMATE</title>
    <style>
        :root {
            --royal: #7300ff; --lvl-bleu: #00d4ff; --lvl-violet: #a335ee;
            --lvl-rose: #ff00ff; --lvl-vert: #00ff88; --bg: #050505; --card-bg: #121212;
            --danger: #ff4444;
        }
        body {
            background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .engine-container { width: 100%; max-width: 420px; }
        
        /* MODULE DE SAISIE */
        .glass-card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .display-input { 
            background: #000; padding: 15px; border-radius: 12px; font-size: 28px; 
            text-align: center; font-weight: 900; border: 1px solid var(--royal); margin-bottom: 12px;
            color: white; text-shadow: 0 0 10px var(--royal); min-height: 40px;
        }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 18px; 
            border-radius: 12px; font-weight: bold; font-size: 20px; transition: 0.2s;
        }
        .numpad button:active { background: var(--royal); transform: scale(0.95); }
        .btn-scan { 
            grid-column: span 3; background: linear-gradient(45deg, var(--royal), #ff00ff); 
            border: none; color: white; padding: 18px; border-radius: 12px; font-weight: 900; 
            text-transform: uppercase; margin-top: 10px; cursor: pointer;
        }

        /* SYSTÈME DE TIROIRS */
        .drawer-label { font-size: 11px; color: #555; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        #prediction-drawer { display: flex; flex-direction: column; gap: 12px; }
        
        .prediction-card {
            background: linear-gradient(145deg, #18181b, #09090b);
            border-left: 5px solid var(--royal); border-radius: 15px; padding: 15px;
            animation: slideIn 0.3s ease-out; border: 1px solid #222; position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* BOUTON EFFACER DANS LE TIROIR */
        .btn-clear-card {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 68, 68, 0.1); color: var(--danger);
            border: 1px solid var(--danger); border-radius: 50%;
            width: 26px; height: 26px; font-size: 16px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .card-header { font-size: 11px; color: #666; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 10px; display: flex; }
        .card-body { display: flex; justify-content: space-between; align-items: center; }
        
        .sig-unit { text-align: center; flex: 1; }
        .sig-unit span { display: block; font-family: monospace; font-size: 15px; color: #aaa; }
        .sig-unit b { display: block; font-size: 22px; margin-top: 4px; }
        .divider { width: 1px; height: 35px; background: #333; margin: 0 10px; }
        
        .t1-style { color: var(--lvl-vert); }
        .t2-style { color: var(--lvl-rose); }
        .input-badge { color: var(--lvl-bleu); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color:var(--royal); font-size:24px;">HERYS MASTER ELITE</div>
        <div style="font-size:10px; opacity:0.6;">SENSORY & DRAWER ENGINE V4.5</div>
    </div>

    <div class="engine-container">
        <div class="glass-card">
            <div class="display-input" id="display-input">0.00</div>
            <div class="numpad">
                <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
                <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
                <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
                <button onclick="press('.')">.</button><button onclick="press('0')">0</button><button onclick="del()">⌫</button>
                <button class="btn-scan" onclick="launchScan()">LANCER LE SCANNER</button>
            </div>
        </div>

        <div class="drawer-label">📂 Tiroirs de prédiction actifs</div>
        <div id="prediction-drawer"></div>
    </div>

    <script>
        let currentEntry = "";
        let drawers = [];

        // Générateur de Bip (1 seconde)
        function playBip() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1);
            } catch(e) { console.log("Audio error"); }
        }

        function press(n) { if(currentEntry.length < 5) currentEntry += n; updateDisplay(); }
        function del() { currentEntry = currentEntry.slice(0, -1); updateDisplay(); }
        function updateDisplay() { document.getElementById('display-input').innerText = currentEntry || "0.00"; }

        function launchScan() {
            let valX = parseFloat(currentEntry);
            if(isNaN(valX)) return;

            const now = new Date();
            const timeT1 = new Date(now.getTime() + 64000);
            const timeT2 = new Date(now.getTime() + 128000);

            // Patterns de multiplicateurs
            let multT1 = (valX < 2.0) ? "9.09X" : "7.13X";
            let multT2 = (valX < 2.0) ? "19.59X" : "15.00X";

            const newDrawer = {
                id: Date.now(),
                input: valX,
                t1Time: timeT1, t2Time: timeT2,
                t1Mult: multT1, t2Mult: multT2,
                t1Alerted: false, t2Alerted: false
            };

            drawers.unshift(newDrawer);
            renderDrawers();
            currentEntry = ""; updateDisplay();
        }

        function removeDrawer(id) {
            drawers = drawers.filter(d => d.id !== id);
            renderDrawers();
        }

        function renderDrawers() {
            const container = document.getElementById('prediction-drawer');
            container.innerHTML = drawers.map(d => `
                <div class="prediction-card">
                    <button class="btn-clear-card" onclick="removeDrawer(${d.id})">×</button>
                    <div class="card-header">
                        <span>SCAN : <b class="input-badge">${d.input.toFixed(2)}X</b></span>
                    </div>
                    <div class="card-body">
                        <div class="sig-unit">
                            <span>${d.t1Time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>
                            <b class="t1-style">${d.t1Mult}</b>
                        </div>
                        <div class="divider"></div>
                        <div class="sig-unit">
                            <span>${d.t2Time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>
                            <b class="t2-style">${d.t2Mult}</b>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Surveillance pour le Bip (5s avant)
        setInterval(() => {
            const nowTime = new Date().getTime();
            drawers.forEach(d => {
                if(!d.t1Alerted && (d.t1Time.getTime() - nowTime) <= 5000 && (d.t1Time.getTime() - nowTime) > 0) {
                    playBip(); d.t1Alerted = true;
                }
                if(!d.t2Alerted && (d.t2Time.getTime() - nowTime) <= 5000 && (d.t2Time.getTime() - nowTime) > 0) {
                    playBip(); d.t2Alerted = true;
                }
            });
        }, 1000);
    </script>
</body>
</html>
