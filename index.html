<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V35.9 - COLOR MATCH</title>
    <style>
        :root { 
            --blue: #00d2ff;     /* 1 - 1.99 */
            --purple: #8e44ff;   /* 2 - 4.99 */
            --rose: #ff00ff;     /* 5 - 49.99 */
            --green: #00ff88;    /* 50+ */
            --bg: #050505; --card: #111111; --border: #222; --danger: #ff4444; --warning: #ff9900;
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 10px; height: 100vh; overflow: hidden; }
        
        .flash-rose { background: rgba(255, 0, 255, 0.2) !important; }
        .header-card { background: #0b0b0b; border: 1px solid var(--border); border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-around; }
        .stat-box { text-align: center; }
        .stat-v { font-size: 13px; font-weight: 900; color: var(--green); display: block; }
        .stat-l { font-size: 7px; color: #666; text-transform: uppercase; }

        .img-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 16px; padding: 15px; margin-bottom: 8px; text-align: center; }
        .t-val { font-size: 32px; font-weight: 900; line-height: 1.2; transition: 0.3s; }
        .conf-circle { width: 85px; height: 85px; border: 6px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; margin: 0 auto; }

        .seq-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .seq-box { background: #161616; padding: 8px; border-radius: 8px; font-size: 9px; border: 1px solid #222; text-align: center; }
        .seq-val { font-weight: 900; display: block; margin-top: 4px; font-size: 11px; }

        .input-card { 
            background: var(--card); border-top: 3px solid var(--purple); border-radius: 24px 24px 0 0; padding: 12px; 
            position: fixed; bottom: 0; left: 0; right: 0; transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        .input-card.hidden { transform: translateY(calc(100% - 55px)); }
        
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .k { background: #222; color: #fff; border: none; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .k-go { background: linear-gradient(45deg, var(--purple), var(--rose)); color: #fff; grid-column: span 2; font-weight: 900; }

        .hist { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; flex-direction: row-reverse; height: 40px; }
        .dot { min-width: 45px; height: 22px; font-size: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
        
        .input-box { flex:1; background:#1a1a1a; padding:12px; border-radius:10px; text-align:center; font-weight:900; border: 2px solid #333; }
        .active-in { border-color: var(--purple) !important; background: #222; }
    </style>
</head>
<body id="main-body">

    <div class="header-card">
        <div class="stat-box"><span class="stat-l">Shield</span><span class="stat-v" id="shield-status">READY</span></div>
        <div class="stat-box"><span class="stat-l">Rose Gap</span><span class="stat-v" id="time-val" style="color:#FFD700">00:00</span></div>
        <div class="stat-box"><span class="stat-l">Prob. Status</span><span class="stat-v" id="prob-rose" style="color:var(--blue)">SCANNING</span></div>
    </div>

    <div class="img-card">
        <div style="display:flex; justify-content:space-around; align-items:center;">
            <div style="flex:1"><div class="stat-l">PREDICT V</div><div class="t-val" id="t1-val" style="color:#666;">--</div></div>
            <div style="flex:1"><div class="conf-circle" id="conf-circle">--</div></div>
            <div style="flex:1"><div class="stat-l">PREDICT R</div><div class="t-val" id="t2-val" style="color:#666;">--</div></div>
        </div>
        <div id="msg-txt" style="font-size:10px; color:#555; font-weight:900; margin-top:10px; letter-spacing:1px; text-transform:uppercase;">Waiting for Hash & Score</div>
    </div>

    <div class="seq-container" id="seq-list">
        <div class="seq-box">NEXT <span class="seq-val">--</span></div>
        <div class="seq-box">+2 <span class="seq-val">--</span></div>
        <div class="seq-box">+3 <span class="seq-val">--</span></div>
        <div class="seq-box">+4 <span class="seq-val">--</span></div>
        <div class="seq-box">+5 <span class="seq-val">--</span></div>
    </div>

    <div id="ht" class="hist"></div>

    <div class="input-card" id="kb-panel">
        <div style="width:40px; height:4px; background:#444; margin:0 auto 10px; border-radius:2px;" onclick="toggleKB()"></div>
        <div style="display: flex; gap: 8px;">
            <div id="bH" class="input-box active-in" onclick="showKB('h')">HASH</div>
            <div id="bS" class="input-box" onclick="showKB('s')">LAST X</div>
        </div>
        <div class="kb">
            <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k" onclick="p('A')">A</button>
            <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k" onclick="p('B')">B</button>
            <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k" onclick="p('C')">C</button>
            <button class="k" style="color:var(--danger)" onclick="fullReset()">C</button><button class="k" onclick="p('0')">0</button><button class="k" onclick="p('.')">.</button><button class="k" onclick="p('DEL')">⌫</button>
            <button class="k" onclick="p('D')">D</button><button class="k" onclick="p('E')">E</button><button class="k" onclick="p('F')">F</button>
            <button class="k-go" onclick="run()">ANALYSER LE TOUR</button>
        </div>
    </div>

<script>
    let logs = [];
    let cur = 'h', vH = "", vS = "";
    let lastRoseTime = null;

    function getTargetColor(val) {
        if (val < 2.00) return 'var(--blue)';    // 1 - 1.99
        if (val < 5.00) return 'var(--purple)';  // 2 - 4.99
        if (val < 50.00) return 'var(--rose)';   // 5 - 49.99
        return 'var(--green)';                   // 50+
    }

    function toggleKB() { document.getElementById('kb-panel').classList.toggle('hidden'); }
    function showKB(m) { document.getElementById('kb-panel').classList.remove('hidden'); cur = m; uUI(); }
    function fullReset() { vH = ""; vS = ""; cur = 'h'; uUI(); }

    function p(v) {
        if(v === 'DEL') { 
            if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1);
            if(vS==="" && cur==='s') cur='h';
        } else { 
            if(cur === 'h' && vH.length < 4) { vH += v; if(vH.length === 4) cur = 's'; }
            else if(cur === 's') vS += v;
        }
        uUI();
    }

    function uUI() {
        document.getElementById('bH').innerText = vH || "HASH";
        document.getElementById('bS').innerText = vS || "LAST X";
        document.getElementById('bH').classList.toggle('active-in', cur === 'h');
        document.getElementById('bS').classList.toggle('active-in', cur === 's');
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        document.getElementById('kb-panel').classList.add('hidden');
        const now = Date.now();
        const score = parseFloat(vS);
        const seed = parseInt(vH.substring(0,4), 16);
        const ratio = seed / 65535;

        // Calcul Mathématique
        let vT = 1.35 + (ratio * 2.8);
        let eT = 110 / (110 - (ratio * 106));

        // Anti-Aspiration
        if (score < 1.15) {
            vT *= 0.7; eT *= 0.4;
            document.getElementById('shield-status').innerText = "CLEANING";
            document.getElementById('shield-status').style.color = "var(--warning)";
        } else {
            document.getElementById('shield-status').innerText = "ACTIVE";
            document.getElementById('shield-status').style.color = "var(--green)";
        }

        // Coloration des cibles principales
        const t1 = document.getElementById('t1-val');
        const t2 = document.getElementById('t2-val');
        t1.innerText = vT.toFixed(2) + "X";
        t1.style.color = getTargetColor(vT);
        t2.innerText = eT.toFixed(2) + "X";
        t2.style.color = getTargetColor(eT);

        // Flash si Rose ou Vert détecté
        if (eT >= 5.00) {
            document.getElementById('main-body').classList.add('flash-rose');
            setTimeout(() => document.getElementById('main-body').classList.remove('flash-rose'), 800);
            document.getElementById('msg-txt').innerText = eT >= 50 ? "JACKPOT SIGNAL ⚡" : "ELITE ROSE SIGNAL 🔥";
            document.getElementById('msg-txt').style.color = getTargetColor(eT);
        }

        document.getElementById('conf-circle').innerText = Math.floor(65 + ratio * 34) + "%";
        document.getElementById('conf-circle').style.borderColor = getTargetColor(eT);

        // Séquence Future
        const seq = document.getElementById('seq-list');
        seq.innerHTML = "";
        for(let i=1; i<=5; i++){
            let fVal = (1.1 + (Math.abs(Math.sin(seed * i + score)) * 60));
            if(score < 1.15) fVal *= 0.35;
            let fCol = getTargetColor(fVal);
            seq.innerHTML += `<div class="seq-box">${i==1?'NEXT':'+'+i}<span class="seq-val" style="color:${fCol}">${fVal.toFixed(2)}X</span></div>`;
        }

        if(score >= 5) lastRoseTime = now; // On track à partir de 5x

        logs.unshift(score);
        document.getElementById('ht').innerHTML = logs.slice(0,15).map(e => {
            return `<div class="dot" style="background:${getTargetColor(e)}">${e.toFixed(1)}</div>`;
        }).join('');

        vH = ""; vS = ""; cur = 'h'; uUI();
        setTimeout(() => { if(document.getElementById('kb-panel').classList.contains('hidden')) toggleKB(); }, 3500);
    }

    setInterval(() => {
        if(lastRoseTime) {
            const diff = Math.floor((new Date() - lastRoseTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('time-val').innerText = m + ":" + s;
        }
    }, 1000);
</script>
</body>
</html>
