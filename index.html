<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V43.1 - STUDIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #d4af37; --pink: #ec4899; --blue: #3b82f6; --violet: #a855f7; --bg: #0d0d0d; --red: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #1a1a1a; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 1.1rem; text-align: center; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; font-size: 0.65rem; color: #888; margin: 10px 0 5px 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; margin-bottom: 5px; font-family: monospace; outline: none; }
        input:focus { border-color: var(--gold); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; color: #000; font-size: 1rem; transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        #display { font-size: 3.5rem; text-align: center; margin: 15px 0; font-weight: 900; color: var(--gold); transition: 0.5s; }
        #scannerBox { margin-top: 15px; background: #000; border-radius: 15px; padding: 12px; border: 1px solid #333; display: none; }
        .scan-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.9rem; font-family: monospace; }
        .check-status { font-size: 0.7rem; text-align: center; margin-top: -10px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>HERYS ELITE V43.1</h1>
    
    <label>SERVER SEED (EN CLAIR / UNHASHED)</label>
    <input type="text" id="sSeed" placeholder="Coller la Seed révélée...">

    <label>CLIENT SEED</label>
    <input type="text" id="cSeed" placeholder="Coller la Client Seed...">

    <div class="grid-2">
        <div>
            <label>NONCE (DU TOUR)</label>
            <input type="number" id="nonce" placeholder="Ex: 8101873">
        </div>
        <div>
            <label>RTP (COSMOS)</label>
            <select id="rtpVal">
                <option value="0.97">0.97 (STD)</option>
                <option value="0.98">0.98 (MID)</option>
                <option value="0.99">0.99 (MAX)</option>
            </select>
        </div>
    </div>

    <label>RÉSULTAT RÉEL DU TOUR (VÉRIFICATION)</label>
    <input type="number" id="checkVal" step="0.01" placeholder="Ex: 1.53">
    
    <button onclick="runCosmosPredictor()">VÉRIFIER & PRÉDIRE</button>

    <div id="display">---</div>
    <div id="checkStatus" class="check-status"></div>

    <div id="scannerBox">
        <div style="color:var(--gold); font-size:0.75rem; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:5px;">SÉQUENCE ANALYSÉE (N+1 à N+10) :</div>
        <div id="scanList"></div>
    </div>
</div>

<script>
    function calculateCosmos(serverSeed, clientSeed, nonce, rtp) {
        const combined = serverSeed.trim() + clientSeed.trim() + nonce.toString();
        const hash = CryptoJS.SHA512(combined).toString();
        if (parseInt(hash.substring(0, 8), 16) % 33 === 0) return 1.00;
        const h = parseInt(hash.substring(0, 13), 16) / Math.pow(2, 52);
        let crashPoint = Math.floor((rtp / (1 - h)) * 100) / 100;
        return crashPoint > 250 ? 250 : crashPoint; // Cap visuel à 250x
    }

    function runCosmosPredictor() {
        const s = document.getElementById('sSeed').value;
        const c = document.getElementById('cSeed').value;
        const n = parseInt(document.getElementById('nonce').value);
        const rtp = parseFloat(document.getElementById('rtpVal').value);
        const check = parseFloat(document.getElementById('checkVal').value);

        if (!s || isNaN(n)) return alert("Veuillez remplir les champs Seed et Nonce.");

        // 1. VÉRIFICATION DU TOUR ACTUEL (N)
        const resNow = calculateCosmos(s, c, n, rtp);
        const statusDiv = document.getElementById('checkStatus');
        const displayDiv = document.getElementById('display');

        if (!isNaN(check)) {
            const diff = Math.abs(check - resNow);
            if (diff < 0.05) {
                statusDiv.innerText = "COHÉRENCE OK (Écart: " + diff.toFixed(3) + ")";
                statusDiv.style.color = "#00ff00";
            } else {
                statusDiv.innerText = "ALERTE : DÉCALAGE DÉTECTÉ ! (Vérifiez la Seed)";
                statusDiv.style.color = "var(--red)";
            }
        }

        // 2. PRÉDICTION DU FUTUR (N+1 à N+10)
        document.getElementById('scannerBox').style.display = "block";
        let scanHTML = "";

        for (let i = 1; i <= 10; i++) {
            const nextN = n + i;
            const res = calculateCosmos(s, c, nextN, rtp);
            let color = "var(--blue)";
            if (res >= 10) color = "var(--pink)";
            else if (res >= 2) color = "var(--violet)";

            scanHTML += `<div class="scan-item" style="color:${color}">
                <span>TOUR ${nextN}</span>
                <span><b>${res >= 250 ? "250x+" : res.toFixed(2) + "x"}</b></span>
            </div>`;

            if (i === 1) {
                displayDiv.innerText = res >= 250 ? "250x+" : res.toFixed(2) + "x";
                displayDiv.style.color = color;
            }
        }
        document.getElementById('scanList').innerHTML = scanHTML;
    }
</script>

</body>
</html>
