<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V40 - PLATINUM</title>
    <style>
        :root {
            --bg-dark: #050508;
            --panel: rgba(20, 20, 30, 0.8);
            --gold: #D4AF37;
            --violet: #8A2BE2;
            --rose: #FF1493;
            --text-main: #E0E0FF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #appContent {
            display: block; 
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h2 {
            color: var(--gold);
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        .version {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
            display: block;
        }

        #display {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 25px 0;
            min-height: 60px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.8rem;
            color: #9CA3B7;
            margin-left: 10px;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0F0F1A;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        .btn-predict {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-reset {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .btn-reset:hover { opacity: 1; background: rgba(255, 68, 68, 0.1); }

        .history-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 0;
            scrollbar-width: none;
        }

        .badge {
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 45px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="appContent">
    <div class="glass-card">
        <h2>HERYS ELITE</h2>
        <span class="version">V40.0 PLATINUM MASTER</span>
        
        <div id="display" style="color: #444;">PRÊT</div>
        
        <div class="input-group">
            <label>DERNIER MULTIPLICATEUR :</label>
            <input type="number" step="0.01" id="valInput" placeholder="0.00" inputmode="decimal">
        </div>
        
        <button class="btn-predict" onclick="analyzeData()">ANALYSER CYCLE</button>

        <div class="history-container">
            <label>HISTORIQUE RÉCENT :</label>
            <div class="history-list" id="history"></div>
            <button class="btn-reset" onclick="resetApp()">RÉINITIALISER TOUT</button>
        </div>
    </div>
</div>

<script>
    let history = [];
    const display = document.getElementById('display');
    const input = document.getElementById('valInput');
    const historyBox = document.getElementById('history');

    function categorize(v) {
        if (v >= 2 && v < 5) return "VIOLET";
        if (v >= 5) return "ROSE";
        return "BAS";
    }

    function analyzeData() {
        const val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) return;

        history.push(val);
        updateUI();
        makePrediction();
        input.value = "";
        input.focus();
    }

    function makePrediction() {
        if (history.length < 5) {
            display.innerText = "DATA INSUFFISANTE (" + history.length + "/5)";
            display.style.color = "#444";
            return;
        }

        let transitions = { "BAS": { "VIOLET": 0, "ROSE": 0 }, "VIOLET": { "VIOLET": 0, "ROSE": 0 }, "ROSE": { "VIOLET": 0, "ROSE": 0 } };
        
        for (let i = 0; i < history.length - 1; i++) {
            let current = categorize(history[i]);
            let next = categorize(history[i+1]);
            if (transitions[current] && next !== "BAS") {
                transitions[current][next]++;
            }
        }

        const lastCat = categorize(history[history.length - 1]);
        const nextStats = transitions[lastCat];

        if (nextStats.ROSE >= nextStats.VIOLET && nextStats.ROSE > 0) {
            display.innerText = "ROSE PROBABLE";
            display.style.color = "#FF1493";
        } else if (nextStats.VIOLET > 0) {
            display.innerText = "VIOLET PROBABLE";
            display.style.color = "#8A2BE2";
        } else {
            display.innerText = "CYCLE INSTABLE";
            display.style.color = "#D4AF37";
        }
        display.style.textShadow = `0 0 20px ${display.style.color}`;
    }

    function updateUI() {
        historyBox.innerHTML = "";
        const fragment = document.createDocumentFragment();
        history.slice(-6).forEach(h => {
            const span = document.createElement('span');
            span.className = 'badge';
            const cat = categorize(h);
            span.style.background = cat === "VIOLET" ? "#8A2BE2" : (cat === "ROSE" ? "#FF1493" : "#333");
            span.textContent = h.toFixed(2);
            fragment.appendChild(span);
        });
        historyBox.appendChild(fragment);
    }

    function resetApp() {
        history = [];
        historyBox.innerHTML = "";
        display.innerText = "PRÊT";
        display.style.color = "#444";
        display.style.textShadow = "none";
        input.value = "";
    }
</script>

</body>
</html>
