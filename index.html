<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Herys PRO-INTERFACE V40</title>
    <style>
        :root { --bg: #0d1117; --neon-gold: #ffcf40; --neon-green: #00ff88; --accent: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 10px; }
        .app-container { width: 100%; max-width: 420px; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; background: #161b22; }
        
        .timer-box { font-size: 2em; text-align: center; color: var(--neon-gold); font-family: monospace; margin-bottom: 10px; border: 1px solid #444; border-radius: 8px; padding: 5px; }
        
        .jackpot-light { height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 15px; background: #000; transition: 0.5s; }
        .blink { animation: blinker 0.8s linear infinite; background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        @keyframes blinker { 50% { opacity: 0.5; } }

        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #ff4444; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="timer-box" id="timer">02:00</div>
    
    <div id="signal" class="jackpot-light">SCANNING ENGLISH LEAGUE...</div>

    <div style="background: #0d1117; padding: 10px; border-radius: 8px;">
        <label style="font-size: 0.8em; color: var(--neon-gold);">RÉSULTAT PRÉCÉDENT :</label>
        <select id="lastRes" onchange="process()">
            <option value="2">Match Normal (2-3 buts)</option>
            <option value="4">Score Fleuve (4+ buts)</option>
            <option value="1">Petit Score (0-1 but)</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <div style="text-align: center; background: #1c2128; padding: 10px; border-radius: 5px;">
            <span style="font-size: 0.7em;">U1.5 PROB</span><br>
            <b id="u15" style="color: var(--neon-green);">40%</b>
        </div>
        <div style="text-align: center; background: #1c2128; padding: 10px; border-radius: 5px;">
            <span style="font-size: 0.7em;">REVERSION</span><br>
            <b style="color: var(--neon-gold);">91%</b>
        </div>
    </div>

    <button class="btn-reset" onclick="resetTimer()">RESET TIMER (NOUVEAU MATCH)</button>
    <div style="text-align: center; font-size: 0.6em; margin-top: 15px; opacity: 0.5;">ANJA - HERYS ENGINE V40</div>
</div>

<script>
    let timeLeft = 120;
    const timerDisplay = document.getElementById('timer');

    function resetTimer() { timeLeft = 120; }

    setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
    }, 1000);

    function process() {
        const val = document.getElementById('lastRes').value;
        const sig = document.getElementById('signal');
        const u15Disp = document.getElementById('u15');

        if (val == "4") {
            u15Disp.innerText = "48.2%";
            sig.innerText = "JACKPOT: MISEZ UNDER 1.5";
            sig.classList.add('blink');
        } else {
            u15Disp.innerText = "32.1%";
            sig.innerText = "ATTENTE VARIANCE...";
            sig.classList.remove('blink');
        }
    }
</script>
</body>
</html>
