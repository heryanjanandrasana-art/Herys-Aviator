<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V12.5 - CORE DECODER</title>
    <style>
        :root {
            --neon: #00f2ff;
            --rose: #ff00ff;
            --vert: #00ff88;
            --violet: #9d4cff;
            --bleu: #00d4ff;
            --bg: #050505;
            --panel: #0d0d0d;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .terminal-header {
            text-align: center;
            padding: 15px;
            border: 1px solid #222;
            border-radius: 15px 15px 0 0;
            background: var(--panel);
        }

        .scanner-area {
            background: #000;
            border: 1px solid #333;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 15px 15px;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: var(--neon);
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px var(--neon);
            animation: moveScan 4s linear infinite;
        }

        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }

        .input-box { margin-bottom: 15px; }
        label { font-size: 9px; color: #555; display: block; margin-bottom: 5px; letter-spacing: 1px; }

        input, textarea {
            width: 100%;
            background: #080808;
            border: 1px solid #333;
            color: var(--neon);
            padding: 12px;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        .btn-analyze {
            width: 100%;
            padding: 18px;
            border: none;
            background: linear-gradient(45deg, #4400aa, #0077ff);
            color: white;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 119, 255, 0.3);
            margin-bottom: 10px;
        }

        .prediction-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .pred-card {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
        }

        .val { display: block; font-size: 24px; font-weight: 900; margin-top: 5px; }

        .status-badge {
            margin-top: 15px;
            padding: 10px;
            background: #111;
            border-radius: 8px;
            font-size: 10px;
            border-left: 4px solid var(--neon);
        }

        .history-strip {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }

        .dot { width: 30px; height: 18px; border-radius: 3px; font-size: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: black; }

        #debug { font-size: 8px; color: #00ff88; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <div class="terminal-header">
            <h2 style="color: var(--neon); margin: 0; font-size: 18px;">HERYS ELITE V12.5</h2>
            <div style="font-size: 8px; color: #555;">SYSTEM: SEED DECODER & WHALE TRACKER</div>
        </div>

        <div class="scanner-area">
            <div class="scan-line"></div>
            
            <div class="input-box">
                <label>SHA512 HASH (PROVABLY FAIR)</label>
                <textarea id="hashInput" rows="2" placeholder="Collez le hash complet du serveur..."></textarea>
            </div>

            <div class="input-box">
                <label>SCORE DU ROUND PRÉCÉDENT</label>
                <input type="number" id="lastScore" placeholder="ex: 129.01" step="0.01">
            </div>

            <button class="btn-analyze" onclick="processCore()">Exécuter l'Analyse</button>
            
            <div id="debug">> SYSTEM_IDLE: WAITING_FOR_DATA...</div>
        </div>

        <div class="status-badge" id="sequence-info">
            SÉQUENCE : ANALYSE DES FLUX NÉCESSAIRE
        </div>

        <div class="prediction-matrix">
            <div class="pred-card">
                <label style="color: white;">CIBLE SAFE</label>
                <span id="safe-val" class="val" style="color: var(--neon);">--</span>
            </div>
            <div class="pred-card">
                <label style="color: var(--rose);">CIBLE ROSE (5x+)</label>
                <span id="whale-val" class="val" style="color: var(--rose);">--</span>
            </div>
        </div>

        <div id="history" class="history-strip"></div>
    </div>

    <script>
        let logs = [];

        function processCore() {
            const hash = document.getElementById('hashInput').value.trim();
            const last = parseFloat(document.getElementById('lastScore').value);
            const debug = document.getElementById('debug');
            const seqInfo = document.getElementById('sequence-info');

            if(!hash || isNaN(last)) {
                alert("Veuillez remplir le Hash et le Score.");
                return;
            }

            logs.unshift(last);
            if(logs.length > 6) logs.pop();

            // --- LOGIQUE DE DÉCODAGE DES CODES CACHÉS ---
            // On analyse le poids hexadécimal du premier segment du hash
            const hexFrag = hash.substring(0, 4);
            const weight = parseInt(hexFrag, 16);
            const firstChar = hash.charAt(0).toLowerCase();
            const isHot = "abcdef".includes(firstChar);

            debug.innerHTML = `> HASH_FRAGMENT: ${hexFrag} | WEIGHT: ${weight}<br>> DECODING_SUCCESSFUL...`;

            // Calcul des Probabilités (Calibré sur tes paliers : Rose = 5x+)
            let pSafe, pWhale;
            
            if (isHot || weight > 32000) {
                // Séquence CHAUDE : Rupture de cycle détectée
                seqInfo.innerText = "SÉQUENCE : CHAUDE (HAUTE PROBABILITÉ ROSE)";
                seqInfo.style.borderLeftColor = "var(--rose)";
                pSafe = (2.10 + (weight/50000)).toFixed(2);
                pWhale = (5.50 + (weight/2000)).toFixed(2);
            } else {
                // Séquence FROIDE : Distribution standard ou récupération
                seqInfo.innerText = "SÉQUENCE : FROIDE (ACCUMULATION / BLEU)";
                seqInfo.style.borderLeftColor = "var(--bleu)";
                pSafe = (1.32 + (weight/60000)).toFixed(2);
                pWhale = (2.50 + (weight/10000)).toFixed(2);
            }

            // Affichage
            document.getElementById('safe-val').innerText = pSafe + "X";
            document.getElementById('whale-val').innerText = pWhale + "X";

            // Auto-Copy de la cible Safe
            navigator.clipboard.writeText(pSafe);
            
            updateHistoryUI();
            document.getElementById('lastScore').value = "";
        }

        function updateHistoryUI() {
            const hist = document.getElementById('history');
            hist.innerHTML = logs.map(s => {
                let color = "var(--bleu)";
                if(s >= 50) color = "var(--vert)";
                else if(s >= 5) color = "var(--rose)";
                else if(s >= 2) color = "var(--violet)";
                return `<div class="dot" style="background:${color}">${s.toFixed(1)}</div>`;
            }).join('');
        }
    </script>
</body>
</html>
