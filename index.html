<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS ELITE V38.6 - DUAL ALGO</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 10px; margin: 0; }
        .container { max-width: 100%; border: 1px solid #0f0; padding: 15px; box-shadow: 0 0 15px #0f0; border-radius: 8px; }
        h2 { text-align: center; font-size: 1.1em; color: #0f0; text-shadow: 0 0 8px #0f0; }
        
        .setting-box { background: #111; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px ridge #333; }
        label { display: block; font-size: 0.7em; color: #bc13fe; font-weight: bold; margin-bottom: 5px; }
        
        input, select, button { background: #000; color: #0f0; border: 1px solid #444; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 4px; font-size: 0.9em; margin-bottom: 10px; }
        
        .flex-row { display: flex; gap: 8px; }
        .btn-main { background: #0f0; color: #000; font-weight: bold; height: 50px; border: none; cursor: pointer; }
        .btn-algo { background: #222; color: #0f0; font-size: 0.7em; height: 35px; }
        .active-algo { border: 2px solid #0f0; box-shadow: 0 0 5px #0f0; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
        
        .bleu { color: #3498db; }
        .violet { color: #bc13fe; }
        .rose { color: #ff00ff; font-weight: bold; animation: glow 1s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 2px #ff00ff; } to { text-shadow: 0 0 10px #ff00ff; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🛩️ HERYS ELITE V38.6 (DUAL)</h2>

    <div class="setting-box">
        <label>SERVER SEED :</label>
        <input id="serverSeed" type="text" placeholder="Coller le Hash du jeu...">
        
        <div class="flex-row">
            <div style="flex-grow: 1;">
                <label>CLIENT SEED :</label>
                <input id="clientSeed" type="text" value="0000000000000000000">
            </div>
            <div style="width: 100px;">
                <label>NONCE :</label>
                <input id="nonceInput" type="number" value="1">
            </div>
        </div>

        <label>ALGORITHME ACTIF :</label>
        <div class="flex-row">
            <button id="btn512" class="btn-algo active-algo" onclick="setAlgo('SHA-512')">SHA-512</button>
            <button id="btn256" class="btn-algo" onclick="setAlgo('SHA-256')">SHA-256</button>
        </div>
    </div>

    <button class="btn-main" onclick="analyser()">🔥 ANALYSER TOUS LES MODES</button>
    <button style="background:#333; color:#fff;" onclick="prochain()">SUIVANT +1</button>

    <div id="status" style="font-size: 0.7em; margin-top: 10px; color: #888;">En attente...</div>

    <table>
        <thead>
            <tr>
                <th>TOUR</th>
                <th>PRÉDICTION</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
    let currentAlgo = "SHA-512";

    function setAlgo(algo) {
        currentAlgo = algo;
        document.getElementById('btn512').classList.toggle('active-algo', algo === 'SHA-512');
        document.getElementById('btn256').classList.toggle('active-algo', algo === 'SHA-256');
        analyser();
    }

    async function hmac(key, message, algo) {
        const enc = new TextEncoder();
        const k = await crypto.subtle.importKey("raw", enc.encode(key), {name: "HMAC", hash: algo}, false, ["sign"]);
        const s = await crypto.subtle.sign("HMAC", k, enc.encode(message));
        return Array.from(new Uint8Array(s)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function calculate(hash) {
        const h = BigInt(`0x${hash.slice(0, 13)}`);
        const e = 2n ** 52n;
        // House edge ajusté à 3% (97n) pour coller aux jeux récents
        let res = Number(97n * e / (e - h)) / 100;
        return Math.max(1.00, Math.floor(res * 100) / 100);
    }

    async function analyser() {
        const s = document.getElementById('serverSeed').value.trim();
        const c = document.getElementById('clientSeed').value.trim();
        const n = parseInt(document.getElementById('nonceInput').value);
        const body = document.getElementById('resBody');

        if(!s) return;

        let html = "";
        for(let i=0; i<10; i++) {
            let tour = n + i;
            // On teste le format standard ClientSeed:Nonce
            const hash = await hmac(s, `${c}:${tour}`, currentAlgo);
            const val = calculate(hash);

            let cls = (val < 2) ? 'bleu' : (val < 10) ? 'violet' : 'rose';
            html += `<tr><td>#${tour}</td><td class="${cls}">${val.toFixed(2)}x</td><td>${currentAlgo}</td></tr>`;
        }
        body.innerHTML = html;
        document.getElementById('status').innerText = `Analyse terminée en ${currentAlgo}`;
    }

    function prochain() {
        document.getElementById('nonceInput').value = parseInt(document.getElementById('nonceInput').value) + 1;
        analyser();
    }
</script>
</body>
</html>
