<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herys Ultimate V7.0 - Nano Edition</title>
    <style>
        body { background-color: #050507; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; transition: background 0.2s; }
        
        .flash-gold { animation: flash-bg 0.4s ease-in-out 2; }
        @keyframes flash-bg { 0%, 100% { background-color: #050507; } 50% { background-color: #f97316; } }

        .brand-name { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: #f97316; margin: 2px 0; }
        
        #jackpotAlert { display: none; background: #fbbf24; color: #000; font-weight: 900; padding: 5px; border-radius: 5px; margin-bottom: 5px; width: 95%; text-align: center; font-size: 9px; border: 1px solid #fff; }

        .split-container { display: flex; gap: 4px; width: 100%; max-width: 480px; }
        .engine-block { flex: 1; background: #0c0c0f; border-radius: 10px; padding: 8px; border: 1px solid #1a1a20; }
        
        label { font-size: 7px; color: #555; font-weight: bold; display: block; margin-bottom: 2px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #222; border-radius: 6px; padding: 8px; color: #f97316; font-family: monospace; font-size: 15px; outline: none; box-sizing: border-box; margin-bottom: 5px; text-align: center; }
        
        .res-stack { margin-top: 5px; display: none; flex-direction: column; gap: 3px; }
        .card { background: #050507; border-radius: 6px; padding: 5px; text-align: center; border: 1px solid #1a1a20; }
        .time-val { font-size: 13px; font-weight: bold; color: #fff; font-family: monospace; }
        
        .pred-x { font-size: 18px; color: #f97316; font-weight: 900; }
        .conf-perc { font-size: 18px; font-weight: 900; display: block; }
        
        .high-conf { color: #22c55e; } 
        .med-conf { color: #f97316; }  
        .low-conf { color: #ef4444; }  

        .btn-predict { background: linear-gradient(135deg, #f97316, #ea580c); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 900; width: 95%; cursor: pointer; margin-top: 8px; text-transform: uppercase; font-size: 14px; }
        
        #historyList { width: 100%; max-width: 400px; margin-top: 5px; }
        .hist-item { background: #0c0c0f; border-radius: 4px; padding: 4px; font-size: 8px; margin-top: 2px; border-left: 2px solid #f97316; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="brand-name">HERYS</div>
    <div id="jackpotAlert">🔥 SIGNAL DETECTÉ 🔥</div>

    <div class="split-container">
        <div class="engine-block">
            <label>Heure</label>
            <input type="text" id="timeA" placeholder="00:00" inputmode="numeric" maxlength="5" onkeyup="formatTime(this, 'multiA')">
            <label>Dernier X</label>
            <input type="number" id="multiA" step="0.01" inputmode="decimal">
            <div id="resStackA" class="res-stack">
                <div class="card"><div id="resA1" class="time-val">--:--:--</div></div>
                <div class="card" style="border-color:#f97316"><div id="predXA" class="pred-x">--X</div></div>
                <div class="card"><div id="confA" class="conf-perc">--%</div></div>
            </div>
        </div>

        <div class="engine-block">
            <label>Heure</label>
            <input type="text" id="timeB" placeholder="00:00" inputmode="numeric" maxlength="5" onkeyup="formatTime(this, 'multiB')">
            <label>Dernier X</label>
            <input type="number" id="multiB" step="0.01" inputmode="decimal">
            <div id="resStackB" class="res-stack">
                <div class="card"><div id="resB1" class="time-val">--:--:--</div></div>
                <div class="card" style="border-color:#f97316"><div id="predXB" class="pred-x">--X</div></div>
                <div class="card"><div id="confB" class="conf-perc">--%</div></div>
            </div>
        </div>
    </div>

    <button class="btn-predict" onclick="runGlobal()">ANALYSER</button>
    <div id="historyList"></div>

    <script>
        function formatTime(input, nextId) {
            let val = input.value.replace(/\D/g, '');
            if (val.length >= 2) val = val.substring(0,2) + ':' + val.substring(2,4);
            input.value = val;
            if (val.length === 5) document.getElementById(nextId).focus();
        }

        function runGlobal() {
            const a = process('A');
            const b = process('B');
            if(a || b) {
                updateHistory(a, b);
                setTimeout(() => {
                    document.getElementById('timeA').value = ""; document.getElementById('multiA').value = "";
                    document.getElementById('timeB').value = ""; document.getElementById('multiB').value = "";
                    document.getElementById('jackpotAlert').style.display = 'none';
                    document.getElementById('timeA').focus();
                }, 1000);
            }
        }

        function process(id) {
            const t = document.getElementById(`time${id}`).value;
            const x = parseFloat(document.getElementById(`multi${id}`).value);
            if(t.length < 5 || isNaN(x)) return null;

            document.getElementById(`resStack${id}`).style.display = 'flex';
            const [h, m] = t.split(':').map(Number);
            
            let confidence = (x >= 1.5 && x <= 6) ? Math.floor(Math.random()*(98-85)+85) : Math.floor(Math.random()*(70-20)+20);
            let minX = 1.2, maxX = 3.5, addM = 2;
            if(x < 1.3) { addM = 3; maxX = 1.9; }
            if(x >= 8) { addM = 4; minX = 5.0; maxX = 40.0; }

            let d = new Date(); d.setHours(h); d.setMinutes(m + addM);
            d.setSeconds(Math.floor(Math.random() * 60));
            const tFull = d.toTimeString().split(' ')[0];
            const px = (Math.random() * (maxX - minX) + minX).toFixed(2);

            document.getElementById(`res${id}1`).innerText = tFull;
            document.getElementById(`predX${id}`).innerText = px + "X";
            const confEl = document.getElementById(`conf${id}`);
            confEl.innerText = confidence + "%";
            confEl.className = "conf-perc " + (confidence > 80 ? "high-conf" : confidence > 55 ? "med-conf" : "low-conf");

            if(confidence >= 92 || parseFloat(px) >= 10) {
                document.getElementById('jackpotAlert').style.display = 'block';
                document.body.classList.add('flash-gold');
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                setTimeout(() => document.body.classList.remove('flash-gold'), 800);
            }
            return { tFull, px, conf: confidence };
        }

        function updateHistory(a, b) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'hist-item';
            let txt = (a ? `A:${a.tFull}(${a.px}X|${a.conf}%) ` : "") + (b ? `| B:${b.tFull}(${b.px}X|${b.conf}%)` : "");
            item.innerHTML = `<span>${txt}</span> <span style="color:#444">${new Date().toLocaleTimeString().substring(0,8)}</span>`;
            list.prepend(item);
            if(list.children.length > 3) list.lastChild.remove();
        }
    </script>
</body>
</html>
