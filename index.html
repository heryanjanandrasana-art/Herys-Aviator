<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur RTP - Correction de Variance</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 8px; padding: 20px; max-width: 500px; border-left: 5px solid #00ff88; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .highlight { color: #00ff88; font-weight: bold; }
        .warning { color: #ffcc00; font-size: 0.9em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Analyse Post-Gros Score (>3.5)</h2>
        <p>Ajustement Algo : <span class="highlight">λ = 2.0</span> (Mode Équilibre)</p>
        
        <div class="stat-row">
            <span>Probabilité Under 1.5</span>
            <span class="highlight">40.59%</span>
        </div>
        <div class="stat-row">
            <span>Probabilité 0-0</span>
            <span>13.53%</span>
        </div>
        <div class="stat-row">
            <span>Probabilité 1-1</span>
            <span>13.53%</span>
        </div>
        <div class="stat-row">
            <span>Probabilité Over 2.5</span>
            <span style="color: #ff4444;">32.33%</span>
        </div>

        <p class="warning">⚠️ Persistance 0.3 active : Le boost "Home" est neutralisé par le moteur de retour à la moyenne.</p>
    </div>
</body>
</html>
