<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V36 - MAX EDITION</title>
    <style>
        :root { 
            --gold: #d4af37; --dark: #050505; --safe: #00ff88; 
            --sniper: #ff00ff; --flash: #00ffff; --danger: #ff3333;
        }
        
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; width: 100%; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        
        .main-display {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            border: 2px solid var(--gold); border-radius: 20px;
            padding: 20px 10px; text-align: center; width: 100%; max-width: 380px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        #prob { font-size: 4.5rem; font-weight: 900; margin: 0; transition: 0.3s; }
        
        .seed-info { font-size: 0.65rem; color: #555; margin-top: 5px; font-family: monospace; }
        .hash-power-container { width: 80%; height: 6px; background: #111; margin: 12px auto; border-radius: 3px; border: 1px solid #222; overflow: hidden; }
        #hash-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--safe)); transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .prediction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 380px; margin-top: 15px; }
        .pred-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1); border-radius: 12px; padding: 12px; text-align: center; }
        .label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .multi { font-size: 1.4rem; font-weight: bold; margin: 5px 0; display: block; }

        .input-group { width: 100%; max-width: 380px; margin-top: 20px; }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #222; 
            border-radius: 10px; color: white; margin-bottom: 8px; box-sizing: border-box; text-align: center;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-analyze { 
            width: 100%; padding: 18px; background: var(--gold); color: black; 
            border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1rem;
            text-transform: uppercase; transition: transform 0.1s;
        }
        .btn-analyze:active { transform: scale(0.98); }
        
        #history { width: 100%; max-width: 380px; margin-top: 15px; font-size: 0.75rem; color: #444; }
        .log-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #111; }
        
        .blink { animation: pulse 0.6s infinite; }
        @keyframes pulse { 0% { opacity: 1; border-color: var(--safe); } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-size: 1rem; margin:0; letter-spacing: 2px;">HERYS ELITE <span style="color:var(--gold)">V36</span></h1>
    <div id="clock" style="color:#333; font-size: 0.7rem;">00:00:00</div>
</div>

<div class="main-display">
    <div id="prob">0%</div>
    <div class="hash-power-container"><div id="hash-bar"></div></div>
    <div id="signal" style="color:var(--gold); font-weight:bold; font-size:0.85rem;">SCANNER PRÊT</div>
    <div class="seed-info" id="virtual-seed-display">SEED: INITIALIZING...</div>
</div>

<div class="prediction-grid">
    <div class="pred-card">
        <span class="label">CIBLE T1</span>
        <span id="t1" class="multi">--.-x</span>
        <div id="t1-time" style="font-size:0.7rem; color:#555;">--:--:--</div>
    </div>
    <div class="pred-card">
        <span class="label">CIBLE T2</span>
        <span id="t2" class="multi">--.-x</span>
        <div id="t2-time" style="font-size:0.7rem; color:#555;">--:--:--</div>
    </div>
</div>

<div class="input-group">
    <input type="number" id="val" step="0.01" inputmode="decimal" placeholder="Dernier Multi (ex: 1.85)">
    <input type="text" id="hash" placeholder="Coller le Hash du tour">
    <button class="btn-analyze" id="btn" onclick="run()">Lancer l'Analyse</button>
</div>

<div id="history"></div>

<script>
    // Variables globales
    let state = { 
        stag: 0, 
        lastWin: Date.now(),
        vSeed: "" 
    };

    // 1. Générateur de Seed Virtuel au chargement
    window.onload = () => {
        // Crée un seed unique basé sur l'heure et un random
        state.vSeed = "V-" + Math.random().toString(16).slice(2, 10).toUpperCase();
        document.getElementById('virtual-seed-display').innerText = "V-SEED: " + state.vSeed;
        updateClock();
        setInterval(updateClock, 1000);
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
    }

    function run() {
        const valInput = document.getElementById('val');
        const hashInput = document.getElementById('hash');
        const val = parseFloat(valInput.value);
        const hash = hashInput.value.trim();
        
        const probEl = document.getElementById('prob');
        const bar = document.getElementById('hash-bar');
        const btn = document.getElementById('btn');
        
        if (!val || isNaN(val)) return;

        // --- ALGORITHME DE CORRÉLATION SEED + HASH ---
        let seedStability = 0;
        if(hash.length > 5) {
            // On vérifie si le Hash actuel contient des caractères du Seed Virtuel
            // Cela simule une analyse de signature de session
            const seedChar = state.vSeed.charAt(2); 
            const occurrences = (hash.split(seedChar).length - 1);
            seedStability = (occurrences * 4) + (hash.length / 8);
        }

        // Détection Stagnation (Crashs répétitifs)
        if(val < 2.0) state.stag++; else state.stag = 0;
        
        // Calcul de Probabilité de Rebond
        let p = 38 + seedStability + (state.stag * 9);
        let color = "white";
        let msg = "ANALYSE EN COURS";

        // Logic de Sécurité Maximale
        if(p > 85 || (val <= 1.08 && state.stag >= 4)) {
            p = 99.1;
            color = "var(--safe)";
            msg = "SÉCURITÉ MAX (CORRÉLATION SEED OK)";
            btn.classList.add('blink');
        } else if (state.stag >= 6) {
            p = 96.8;
            color = "var(--sniper)";
            msg = "MODE SNIPER ACTIVÉ";
            btn.classList.add('blink');
        } else {
            btn.classList.remove('blink');
            color = p > 60 ? "var(--flash)" : "var(--gold)";
            msg = p > 60 ? "SIGNAL FORT DETECTÉ" : "SCANNER EN ATTENTE";
        }

        // --- MISE À JOUR UI ---
        probEl.innerText = Math.min(99.9, p).toFixed(1) + "%";
        probEl.style.color = color;
        bar.style.width = Math.min(100, seedStability * 5) + "%";
        document.getElementById('signal').innerText = msg;
        document.getElementById('signal').style.color = color;

        // Cibles (Simulation basée sur le décalage temporel)
        const now = Date.now();
        const f = (ms) => new Date(now + ms).toLocaleTimeString('fr-FR');
        
        document.getElementById('t1').innerText = (Math.random() * 1.5 + 2.1).toFixed(2) + "x";
        document.getElementById('t1-time').innerText = f(92000); // + 1min 32s
        document.getElementById('t2').innerText = (Math.random() * 7 + 5.5).toFixed(2) + "x";
        document.getElementById('t2-time').innerText = f(285000); // + 4min 45s

        // Historique
        const entry = document.createElement('div');
        entry.className = "log-entry";
        entry.innerHTML = `<b style="color:${color}">${val.toFixed(2)}x</b> <span style="color:#555">|</span> <span>${p.toFixed(1)}%</span> <span style="color:#333">${new Date().toLocaleTimeString('fr-FR')}</span>`;
        document.getElementById('history').prepend(entry);

        // Reset rapide pour le tour suivant
        setTimeout(() => { 
            valInput.value = ""; 
            hashInput.value = "";
            valInput.focus();
        }, 400);
    }
</script>

</body>
</html>
