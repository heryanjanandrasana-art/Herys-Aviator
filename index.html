<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V41</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #d4af37; --pink: #ec4899; --blue: #3b82f6; --violet: #a855f7; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #161616; border: 1px solid #333; border-radius: 20px; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); font-size: 1.1rem; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        label { display: block; font-size: 0.7rem; color: #888; margin: 10px 0 5px 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; outline: none; font-family: monospace; margin-bottom: 5px; }
        input:focus { border-color: var(--gold); }
        
        button { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        
        #display { font-size: 3.5rem; text-align: center; margin: 15px 0; font-weight: 900; min-height: 70px; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        #scannerBox { margin-top: 15px; background: #000; border-radius: 15px; padding: 12px; border: 1px solid #222; display: none; }
        .scan-title { color: var(--gold); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .scan-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #111; font-size: 0.85rem; font-family: monospace; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .stat-card { background: #1f1f1f; padding: 12px; border-radius: 12px; border-left: 4px solid var(--gold); }
        .stat-val { display: block; font-weight: bold; font-size: 1rem; margin-top: 5px; }
        
        .footer { margin-top: 20px; display: flex; gap: 10px; width: 100%; }
        .btn-sec { background: #333; color: var(--gold); flex: 1; padding: 12px; border-radius: 10px; font-size: 0.7rem; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>HERYS ELITE V41</h1>
    
    <label>SERVER SEED</label>
    <input type="text" id="sSeed" placeholder="Coller le Server Seed...">

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
        <div><label>CLIENT 1</label><input type="text" id="c1" placeholder="P1"></div>
        <div><label>CLIENT 2</label><input type="text" id="c2" placeholder="P2"></div>
        <div><label>CLIENT 3</label><input type="text" id="c3" placeholder="P3"></div>
    </div>

    <label>NONCE (NUMÉRO DU TOUR)</label>
    <input type="number" id="nonce" placeholder="Ex: 8101873">
    
    <button onclick="runHerysPredictor()">PRÉDIRE LA SÉQUENCE</button>

    <div id="display">---</div>

    <div id="scannerBox">
        <div class="scan-title">SÉQUENCE ANALYSÉE (10 PROCHAINS)</div>
        <div id="scanList"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">STATUT<span class="stat-val" id="status" style="color:#00ff00">PRÊT</span></div>
        <div class="stat-card">ALERTE ROSE<span class="stat-val" id="alertBox">NON</span></div>
    </div>

    <div class="footer">
        <button class="btn-sec" onclick="location.reload()" style="color:#ff4444">RÉINITIALISER</button>
    </div>
</div>

<script>
    let audioCtx = null;
    function playAlert() {
        try {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) { console.log("Audio bloqué par le navigateur"); }
    }

    // LOGIQUE OFFICIELLE SPRIBE (CORRIGÉE)
    function aviatorCrashPoint(serverSeed, c1, c2, c3, nonce) {
        // Concaténation brute sans aucun séparateur
        const combined = serverSeed.trim() + c1.trim() + c2.trim() + c3.trim() + nonce.toString();
        const hash = CryptoJS.SHA512(combined).toString();

        // Étape 1 : Vérification Modulo 33 (1.00x)
        const first8 = hash.substring(0, 8);
        if (parseInt(first8, 16) % 33 === 0) return 1.00;

        // Étape 2 : Calcul du multiplicateur (52 bits)
        const first13 = hash.substring(0, 13);
        const H = parseInt(first13, 16);
        const h = H / Math.pow(2, 52);
        
        // Formule RTP 0.97
        const crashPoint = Math.floor((0.97 / (1 - h)) * 100) / 100;
        return crashPoint;
    }

    function runHerysPredictor() {
        const s = document.getElementById('sSeed').value;
        const c1 = document.getElementById('c1').value;
        const c2 = document.getElementById('c2').value;
        const c3 = document.getElementById('c3').value;
        const n = parseInt(document.getElementById('nonce').value);

        if (!s || isNaN(n)) return alert("Données manquantes !");

        document.getElementById('scannerBox').style.display = "block";
        let scanHTML = "";
        let roseFound = false;

        for (let i = 1; i <= 10; i++) {
            const currentN = n + i;
            const res = aviatorCrashPoint(s, c1, c2, c3, currentN);
            
            let color = "var(--blue)";
            if (res >= 10) { color = "var(--pink)"; roseFound = true; }
            else if (res >= 2) { color = "var(--violet)"; }

            scanHTML += `<div class="scan-item" style="color:${color}">
                <span>TOUR ${currentN}</span>
                <span><b>${res.toFixed(2)}x</b></span>
            </div>`;

            if (i === 1) {
                const display = document.getElementById('display');
                display.innerText = res.toFixed(2) + "x";
                display.style.color = color;
            }
        }

        document.getElementById('scanList').innerHTML = scanHTML;
        
        if (roseFound) {
            playAlert();
            document.getElementById('status').innerText = "ROSE DÉTECTÉ !";
            document.getElementById('status').style.color = "var(--pink)";
            document.getElementById('alertBox').innerText = "OUI (BIP)";
        } else {
            document.getElementById('status').innerText = "CALME (BLEU)";
            document.getElementById('status').style.color = "var(--blue)";
            document.getElementById('alertBox').innerText = "NON";
        }
    }
</script>

</body>
</html>
