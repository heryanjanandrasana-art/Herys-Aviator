<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herys Sentinel v37</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #15151e;
            --green: #00ff88;
            --red: #ff3e3e;
            --gold: #ffcc00;
            --blue: #00d4ff;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 380px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #2d2d3a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Barre d'état avancée */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #000;
            padding: 10px 15px;
            border-radius: 12px;
        }

        .indicator { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.4s; }

        /* Jauge de Confiance */
        .trust-section { margin-bottom: 20px; }
        .trust-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        #trust-fill { width: 0%; height: 100%; background: var(--blue); transition: 1s ease; }

        /* Grille des Cibles */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: #1c1c27; padding: 15px; border-radius: 16px; border: 1px solid #2d2d3a; text-align: center; }
        .val { font-size: 24px; font-weight: 900; margin: 5px 0; }
        .sub { font-size: 10px; color: #888; }

        /* Prédictions consécutives */
        .chain { background: #000; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .chain-items { display: flex; justify-content: space-between; margin-top: 8px; }
        .item { font-size: 11px; background: #1a1a1a; padding: 4px 8px; border-radius: 4px; color: var(--green); }

        /* Formulaire */
        input {
            width: 100%; padding: 14px; margin-bottom: 10px; background: #000;
            border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box;
        }
        .btn-go {
            width: 100%; padding: 16px; background: var(--green); color: #000;
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-go:active { transform: scale(0.98); }

        .history { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .badge { font-size: 9px; padding: 3px 6px; background: #222; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-bar">
        <div class="indicator">
            <div id="danger-dot" class="dot"></div> <span>SÉCURITÉ</span>
        </div>
        <div class="indicator">
            <div id="jackpot-dot" class="dot"></div> <span>GOLD POT</span>
        </div>
    </div>

    <div class="trust-section">
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <span>INDICE DE CONFIANCE</span>
            <span id="trust-pct">0%</span>
        </div>
        <div class="trust-bar"><div id="trust-fill"></div></div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="sub">T1 SAFE</div>
            <div id="t1" class="val" style="color: var(--green);">0.00x</div>
            <div id="t1-t" class="sub">--s</div>
        </div>
        <div class="card">
            <div class="sub">T2 RISK</div>
            <div id="t2" class="val" style="color: var(--gold);">0.00x</div>
            <div id="t2-t" class="sub">--s</div>
        </div>
    </div>

    <div class="chain">
        <div class="sub" style="text-align:center">SÉQUENCE 5 TOURS</div>
        <div class="chain-items" id="chain">
            <div class="item">--</div><div class="item">--</div><div class="item">--</div><div class="item">--</div><div class="item">--</div>
        </div>
    </div>

    <input type="text" id="hash" placeholder="Hash SHA-256">
    <input type="number" step="0.01" id="multi" placeholder="Dernier Multiplicateur">

    <button class="btn-go" id="btn">Analyser & Prédire</button>

    <div class="history" id="log"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('sentinel_data')) || [];

    const ui = {
        t1: document.getElementById('t1'),
        t2: document.getElementById('t2'),
        t1t: document.getElementById('t1-t'),
        t2t: document.getElementById('t2-t'),
        trust: document.getElementById('trust-fill'),
        trustText: document.getElementById('trust-pct'),
        danger: document.getElementById('danger-dot'),
        jackpot: document.getElementById('jackpot-dot'),
        chain: document.getElementById('chain'),
        log: document.getElementById('log'),
        inHash: document.getElementById('hash'),
        inMulti: document.getElementById('multi')
    };

    function analyze() {
        const val = parseFloat(ui.inMulti.value);
        const hash = ui.inHash.value || "seed";

        if(isNaN(val)) return;

        logs.unshift(val);
        if(logs.length > 10) logs.pop();
        localStorage.setItem('sentinel_data', JSON.stringify(logs));

        // 1. Calcul de Confiance
        let trust = 40 + (logs.length * 5);
        if(val > 1.1 && val < 3) trust += 10;
        trust = Math.min(trust, 99);

        // 2. Détection Danger (Anti-Bust)
        const isDanger = (val < 1.2 || (logs[0] < 1.5 && logs[1] < 1.5));
        ui.danger.style.background = isDanger ? "var(--red)" : "var(--green)";
        ui.danger.style.boxShadow = isDanger ? "0 0 10px var(--red)" : "none";

        // 3. Prédictions
        let t1 = (val * 0.95);
        let t2 = (val * 1.8);
        if(isDanger) { t1 = 1.15; t2 = 1.40; }

        // 4. Jackpot (>15x)
        const isJackpot = (hash.length % 7 === 0 && !isDanger);
        ui.jackpot.style.background = isJackpot ? "var(--gold)" : "#333";
        ui.jackpot.style.boxShadow = isJackpot ? "0 0 10px var(--gold)" : "none";

        // Update UI
        ui.t1.innerText = Math.max(1.10, t1).toFixed(2) + "x";
        ui.t2.innerText = Math.max(t1 * 1.5, t2).toFixed(2) + "x";
        ui.t1t.innerText = "Tps: " + Math.round(t1 * 2) + "s";
        ui.t2t.innerText = "Tps: " + Math.round(t2 * 3.2) + "s";
        
        ui.trust.style.width = trust + "%";
        ui.trustText.innerText = trust + "%";

        // Chain 5
        ui.chain.innerHTML = '';
        for(let i=0; i<5; i++) {
            let next = (1.1 + Math.random() * (isDanger ? 1.5 : 4)).toFixed(2);
            ui.chain.innerHTML += `<div class="item">${next}x</div>`;
        }

        // Nettoyage Auto
        ui.inHash.value = "";
        ui.inMulti.value = "";
        renderLogs();
    }

    function renderLogs() {
        ui.log.innerHTML = '';
        logs.forEach(l => {
            ui.log.innerHTML += `<div class="badge" style="border-bottom: 2px solid ${l < 2 ? 'var(--red)' : 'var(--green)'}">${l.toFixed(2)}x</div>`;
        });
    }

    document.getElementById('btn').addEventListener('click', analyze);
    renderLogs();
</script>

</body>
</html>
