<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERYS GOD MODE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #000;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { color: gold; }

.box {
    background: #111;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
}

button {
    padding: 10px;
    margin: 5px;
    background: gold;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

.rose { color:#ff007b; }
.green { color:#00ff88; }
.blue { color:#00c3ff; }
</style>
</head>

<body>

<h1>HERYS GOD MODE</h1>

<div class="box">
<input id="data" style="width:90%" value="1.2,1.5,2.1,1.1,1.3,1.8,2.5,1.4,1.2,3.2">
<br><br>
<button onclick="autoData()">AUTO LIVE</button>
<button onclick="analyser()">ANALYSER</button>
</div>

<div class="box" id="stats"></div>
<canvas id="chart"></canvas>
<canvas id="dist"></canvas>
<div class="box" id="prediction"></div>

<script>

let chart, distChart, interval;

// Simulation LIVE
function autoData() {
    clearInterval(interval);
    interval = setInterval(()=>{
        let r = Math.random()*100;
        let val;

        if (r < 5) val = (Math.random()*30+10).toFixed(2);
        else if (r < 30) val = (Math.random()*3+2).toFixed(2);
        else val = (Math.random()*1.5+1).toFixed(2);

        let input = document.getElementById("data");
        input.value += "," + val;

        analyser();
    },2000);
}

// Analyse PRO
function analyser() {

    let hist = document.getElementById("data").value.split(",").map(Number);

    let avg = hist.reduce((a,b)=>a+b)/hist.length;

    let variance = hist.reduce((a,b)=>a + Math.pow(b-avg,2),0)/hist.length;
    let vol = Math.sqrt(variance);

    let last20 = hist.slice(-20);

    let low = last20.filter(x=>x<2).length;
    let mid = last20.filter(x=>x>=2 && x<5).length;
    let high = last20.filter(x=>x>=5).length;

    // Score avancé
    let score = 0;
    score += (low > 12) ? 30 : 0;
    score += (high === 0) ? 25 : 0;
    score += (vol < 1.3) ? 20 : 0;
    score += (avg < 2) ? 15 : 0;

    let probaRose = Math.min(score,85);

    let alert = probaRose > 60 ? "🚨 OPPORTUNITÉ HAUTE" : "RAS";

    document.getElementById("stats").innerHTML = `
    Moyenne: ${avg.toFixed(2)}<br>
    Volatilité: ${vol.toFixed(2)}<br><br>

    Distribution (20 derniers):<br>
    <span class="blue"><2x: ${low}</span><br>
    <span class="green">2-5x: ${mid}</span><br>
    <span class="rose">≥5x: ${high}</span><br><br>

    Score: ${score}<br>
    Probabilité ROSE: ${probaRose}%<br><br>

    ${alert}
    `;

    // Graph historique
    let ctx = document.getElementById("chart").getContext("2d");
    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:"line",
        data:{
            labels: hist.map((_,i)=>i+1),
            datasets:[{label:"Multiplicateur",data:hist}]
        }
    });

    // Graph distribution
    let dctx = document.getElementById("dist").getContext("2d");
    if(distChart) distChart.destroy();

    distChart = new Chart(dctx,{
        type:"bar",
        data:{
            labels:["<2x","2-5x","≥5x"],
            datasets:[{data:[low,mid,high]}]
        }
    });

    // Simulation PRO
    let simu = [];

    for(let i=0;i<10;i++){
        let r = Math.random()*100;

        if(r < probaRose){
            simu.push(`<span class="rose">🔥 ${(Math.random()*25+5).toFixed(2)}x</span>`);
        } else if(r < probaRose+30){
            simu.push(`<span class="green">${(Math.random()*3+2).toFixed(2)}x</span>`);
        } else {
            simu.push(`<span class="blue">${(Math.random()*1.5+1).toFixed(2)}x</span>`);
        }
    }

    document.getElementById("prediction").innerHTML =
    "<b>🔮 Projection stratégique</b><br>"+simu.join("<br>");
}

</script>

</body>
</html>
