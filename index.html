<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS MASTER ELITE - V4.0 BRIGHT</title>
    <style>
        :root {
            --royal: #7300ff; 
            --lvl-bleu: #00d4ff;
            --lvl-violet: #a335ee;
            --lvl-rose: #ff00ff;
            --lvl-vert: #00ff88;
            --bg: #050505;
            --card-bg: #121212;
            --danger: #ff2a2a;
        }
        
        body {
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            font-weight: 900; color: var(--royal); font-size: 26px; 
            margin-bottom: 2px; text-transform: uppercase; letter-spacing: 2px;
        }
        .header-sub { font-size: 10px; opacity: 0.6; margin-bottom: 20px; letter-spacing: 1px; }

        .engine-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

        .glass-card {
            background: var(--card-bg); padding: 18px; border-radius: 20px; 
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 800; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input {
            background: #000; border: 1px solid #333; color: white; 
            padding: 15px; border-radius: 12px; font-size: 18px; width: 100%;
            text-align: center; font-weight: bold; transition: 0.3s;
        }
        input::placeholder { font-size: 12px; opacity: 0.5; }
        input:focus { border-color: var(--royal); outline: none; box-shadow: 0 0 10px var(--royal); }

        .btn-main {
            width: 100%; background: linear-gradient(45deg, var(--royal), #9d4cff); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            font-size: 14px; box-shadow: 0 4px 15px rgba(115, 0, 255, 0.3);
        }

        .energy-grid {
            height: 60px; display: flex; align-items: flex-end; gap: 5px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; border: 1px inset #222;
        }
        .energy-bar { flex: 1; border-radius: 3px; transition: height 0.6s ease; }

        #flux-indicator {
            text-align: center; font-size: 11px; margin-top: 10px; font-weight: 900;
            padding: 8px; border-radius: 8px; text-transform: uppercase; background: rgba(255,255,255,0.02);
        }

        .prediction-display {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            padding: 25px; border-radius: 25px; border: 2px solid #222; text-align: center;
        }
        .timer-val { font-size: 34px; font-weight: 900; letter-spacing: 2px; }
        
        .trends { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-size: 11px; font-weight: bold; }
        .active-up { color: var(--lvl-vert); text-shadow: 0 0 10px var(--lvl-vert); }
        .active-down { color: var(--danger); text-shadow: 0 0 10px var(--danger); }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 15px; border-radius: 18px; text-align: center; }
        .fiab-bar-bg { width: 100%; height: 6px; background: #000; border-radius: 10px; margin-top: 10px; }
        .fiab-fill { height: 100%; width: 0%; border-radius: 10px; transition: width 1s ease-in-out; }

        .urgent { animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red {
            0% { border-color: #222; }
            50% { border-color: var(--danger); box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
            100% { border-color: #222; }
        }

        #hist-list { max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .history-item {
            background: rgba(255,255,255,0.03); margin-bottom: 5px; padding: 10px;
            border-radius: 10px; display: flex; justify-content: space-between; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header-title">HERYS MASTER ELITE</div>
    <div class="header-sub">ENGINE V4.0 • HASH-BASED PREDICTION</div>
    
    <div class="engine-container">
        <div class="glass-card">
            <label>1. Dernier Multiplicateur</label>
            <div class="input-row">
                <input type="number" id="inputX" placeholder="Ex: 1.56" step="0.01">
            </div>
            <label>2. Combined Hash (Provably Fair)</label>
            <div class="input-row">
                <input type="text" id="inputHash" placeholder="Colle le Combined Hash ici..." style="font-size: 13px;">
            </div>
            <button class="btn-main" onclick="analyze()">DÉCHIFFRER LE SIGNAL</button>
        </div>

        <div class="glass-card">
            <label>Analyseur de Flux de Session</label>
            <div id="energy-container" class="energy-grid"></div>
            <div id="flux-indicator">SCANNER EN ATTENTE...</div>
        </div>

        <div id="pred-box" class="prediction-display">
            <label id="power-label">POTENTIEL DU PROCHAIN VOL</label>
            <div style="display: flex; justify-content: space-around;">
                <div>
                    <div style="font-size: 10px; color: var(--lvl-vert);">SAFE (T1)</div>
                    <div id="t1" class="timer-val" style="color: white;">--:--</div>
                </div>
                <div>
                    <div style="font-size: 10px; color: var(--lvl-rose);">RISK (T2)</div>
                    <div id="t2" class="timer-val" style="color: white;">--:--</div>
                </div>
            </div>
            <div class="trends">
                <span id="trend-up">📈 FORCE</span>
                <span id="trend-down">📉 FAIBLESSE</span>
            </div>
            <div id="count-label" style="font-size: 12px; margin-top: 15px; font-weight: bold; color: #888;">SCANNER PRÊT</div>
        </div>

        <div class="res-grid">
            <div class="card">
                <label style="color:var(--lvl-vert)">OBJECTIF SAFE</label>
                <div id="val-safe" style="font-size: 20px; font-weight: 900;">--</div>
                <div class="fiab-bar-bg"><div id="bar-safe" class="fiab-fill" style="background:var(--lvl-vert)"></div></div>
            </div>
            <div class="card">
                <label style="color:var(--lvl-rose)">OBJECTIF RISK</label>
                <div id="val-risk" style="font-size: 20px; font-weight: 900;">--</div>
                <div class="fiab-bar-bg"><div id="bar-risk" class="fiab-fill" style="background:var(--lvl-rose)"></div></div>
            </div>
        </div>
    </div>

    <script>
        let nextTime1 = null;
        let historiqueX = JSON.parse(localStorage.getItem('herys_v4_data')) || [];

        function analyze() {
            const valX = parseFloat(document.getElementById('inputX').value);
            let fullHash = document.getElementById('inputHash').value.trim();
            
            if (isNaN(valX) || fullHash.length < 8) {
                alert("Veuillez entrer le score ET le Hash combiné !");
                return;
            }

            // --- MOTEUR DE PUISSANCE HASH ---
            const prefix = fullHash.substring(0, 8);
            const valDecimal = parseInt(prefix, 16);
            const powerScore = (valDecimal / 0xffffffff) * 100;

            const now = new Date();
            let safeConf = 0;
            let riskConf = 0;
            let targetSafe = "--";
            let targetRisk = "--";

            // LOGIQUE DE DÉCISION BASÉE SUR TES 13 VIDÉOS
            if (powerScore > 70) {
                safeConf = 98; riskConf = 82;
                targetSafe = "1.85"; targetRisk = "4.50";
                document.getElementById('flux-indicator').innerText = "💎 SIGNAL BRILLANT : LARGAGE DE GAIN";
                document.getElementById('flux-indicator').style.color = "var(--lvl-vert)";
            } else if (powerScore > 35) {
                safeConf = 85; riskConf = 55;
                targetSafe = "1.35"; targetRisk = "2.10";
                document.getElementById('flux-indicator').innerText = "✅ FLUX STABLE : SCALPING RECOMMANDÉ";
                document.getElementById('flux-indicator').style.color = "white";
            } else {
                safeConf = 35; riskConf = 10;
                targetSafe = "1.10"; targetRisk = "1.40";
                document.getElementById('flux-indicator').innerText = "🚨 DANGER : ASPIRATION DU SERVEUR";
                document.getElementById('flux-indicator').style.color = "var(--danger)";
            }

            // Filtre Anti-Aspiration (après gros gain)
            if (valX > 50 || historiqueX.slice(-3).every(x => x < 1.25)) {
                if(powerScore < 80) safeConf -= 40;
            }

            // Sync Temporelle (Moyenne observée)
            nextTime1 = new Date(now.getTime() + 61000);
            let nextTime2 = new Date(now.getTime() + 122000);

            // Mise à jour UI
            document.getElementById('t1').innerText = nextTime1.toTimeString().split(' ')[0].substring(0,5);
            document.getElementById('t2').innerText = nextTime2.toTimeString().split(' ')[0].substring(0,5);
            document.getElementById('val-safe').innerText = targetSafe + "X";
            document.getElementById('val-risk').innerText = targetRisk + "X";
            document.getElementById('bar-safe').style.width = safeConf + "%";
            document.getElementById('bar-risk').style.width = riskConf + "%";
            document.getElementById('count-label').innerText = `PUISSANCE DU HASH : ${powerScore.toFixed(1)}%`;
            
            // Tendances
            document.getElementById('trend-up').className = powerScore > 50 ? 'active-up' : '';
            document.getElementById('trend-down').className = powerScore <= 50 ? 'active-down' : '';

            // Historique
            historiqueX.push(valX);
            if(historiqueX.length > 10) historiqueX.shift();
            localStorage.setItem('herys_v4_data', JSON.stringify(historiqueX));
            refreshUI();
        }

        function refreshUI() {
            const container = document.getElementById('energy-container');
            const hist = document.getElementById('hist-list');
            container.innerHTML = ""; hist.innerHTML = "";

            historiqueX.forEach(v => {
                const bar = document.createElement('div');
                bar.className = 'energy-bar';
                bar.style.height = `${Math.min(v * 6, 100)}%`;
                bar.style.backgroundColor = v < 2 ? 'var(--lvl-bleu)' : (v < 10 ? 'var(--lvl-violet)' : 'var(--lvl-vert)');
                container.appendChild(bar);
            });

            [...historiqueX].reverse().forEach(x => {
                hist.innerHTML += `<div class="history-item"><span>Round ID</span> <b style="color:${x < 2 ? '#00d4ff' : '#ff00ff'}">${x.toFixed(2)}x</b></div>`;
            });
        }

        setInterval(() => {
            if (!nextTime1) return;
            let diff = Math.floor((nextTime1 - new Date()) / 1000);
            const label = document.getElementById('count-label');
            const box = document.getElementById('pred-box');

            if (diff > 0) {
                if (diff <= 10) {
                    box.classList.add('urgent');
                    label.style.color = "var(--danger)";
                }
            } else if (diff > -15) {
                label.innerText = "🚀 ENTRÉE CONSEILLÉE 🚀";
                label.style.color = "var(--lvl-vert)";
            } else {
                box.classList.remove('urgent');
                nextTime1 = null;
            }
        }, 1000);

        window.onload = refreshUI;
    </script>
</body>
</html>
