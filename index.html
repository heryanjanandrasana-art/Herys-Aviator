<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzer Pro</title>

<style>
body {
    background: #050505;
    color: #00f2ff;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
    border: none;
}

button {
    background: #00f2ff;
    color: black;
    font-weight: bold;
}

#result, #confidence {
    margin-top: 20px;
    font-size: 18px;
}

.bar {
    width: 80%;
    height: 20px;
    background: #222;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: #00f2ff;
    transition: 0.3s;
}
</style>
</head>

<body>

<h2>🔍 Analyzer Pro</h2>

<input id="hash" placeholder="Hash SHA512"><br>
<input id="mult" placeholder="Multiplicateur"><br>

<button onclick="analyze()">Analyser</button>

<div id="result"></div>
<div id="confidence"></div>

<div class="bar">
    <div id="bar" class="fill"></div>
</div>

<script>
let history = [];

function calculateFromHash(hash) {
    const last8 = hash.slice(-8);
    const dec = parseInt(last8, 16);
    const result = Math.max(1, Math.floor((4294967295 * 0.97 / dec) * 100) / 100);
    return result;
}

function analyze() {
    let hash = document.getElementById("hash").value.trim();
    let mult = parseFloat(document.getElementById("mult").value);

    if (!hash || isNaN(mult)) {
        alert("Données invalides !");
        return;
    }

    let calc = calculateFromHash(hash);

    if (Math.abs(calc - mult) > 0.01) {
        document.getElementById("result").innerText = "⚠️ Données incohérentes";
        return;
    }

    history.unshift(mult);
    if (history.length > 20) history.pop();

    let avg = history.reduce((a,b)=>a+b,0) / history.length;

    let confidence = 50;

    if (avg < 2) confidence += 20;
    if (avg > 5) confidence -= 15;

    confidence = Math.max(0, Math.min(100, confidence));

    document.getElementById("result").innerText = "✔️ Calcul validé : " + calc + "x";
    document.getElementById("confidence").innerText = "📊 Score : " + confidence.toFixed(0) + "%";

    document.getElementById("bar").style.width = confidence + "%";
}
</script>

</body>
</html>
