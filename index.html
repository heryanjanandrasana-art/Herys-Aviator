<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS MASTER ELITE - V5.5 AUTO</title>
    <style>
        :root {
            --royal: #7300ff; 
            --lvl-bleu: #00d4ff;
            --lvl-violet: #a335ee;
            --lvl-rose: #ff00ff;
            --lvl-vert: #00ff88;
            --bg: #050505;
            --card-bg: #121212;
            --danger: #ff2a2a;
        }
        
        body {
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title { font-weight: 900; color: var(--royal); font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .header-sub { font-size: 10px; opacity: 0.6; margin-bottom: 20px; letter-spacing: 1px; }

        .engine-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

        .glass-card {
            background: var(--card-bg); padding: 18px; border-radius: 20px; 
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 800; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input {
            background: #000; border: 1px solid #333; color: white; 
            padding: 15px; border-radius: 12px; font-size: 18px; width: 100%;
            text-align: center; font-weight: bold; transition: 0.3s;
        }
        input:focus { border-color: var(--royal); outline: none; box-shadow: 0 0 10px var(--royal); }

        .btn-main {
            width: 100%; background: linear-gradient(45deg, var(--royal), #9d4cff); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px;
        }

        .winrate-display { 
            text-align: center; margin-top: 15px; padding: 10px; 
            background: rgba(255,255,255,0.03); border-radius: 10px;
            font-size: 11px; font-weight: 800; color: #888; 
        }

        .energy-grid { height: 60px; display: flex; align-items: flex-end; gap: 5px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; border: 1px inset #222; }
        .energy-bar { flex: 1; border-radius: 3px; transition: height 0.6s ease; }

        #flux-indicator { text-align: center; font-size: 11px; margin-top: 10px; font-weight: 900; padding: 8px; border-radius: 8px; text-transform: uppercase; }

        .prediction-display { background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); padding: 25px; border-radius: 25px; border: 2px solid #222; text-align: center; }
        .timer-val { font-size: 34px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-title">HERYS MASTER ELITE</div>
    <div class="header-sub">ENGINE V5.5 • AUTO-VALIDATION</div>
    
    <div class="engine-container">
        <div class="glass-card">
            <label>Données de Session</label>
            <div class="input-row">
                <input type="number" id="inputX" placeholder="Score X.XX" step="0.01">
                <input type="text" id="inputHash" placeholder="Combined Hash" style="font-size: 13px;">
            </div>
            <button class="btn-main" onclick="analyze()">DÉCHIFFRER LE SIGNAL</button>
            
            <div class="winrate-display">
                PRÉCISION AUTO : <span id="stat-winrate" style="color:var(--lvl-vert)">0%</span>
                <br><small id="stat-rounds" style="opacity:0.5; font-weight:normal">0 rounds analysés</small>
            </div>
        </div>

        <div class="glass-card">
            <label>Scanner de Flux</label>
            <div id="energy-container" class="energy-grid"></div>
            <div id="flux-indicator">EN ATTENTE...</div>
        </div>

        <div id="pred-box" class="prediction-display">
            <label id="power-label">PRÉDICTION POUR PROCHAIN VOL</label>
            <div style="display: flex; justify-content: space-around;">
                <div><div style="font-size: 10px; color: var(--lvl-vert);">SAFE (AUTO-LOG)</div><div id="t1" class="timer-val">--:--</div></div>
                <div><div style="font-size: 10px; color: var(--lvl-rose);">RISK</div><div id="t2" class="timer-val">--:--</div></div>
            </div>
            <div id="count-label" style="font-size: 12px; margin-top: 15px; font-weight: bold; color: #888;">READY</div>
        </div>
    </div>

    <script>
        let lastPowerScore = 0;
        let currentPrediction = null; 
        let totalSignals = parseInt(localStorage.getItem('h_total')) || 0;
        let winSignals = parseInt(localStorage.getItem('h_win')) || 0;
        let historiqueX = JSON.parse(localStorage.getItem('herys_v5_data')) || [];

        function analyze() {
            const valX = parseFloat(document.getElementById('inputX').value);
            const rawHash = document.getElementById('inputHash').value.trim();
            const fullHash = rawHash.match(/[a-fA-F0-9]{32,}/g)?.[0] || "";

            if (isNaN(valX) || fullHash.length < 8) return alert("Hash ou Score invalide !");

            // --- 1. AUTO-VALIDATION DU SIGNAL PRÉCÉDENT ---
            if (currentPrediction !== null) {
                totalSignals++;
                if (valX >= currentPrediction) {
                    winSignals++;
                }
                updateWinrateUI();
            }

            // --- 2. CALCUL DU NOUVEAU SIGNAL ---
            const powerScore = (parseInt(fullHash.substring(0, 8), 16) / 0xffffffff) * 100;
            const trend = lastPowerScore > 0 ? powerScore - lastPowerScore : 0;
            lastPowerScore = powerScore;

            let targetS = "1.30", targetR = "2.00";
            const flux = document.getElementById('flux-indicator');

            if (powerScore > 75) {
                targetS = trend > 0 ? "1.85" : "1.60";
                targetR = trend > 5 ? "8.00" : "4.00";
                flux.innerText = "🔥 SIGNAL ULTRA : HAUTE PRESSION";
                flux.style.color = "var(--lvl-vert)";
            } else if (powerScore < 25) {
                targetS = "1.10"; targetR = "1.25";
                flux.innerText = "🚨 DANGER : ASPIRATION";
                flux.style.color = "var(--danger)";
            } else {
                targetS = "1.35";
                flux.innerText = "⚖️ FLUX STABLE"; flux.style.color = "white";
            }

            // Mémorisation pour le prochain tour
            currentPrediction = parseFloat(targetS);

            // --- 3. MISE À JOUR UI ---
            document.getElementById('t1').innerText = targetS + "X";
            document.getElementById('t2').innerText = targetR + "X";
            document.getElementById('count-label').innerText = `POWER: ${powerScore.toFixed(1)}% | TREND: ${trend > 0 ? '+' : ''}${trend.toFixed(1)}%`;
            
            historiqueX.push(valX);
            if(historiqueX.length > 10) historiqueX.shift();
            
            localStorage.setItem('herys_v5_data', JSON.stringify(historiqueX));
            localStorage.setItem('h_total', totalSignals);
            localStorage.setItem('h_win', winSignals);
            
            refreshUI();
        }

        function updateWinrateUI() {
            const wr = totalSignals > 0 ? Math.round((winSignals / totalSignals) * 100) : 0;
            document.getElementById('stat-winrate').innerText = wr + "%";
            document.getElementById('stat-rounds').innerText = totalSignals + " rounds analysés";
            document.getElementById('stat-winrate').style.color = wr > 75 ? 'var(--lvl-vert)' : 'var(--danger)';
        }

        function refreshUI() {
            const container = document.getElementById('energy-container');
            container.innerHTML = "";
            historiqueX.forEach(v => {
                const bar = document.createElement('div');
                bar.className = 'energy-bar';
                bar.style.height = `${Math.min(v * 6, 100)}%`;
                bar.style.backgroundColor = v < 2 ? 'var(--lvl-bleu)' : 'var(--lvl-rose)';
                container.appendChild(bar);
            });
        }

        window.onload = () => { refreshUI(); updateWinrateUI(); };
    </script>
</body>
</html>
