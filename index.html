<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herys Sentinel v48 - Final</title>
    <style>
        :root {
            --bg: #0a0a0c; --card: #15151e; --green: #00ff88;
            --red: #ff3e3e; --gold: #ffcc00; --blue: #00d4ff; --text: #e0e0e0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }

        .app-container {
            width: 350px; background: var(--card); border-radius: 24px;
            padding: 20px; border: 1px solid #2d2d3a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Status & Indicators */
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 12px; }
        .indicator { display: flex; align-items: center; gap: 6px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.4s; }

        /* Predictions Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: #1c1c27; padding: 12px; border-radius: 16px; border: 1px solid #2d2d3a; text-align: center; }
        .val { font-size: 26px; font-weight: 900; margin: 2px 0; }
        .sub { font-size: 9px; color: #888; text-transform: uppercase; }
        .time-label { font-size: 10px; color: #fff; font-weight: bold; margin-top: 4px; display: block; }

        /* Inputs */
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 12px; font-size: 14px; margin-bottom: 8px;
            box-sizing: border-box; outline: none; text-align: center; transition: 0.3s;
        }
        input:focus { border-color: var(--blue); }

        /* Custom Keyboard */
        .keyboard {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-bottom: 15px; background: #000; padding: 10px; border-radius: 18px;
        }
        .key {
            background: #1c1c27; color: #fff; padding: 16px; border-radius: 12px;
            text-align: center; font-weight: bold; font-size: 20px; cursor: pointer;
            border-bottom: 3px solid #000; transition: 0.1s; user-select: none;
        }
        .key:active { background: var(--blue); transform: translateY(2px); border-bottom: none; }
        .key.del { color: var(--red); }

        /* Animated Button */
        .btn-wrapper { position: relative; width: 100%; height: 58px; overflow: hidden; border-radius: 14px; }
        .btn-go {
            position: absolute; width: 100%; height: 100%; background: var(--green); color: #000;
            border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; z-index: 2;
            font-size: 14px; letter-spacing: 1px;
        }
        #btn-loader {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: rgba(255,255,255,0.4); z-index: 3; pointer-events: none;
        }

        /* History List */
        .history { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .badge { font-size: 10px; padding: 6px 12px; background: #1c1c27; border-radius: 8px; border: 1px solid #333; cursor: pointer; min-width: 45px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-bar">
        <div class="indicator"><div id="danger-dot" class="dot"></div> SÉCURITÉ</div>
        <div class="indicator"><div id="jackpot-dot" class="dot"></div> GOLD POT</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="sub">T1 SAFE</div>
            <div id="t1" class="val" style="color:var(--green)">0.00x</div>
            <span id="t1-t" class="time-label">--:--:--</span>
        </div>
        <div class="card">
            <div class="sub">T2 RISK</div>
            <div id="t2" class="val" style="color:var(--gold)">0.00x</div>
            <span id="t2-t" class="time-label">--:--:--</span>
        </div>
    </div>

    <input type="text" id="hash" placeholder="Hash (8 premiers caractères)" maxlength="8" style="text-transform: uppercase;">
    
    <input type="text" id="multi" placeholder="Multiplicateur" readonly style="border-color: var(--blue); font-weight: 900;">

    <div class="keyboard">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key" onclick="press('.')">.</div><div class="key" onclick="press('0')">0</div><div class="key del" onclick="press('C')">⌫</div>
    </div>

    <div class="btn-wrapper">
        <button class="btn-go" id="btn" onclick="analyze()">Analyser & Prédire</button>
        <div id="btn-loader"></div>
    </div>

    <div class="history" id="log"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('sentinel_data')) || [];
    const ui = {
        t1: document.getElementById('t1'), t2: document.getElementById('t2'),
        t1t: document.getElementById('t1-t'), t2t: document.getElementById('t2-t'),
        danger: document.getElementById('danger-dot'), jackpot: document.getElementById('jackpot-dot'),
        log: document.getElementById('log'), inHash: document.getElementById('hash'),
        inMulti: document.getElementById('multi'), btn: document.getElementById('btn'),
        loader: document.getElementById('btn-loader')
    };

    // Digital Keyboard Logic
    function press(v) {
        if(v === 'C') ui.inMulti.value = ui.inMulti.value.slice(0, -1);
        else if(ui.inMulti.value.length < 6) ui.inMulti.value += v;
    }

    // Audio Feedback
    function playBeep(isHigh) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = isHigh ? 800 : 400;
            g.gain.setValueAtTime(0.05, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
            osc.start(); osc.stop(ctx.currentTime + 0.25);
        } catch(e) {}
    }

    // Main Analysis Logic
    async function analyze() {
        const val = parseFloat(ui.inMulti.value);
        if(isNaN(val)) return;

        // Visual Feedback (Button Loading)
        ui.btn.innerText = "Traitement IA...";
        ui.btn.disabled = true;
        ui.loader.style.width = "0%";
        ui.loader.style.transition = "width 0.8s linear";
        setTimeout(() => ui.loader.style.width = "100%", 10);

        // Data Storage
        logs.unshift(val); if(logs.length > 12) logs.pop();
        localStorage.setItem('sentinel_data', JSON.stringify(logs));

        await new Promise(r => setTimeout(r, 800));

        // Core Sentinel Algorithm
        const isDanger = (val < 1.30 || (logs.length > 1 && logs[1] < 1.55));
        let t1_calc = isDanger ? 1.15 : (val * 0.95);
        let t2_calc = isDanger ? 1.40 : (val * 1.80);

        // Precise Time Calculation (HH:mm:ss)
        const now = new Date();
        const fmt = (d) => d.toTimeString().split(' ')[0];
        const timeT1 = new Date(now.getTime() + (Math.round(t1_calc * 2) * 1000));
        const timeT2 = new Date(now.getTime() + (Math.round(t2_calc * 3.2) * 1000));

        // UI Updates
        ui.t1.innerText = Math.max(1.10, t1_calc).toFixed(2) + "x";
        ui.t2.innerText = Math.max(t1_calc * 1.4, t2_calc).toFixed(2) + "x";
        ui.t1t.innerText = fmt(timeT1);
        ui.t2t.innerText = fmt(timeT2);
        
        ui.danger.style.background = isDanger ? "var(--red)" : "var(--green)";
        ui.danger.style.boxShadow = isDanger ? "0 0 12px var(--red)" : "none";

        // Jackpot Indicator (Hash based)
        const hashText = ui.inHash.value || "0";
        const isJackpot = hashText.length >= 4 && (hashText.charCodeAt(0) % 7 === 0);
        ui.jackpot.style.background = isJackpot ? "var(--gold)" : "#333";
        ui.jackpot.style.boxShadow = isJackpot ? "0 0 15px var(--gold)" : "none";

        playBeep(!isDanger);
        
        // Final UI Reset
        ui.btn.innerText = "Analyser & Prédire";
        ui.btn.disabled = false;
        ui.loader.style.transition = "none";
        ui.loader.style.width = "0%";
        ui.inMulti.value = ""; 
        renderLogs();
    }

    // Refresh History List
    function renderLogs() {
        ui.log.innerHTML = '';
        logs.forEach(l => {
            const c = l < 2 ? 'var(--red)' : 'var(--green)';
            const border = l > 10 ? 'var(--gold)' : c;
            ui.log.innerHTML += `<div class="badge" onclick="ui.inMulti.value='${l}'" style="border-bottom: 2px solid ${border}">${l.toFixed(2)}x</div>`;
        });
    }

    renderLogs();
</script>
</body>
</html>
