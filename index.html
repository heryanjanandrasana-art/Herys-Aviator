<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V42</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #d4af37; --pink: #ec4899; --blue: #3b82f6; --violet: #a855f7; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #161616; border: 1px solid #333; border-radius: 20px; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); font-size: 1.1rem; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin: 0; }
        label { display: block; font-size: 0.75rem; color: #888; margin: 15px 0 5px 5px; font-weight: bold; }
        input { width: 100%; padding: 14px; background: #222; border: 1px solid #444; color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; font-family: monospace; margin-bottom: 5px; font-size: 0.9rem; }
        input:focus { border-color: var(--gold); background: #282828; }
        button { width: 100%; padding: 20px; background: var(--gold); border: none; border-radius: 15px; font-weight: 900; margin-top: 20px; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        #display { font-size: 4rem; text-align: center; margin: 20px 0; font-weight: 900; min-height: 80px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #scannerBox { margin-top: 20px; background: #000; border-radius: 15px; padding: 15px; border: 1px solid #222; display: none; }
        .scan-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 0.9rem; font-family: monospace; }
        .stat-card { background: #1f1f1f; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); margin-top: 15px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>HERYS ELITE V42</h1>
    
    <label>COMBINED SEED (PROVABLY FAIR)</label>
    <input type="text" id="combinedSeed" placeholder="Coller le Combined Seed ici...">

    <label>NONCE (NUMÉRO DU TOUR)</label>
    <input type="number" id="nonce" placeholder="Ex: 8101873">
    
    <button onclick="runHerysPredictor()">ANALYSER LE FUTUR</button>

    <div id="display">---</div>

    <div id="scannerBox">
        <div style="color:var(--gold); font-size:0.8rem; margin-bottom:10px; font-weight:bold; border-bottom:1px solid #222; padding-bottom:5px;">SÉQUENCE DE PRÉDICTION :</div>
        <div id="scanList"></div>
    </div>

    <div class="stat-card">
        <span style="color:#888; font-size:0.7rem; text-transform:uppercase;">Statut du Système</span>
        <span id="status" style="display:block; font-weight:bold; font-size:1.1rem; color:#00ff00; margin-top:5px;">OPÉRATIONNEL</span>
    </div>
</div>

<script>
    let audioCtx = null;
    function playAlert() {
        try {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) {}
    }

    function aviatorLogic(combinedSeed, nonce) {
        // Règle Perplexity : Combined Seed + Nonce (en chaîne de caractères)
        const finalString = combinedSeed.trim() + nonce.toString();
        const hash = CryptoJS.SHA512(finalString).toString();

        // 1.00x Modulo 33
        if (parseInt(hash.substring(0, 8), 16) % 33 === 0) return 1.00;

        // Multiplicateur (52 bits)
        const h = parseInt(hash.substring(0, 13), 16) / Math.pow(2, 52);
        return Math.floor((0.97 / (1 - h)) * 100) / 100;
    }

    function runHerysPredictor() {
        const seed = document.getElementById('combinedSeed').value;
        const n = parseInt(document.getElementById('nonce').value);

        if (!seed || isNaN(n)) return alert("Veuillez remplir les champs !");

        document.getElementById('scannerBox').style.display = "block";
        let listHTML = "";
        let roseFound = false;

        // On prédit les 10 prochains rounds à partir du Nonce saisi
        for (let i = 1; i <= 10; i++) {
            const nextN = n + i;
            const res = aviatorLogic(seed, nextN);
            
            let color = "var(--blue)";
            if (res >= 10) { color = "var(--pink)"; roseFound = true; }
            else if (res >= 2) { color = "var(--violet)"; }

            listHTML += `<div class="scan-item" style="color:${color}">
                <span>TOUR ${nextN}</span>
                <span><b>${res.toFixed(2)}x</b></span>
            </div>`;

            if (i === 1) {
                const d = document.getElementById('display');
                d.innerText = res.toFixed(2) + "x";
                d.style.color = color;
            }
        }

        document.getElementById('scanList').innerHTML = listHTML;
        
        if (roseFound) {
            playAlert();
            document.getElementById('status').innerText = "ROSE DÉTECTÉ !";
            document.getElementById('status').style.color = "var(--pink)";
        } else {
            document.getElementById('status').innerText = "ANALYSE CALME";
            document.getElementById('status').style.color = "var(--blue)";
        }
    }
</script>

</body>
</html>
