<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS ELITE V38.4 - PRO PRECISION</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 10px; margin: 0; }
        .container { max-width: 100%; border: 1px solid #0f0; padding: 15px; box-shadow: 0 0 15px #0f0; border-radius: 8px; transition: all 0.3s ease; }
        h2 { text-align: center; font-size: 1.1em; color: #0f0; text-shadow: 0 0 8px #0f0; margin-bottom: 20px; }
        
        label { display: block; margin-top: 10px; font-size: 0.75em; color: #bc13fe; font-weight: bold; }
        input, button { background: #111; color: #0f0; border: 1px solid #333; padding: 12px; margin: 5px 0; width: 100%; box-sizing: border-box; outline: none; border-radius: 4px; font-size: 1em; }
        
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        #nonceInput { text-align: center; font-weight: bold; color: #ff00ff; border: 1px solid #ff00ff; }

        .btn-main { cursor: pointer; font-weight: bold; background: #0f0; color: #000; border: none; height: 50px; }
        .btn-next { background: #bc13fe; color: #fff; width: 120px; border: none; cursor: pointer; }
        .btn-reset { background: #444; color: #eee; width: 100px; border: none; cursor: pointer; }
        .btn-main:active, .btn-next:active { opacity: 0.7; transform: scale(0.95); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; background: #000; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #111; color: #bc13fe; }

        .bleu { color: #3498db; }
        .violet { color: #bc13fe; font-weight: bold; }
        .rose { color: #ff00ff; font-weight: bold; animation: glow 1s infinite alternate; }
        
        @keyframes glow {
            from { text-shadow: 0 0 2px #ff00ff; }
            to { text-shadow: 0 0 10px #ff00ff; }
        }

        #status { margin-top: 15px; padding: 10px; border-left: 3px solid #0f0; font-size: 0.8em; background: #0a0a0a; min-height: 20px; }
    </style>
</head>
<body>

<div class="container" id="mainApp">
    <h2>🛩️ HERYS ELITE V38.4 (PRECISION)</h2>

    <label>Server Seed (Hash de la vidéo) :</label>
    <input id="serverSeed" type="text" placeholder="Coller le dernier Hash SHA512...">

    <div class="flex-row">
        <div style="flex-grow: 1;">
            <label>Client Seed :</label>
            <input id="clientSeed" type="text" value="0000000000000000000">
        </div>
        <div style="width: 100px;">
            <label>Nonce (Tour) :</label>
            <input id="nonceInput" type="number" value="1">
        </div>
    </div>

    <button class="btn-main" onclick="genererPrevisions()">🔥 ANALYSER LA SEQUENCE</button>
    
    <div class="flex-row">
        <button class="btn-next" onclick="incrementerNonce()">SUIVANT +1</button>
        <button class="btn-reset" onclick="resetApp()">Vider</button>
        <button style="background:#222; color:#fff; flex-grow:1; border:1px solid #444;" onclick="copierResultats()">📋 COPIER</button>
    </div>

    <div id="status">Prêt pour l'analyse...</div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>TOUR</th>
                <th>CÔTE PRÉDITE</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    // Algorithme HMAC SHA-512 optimisé
    async function hmacSha512(key, message) {
        const encoder = new TextEncoder();
        const cryptoKey = await crypto.subtle.importKey(
            "raw", encoder.encode(key),
            { name: "HMAC", hash: "SHA-512" },
            false, ["sign"]
        );
        const signature = await crypto.subtle.sign("HMAC", cryptoKey, encoder.encode(message));
        return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Calculateur de multiplicateur (Standard Provably Fair)
    function calculateMultiplier(hash) {
        const hex13 = hash.slice(0, 13);
        const intVal = parseInt(hex13, 16);
        const floatVal = intVal / Math.pow(2, 52); 
        const result = 0.98 / (1 - floatVal);
        const finalMult = Math.floor(result * 100) / 100;
        return Math.max(1.00, finalMult);
    }

    function incrementerNonce() {
        const nInput = document.getElementById('nonceInput');
        nInput.value = parseInt(nInput.value) + 1;
        genererPrevisions();
    }

    function resetApp() {
        document.getElementById('serverSeed').value = '';
        document.getElementById('resBody').innerHTML = '';
        document.getElementById('status').innerText = 'Champs réinitialisés.';
        document.getElementById('mainApp').style.borderColor = "#0f0";
        document.getElementById('mainApp').style.boxShadow = "0 0 15px #0f0";
    }

    async function genererPrevisions() {
        const sSeed = document.getElementById('serverSeed').value.trim();
        const cSeed = document.getElementById('clientSeed').value.trim();
        const startNonce = parseInt(document.getElementById('nonceInput').value);
        const statusEl = document.getElementById('status');
        const resBody = document.getElementById('resBody');
        const alertSnd = document.getElementById('alertSound');

        if (!sSeed) {
            statusEl.innerHTML = "<span style='color:red'>⚠️ Collez le Server Seed !</span>";
            return;
        }

        let tempHTML = "";
        let alerteRose = false;

        // Analyse des 12 tours suivants
        for (let i = 0; i < 12; i++) {
            let currentNonce = startNonce + i;
            
            // On utilise le Client Seed + Nonce comme message, et le Server Seed comme Clé
            const hash = await hmacSha512(sSeed, `${cSeed}-${currentNonce}`); 
            const mult = calculateMultiplier(hash);

            let colorClass = 'bleu';
            let icon = '🔵';
            let signal = "RISQUE";

            if (mult >= 2 && mult < 10) {
                colorClass = 'violet';
                icon = '🟣';
                signal = "SNIPER";
            } else if (mult >= 10) {
                colorClass = 'rose';
                icon = '🔥';
                signal = "JACKPOT";
                if(i < 3) alerteRose = true; 
            }

            tempHTML += `
                <tr>
                    <td>#${currentNonce}</td>
                    <td class="${colorClass}"><b>${mult.toFixed(2)}x</b></td>
                    <td class="${colorClass}">${icon} ${signal}</td>
                </tr>
            `;
        }

        resBody.innerHTML = tempHTML;

        if (alerteRose) {
            statusEl.innerHTML = "<span style='color:#ff00ff'>🚨 ALERTE : ROSE IMMINENT (TOP 3) !</span>";
            try { alertSnd.play(); } catch(e) {}
            document.getElementById('mainApp').style.borderColor = "#ff00ff";
            document.getElementById('mainApp').style.boxShadow = "0 0 30px #ff00ff";
        } else {
            statusEl.innerHTML = "✅ Séquence synchronisée avec succès.";
            document.getElementById('mainApp').style.borderColor = "#0f0";
            document.getElementById('mainApp').style.boxShadow = "0 0 15px #0f0";
        }
    }

    function copierResultats() {
        const rows = document.querySelectorAll('#resBody tr');
        if(rows.length === 0) return;
        let texte = "Herys Elite V38.4 - Prévisions :\n";
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            texte += `${cells[0].innerText} -> ${cells[1].innerText}\n`;
        });
        navigator.clipboard.writeText(texte);
        alert("Séquence copiée !");
    }
</script>

</body>
</html>
