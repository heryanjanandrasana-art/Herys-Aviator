<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE HYBRIDE V29 - GOLD</title>
    <style>
        :root { 
            --premium-v: #8e44ff; --neon-b: #00d2ff; --vif-g: #00ff88; --hot-p: #ff00ff;
            --bg: #000; --card: #121212; --border: #222;
        }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .img-card { background: #0b0b0b; border: 1px solid #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 8px; text-align: center; position: relative; }
        
        /* GRAPHIQUE */
        .bar-chart { height: 40px; display: flex; align-items: flex-end; justify-content: space-around; background: #080808; border-radius: 8px; padding: 5px; margin-bottom: 10px; }
        .bar { width: 10px; border-radius: 2px; transition: height 0.4s; }

        /* FENÊTRE HYBRIDE UNIQUE */
        .prob-title { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .hybrid-box { display: flex; justify-content: space-around; align-items: center; margin: 15px 0; }
        .target-group { flex: 1; }
        .t-label { font-size: 10px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .t-val { font-size: 26px; font-weight: 900; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .conf-circle { 
            width: 70px; height: 70px; border: 4px solid var(--border); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 16px; 
            font-weight: 900; color: #fff; transition: all 0.3s;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }
        .strong-signal { border-color: var(--vif-g) !important; color: var(--vif-g) !important; box-shadow: 0 0 20px rgba(0,255,136,0.4); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* SÉQUENCE DE 5 TOURS */
        .seq-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 5px 0; }
        .seq-box { background: #1a1a1a; padding: 8px; border-radius: 8px; font-size: 10px; border: 1px solid #222; }
        .seq-val { font-weight: 900; display: block; margin-top: 5px; font-size: 12px; }

        /* CLAVIER ET ENTRÉE */
        .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 15px; margin-top: auto; border-bottom: none; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-box { flex: 1; background: #fff; color: #000; padding: 12px; border-radius: 10px; font-weight: 900; text-align: center; border: none; font-size: 16px; }
        .active { background: #eee; box-shadow: 0 0 15px rgba(142,68,255,0.4); border: 2px solid var(--premium-v); }
        
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .k { background: #1a1a1a; color: #fff; border: 1px solid #2a2a2a; padding: 16px 0; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .k:active { background: #333; }
        .k-go { background: var(--premium-v); color: #fff; grid-column: span 2; font-weight: 900; text-transform: uppercase; font-size: 14px; }
        
        .hist { display: flex; gap: 6px; overflow-x: auto; padding: 10px 5px; flex-direction: row-reverse; height: 35px; }
        .dot { min-width: 45px; height: 22px; font-size: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div class="img-card">
        <div class="bar-chart" id="chart"></div>
        <div id="flux-status" style="font-size:11px; font-weight:900; color:var(--vif-g)">💎 FLUX : ANALYSE EN COURS</div>
    </div>

    <div class="img-card">
        <div class="prob-title">FENÊTRE HYBRIDE (CONFIANCE ÉLITE)</div>
        <div class="hybrid-box">
            <div class="target-group">
                <div class="t-label" style="color:var(--vif-g)">SAFE T1</div>
                <div class="t-val" id="t1-val">--</div>
            </div>
            <div class="conf-circle" id="conf-circle">--</div>
            <div class="target-group">
                <div class="t-label" style="color:var(--hot-p)">RISK T2</div>
                <div class="t-val" id="t2-val">--</div>
            </div>
        </div>
        <div style="font-size:10px; color:#666">SIGNAL : <span id="trend-txt">EN ATTENTE</span></div>
    </div>

    <div class="img-card">
        <div class="prob-title">SÉQUENCE DE PRÉDICTION (5 TOURS)</div>
        <div class="seq-container" id="seq-list">
            <div class="seq-box">R+1 <span class="seq-val">--</span></div>
            <div class="seq-box">R+2 <span class="seq-val">--</span></div>
            <div class="seq-box">R+3 <span class="seq-val">--</span></div>
            <div class="seq-box">R+4 <span class="seq-val">--</span></div>
            <div class="seq-box">R+5 <span class="seq-val">--</span></div>
        </div>
    </div>

    <div class="input-card">
        <div class="input-group">
            <div id="bH" class="input-box active" onclick="sF('h')">HASH</div>
            <div id="bS" class="input-box" onclick="sF('s')">SCORE</div>
        </div>
        <div class="kb">
            <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k" onclick="p('A')">A</button>
            <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k" onclick="p('B')">B</button>
            <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k" onclick="p('C')">C</button>
            <button class="k" onclick="p('0')">0</button><button class="k" onclick="p('.')">.</button><button class="k" style="color:red" onclick="p('D')">⌫</button>
            <button class="k-go" onclick="run()">SCANNER LE SIGNAL</button>
        </div>
        <div id="ht" class="hist"></div>
    </div>

<script>
    let logs = JSON.parse(localStorage.getItem('h_u_v29')) || [];
    let cur = 'h'; let vH = ""; let vS = "";

    // Audio Context pour le Bip
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; gain.gain.value = 0.1;
        osc.start(); setTimeout(() => osc.stop(), dur);
    }

    const chart = document.getElementById('chart');
    for(let i=0; i<15; i++) chart.innerHTML += `<div class="bar" style="height:15%; background:#222"></div>`;

    function sF(m) { cur = m; document.getElementById('bH').classList.toggle('active', m==='h'); document.getElementById('bS').classList.toggle('active', m==='s'); }
    function p(v) {
        if(v === 'D') { if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1); }
        else { if(cur === 'h' && vH.length < 4) { vH += v; if(vH.length === 4) sF('s'); } else if(cur === 's') vS += v; }
        document.getElementById('bH').innerText = vH || "HASH"; document.getElementById('bS').innerText = vS || "SCORE";
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        const w = parseInt(vH, 16);
        
        // FUSION HYBRIDE
        const safe = (1.20 + (w/65535) * 1.6).toFixed(2);
        const risk = (97 / (100 - (w/65535)*97)).toFixed(2);
        
        document.getElementById('t1-val').innerText = safe + "X";
        document.getElementById('t2-val').innerText = risk + "X";

        // CONFIANCE
        let conf = Math.floor(65 + (w/65535)*34);
        const circle = document.getElementById('conf-circle');
        circle.innerText = conf + "%";
        
        if(conf >= 95) {
            circle.classList.add('strong-signal');
            document.getElementById('trend-txt').innerText = "SIGNAL ÉLITE 🚀";
            document.getElementById('trend-txt').style.color = "var(--vif-g)";
            // Double Bip pour Alerte
            playBeep(880, 100); setTimeout(() => playBeep(1046, 150), 150);
        } else {
            circle.classList.remove('strong-signal');
            document.getElementById('trend-txt').innerText = conf > 80 ? "HAUSSE STABLE 📈" : "PRUDENCE ⚠️";
            document.getElementById('trend-txt').style.color = "#666";
        }

        // SÉQUENCE 5 TOURS
        const seqList = document.getElementById('seq-list');
        seqList.innerHTML = "";
        for(let i=1; i<=5; i++) {
            let seededVal = Math.abs(Math.sin(w + i) * 12);
            let val = (1 + (seededVal % 15)).toFixed(2);
            let color = val > 5 ? "var(--hot-p)" : val > 2 ? "var(--premium-v)" : "var(--neon-b)";
            seqList.innerHTML += `<div class="seq-box">R+${i} <span class="seq-val" style="color:${color}">${val}X</span></div>`;
        }

        // ANIMATION GRAPH
        document.querySelectorAll('.bar').forEach(b => {
            let h = Math.random()*90;
            b.style.height = h + "%";
            b.style.background = h > 60 ? "var(--vif-g)" : "var(--border)";
        });
        
        logs.unshift(parseFloat(vS)); if(logs.length > 10) logs.pop();
        localStorage.setItem('h_u_v29', JSON.stringify(logs));
        vH = ""; vS = ""; uUI(); sF('h');
        if(window.navigator.vibrate) window.navigator.vibrate(conf >= 95 ? [100,50,100] : 50);
    }

    function uUI() {
        document.getElementById('ht').innerHTML = logs.map(e => {
            let c = e >= 5 ? "var(--hot-p)" : (e >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            return `<div class="dot" style="background:${c}">${e.toFixed(1)}</div>`;
        }).join('');
    }
    uUI();
</script>
</body>
</html>
