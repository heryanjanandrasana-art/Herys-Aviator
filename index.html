<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herys Sentinel v50 - FINAL</title>
    <style>
        :root {
            --bg: #0a0a0c; --card: #15151e; --green: #00ff88;
            --red: #ff3e3e; --gold: #ffcc00; --blue: #00d4ff; --text: #e0e0e0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        .app-container {
            width: 350px; background: var(--card); border-radius: 24px;
            padding: 20px; border: 1px solid #2d2d3a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Status & Reliability */
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 12px; background: #000; padding: 10px; border-radius: 12px; }
        .indicator { display: flex; align-items: center; gap: 6px; font-size: 9px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.4s; }

        .rel-box { margin-bottom: 15px; }
        .rel-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: var(--blue); }
        .rel-bar { height: 6px; background: #000; border-radius: 3px; overflow: hidden; border: 1px solid #222; }
        #rel-fill { width: 0%; height: 100%; background: var(--blue); transition: 1s ease; box-shadow: 0 0 10px var(--blue); }

        /* Prediction Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: #1c1c27; padding: 12px; border-radius: 16px; border: 1px solid #2d2d3a; text-align: center; }
        .val { font-size: 26px; font-weight: 900; margin: 2px 0; }
        .sub { font-size: 9px; color: #888; text-transform: uppercase; }
        .time { font-size: 10px; color: #fff; font-weight: bold; margin-top: 4px; display: block; }

        /* Inputs */
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 12px; font-size: 14px; margin-bottom: 8px;
            box-sizing: border-box; outline: none; text-align: center;
        }

        /* Clavier Tactile avec Animation */
        #kb-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-bottom: 15px; background: #000; padding: 12px; border-radius: 18px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            max-height: 300px; opacity: 1; transform: translateY(0);
        }
        .kb-hidden { max-height: 0 !important; opacity: 0 !important; margin: 0 !important; padding: 0 !important; transform: translateY(20px); overflow: hidden; }
        
        .key {
            background: #1c1c27; color: #fff; padding: 16px; border-radius: 12px;
            text-align: center; font-weight: bold; font-size: 20px; cursor: pointer;
            border-bottom: 3px solid #000; user-select: none;
        }
        .key:active { background: var(--blue); transform: scale(0.95); }
        .key.del { color: var(--red); }

        /* Button & Loader */
        .btn-wrapper { position: relative; width: 100%; height: 58px; overflow: hidden; border-radius: 14px; }
        .btn-go {
            position: absolute; width: 100%; height: 100%; background: var(--green); color: #000;
            border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; z-index: 2;
        }
        #btn-loader { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); z-index: 3; pointer-events: none; }

        .history { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .badge { font-size: 10px; padding: 6px 12px; background: #1c1c27; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-bar">
        <div class="indicator"><div id="danger-dot" class="dot"></div> SÉCURITÉ</div>
        <div class="indicator"><div id="jackpot-dot" class="dot"></div> GOLD POT</div>
    </div>

    <div class="rel-box">
        <div class="rel-label"><span>PRÉCISION IA</span> <span id="rel-pct">0%</span></div>
        <div class="rel-bar"><div id="rel-fill"></div></div>
    </div>

    <div class="grid">
        <div class="card"><div class="sub">T1 SAFE</div><div id="t1" class="val" style="color:var(--green)">0.00x</div><span id="t1-t" class="time">--:--:--</span></div>
        <div class="card"><div class="sub">T2 RISK</div><div id="t2" class="val" style="color:var(--gold)">0.00x</div><span id="t2-t" class="time">--:--:--</span></div>
    </div>

    <input type="text" id="hash" placeholder="Hash (8 chars)" maxlength="8" style="text-transform: uppercase;">
    <input type="text" id="multi" placeholder="Taper le dernier Multi" readonly onclick="showKB()" style="border-color: var(--blue); font-weight: 900;">

    <div id="kb-container">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key" onclick="press('.')">.</div><div class="key" onclick="press('0')">0</div><div class="key del" onclick="press('C')">⌫</div>
    </div>

    <div class="btn-wrapper">
        <button class="btn-go" id="btn" onclick="analyze()">Analyser & Prédire</button>
        <div id="btn-loader"></div>
    </div>

    <div class="history" id="log"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('sentinel_data')) || [];
    const ui = {
        t1: document.getElementById('t1'), t2: document.getElementById('t2'),
        t1t: document.getElementById('t1-t'), t2t: document.getElementById('t2-t'),
        danger: document.getElementById('danger-dot'), jackpot: document.getElementById('jackpot-dot'),
        log: document.getElementById('log'), inHash: document.getElementById('hash'),
        inMulti: document.getElementById('multi'), btn: document.getElementById('btn'),
        loader: document.getElementById('btn-loader'), kb: document.getElementById('kb-container'),
        relBar: document.getElementById('rel-fill'), relText: document.getElementById('rel-pct')
    };

    function showKB() { ui.kb.classList.remove('kb-hidden'); }
    function hideKB() { ui.kb.classList.add('kb-hidden'); }

    function press(v) {
        if(v === 'C') ui.inMulti.value = ui.inMulti.value.slice(0, -1);
        else if(ui.inMulti.value.length < 6) ui.inMulti.value += v;
    }

    function playBeep(isHigh) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = isHigh ? 850 : 450;
            g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    async function analyze() {
        const val = parseFloat(ui.inMulti.value);
        if(isNaN(val)) return;

        hideKB(); 
        ui.btn.innerText = "Traitement...";
        ui.btn.disabled = true;
        ui.loader.style.width = "0%";
        ui.loader.style.transition = "width 0.8s linear";
        setTimeout(() => ui.loader.style.width = "100%", 10);

        logs.unshift(val); if(logs.length > 12) logs.pop();
        localStorage.setItem('sentinel_data', JSON.stringify(logs));

        await new Promise(r => setTimeout(r, 800));

        // Fiabilité
        let rel = Math.min(35 + (logs.length * 6), 99);
        ui.relBar.style.width = rel + "%";
        ui.relText.innerText = rel + "%";

        // Calculs
        const isDanger = (val < 1.30 || (logs.length > 1 && logs[1] < 1.6));
        let t1 = isDanger ? 1.15 : (val * 0.96);
        let t2 = isDanger ? 1.45 : (val * 1.82);

        const now = new Date();
        const fmt = (d) => d.toTimeString().split(' ')[0];
        ui.t1.innerText = Math.max(1.10, t1).toFixed(2) + "x";
        ui.t2.innerText = Math.max(t1 * 1.4, t2).toFixed(2) + "x";
        ui.t1t.innerText = fmt(new Date(now.getTime() + (t1 * 1800)));
        ui.t2t.innerText = fmt(new Date(now.getTime() + (t2 * 3000)));
        
        ui.danger.style.background = isDanger ? "var(--red)" : "var(--green)";
        ui.danger.style.boxShadow = isDanger ? "0 0 12px var(--red)" : "none";

        const h = ui.inHash.value || "0";
        const isJ = h.length >= 4 && (h.charCodeAt(0) % 6 === 0);
        ui.jackpot.style.background = isJ ? "var(--gold)" : "#333";

        playBeep(!isDanger);
        ui.btn.innerText = "Analyser & Prédire";
        ui.btn.disabled = false;
        ui.loader.style.transition = "none";
        ui.loader.style.width = "0%";
        ui.inMulti.value = ""; 
        renderLogs();
    }

    function renderLogs() {
        ui.log.innerHTML = '';
        logs.forEach(l => {
            const c = l < 2 ? 'var(--red)' : 'var(--green)';
            ui.log.innerHTML += `<div class="badge" onclick="ui.inMulti.value='${l}';showKB();" style="border-bottom: 2px solid ${c}">${l.toFixed(2)}x</div>`;
        });
    }

    renderLogs();
</script>
</body>
</html>
