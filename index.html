<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V36 - SNIPER</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark: #050505; 
            --safe: #00ff88; 
            --sniper: #ff00ff;
            --flash: #00ffff;
        }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .header { text-align: center; border-bottom: 1px solid #222; width: 100%; padding-bottom: 8px; margin-bottom: 15px; }
        .version { background: var(--gold); color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        .main-display {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px var(--gold-glow);
        }

        #prob { 
            font-size: 4rem; 
            font-weight: 900; 
            margin: 5px 0;
            background: linear-gradient(to bottom, #fff, var(--safe));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Barre de Charge Visuelle */
        .charge-container { width: 100%; background: #111; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
        #charge-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--sniper)); transition: width 0.5s ease; }

        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 380px;
            margin-top: 15px;
        }

        .pred-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; display: block;}
        .multi { font-size: 1.3rem; font-weight: bold; color: #fff; display: block;}

        .control-panel { width: 100%; max-width: 380px; margin-top: 15px; }
        input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 8px;
            box-sizing: border-box;
            text-align: center;
        }

        button#analyze-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #history-log { width: 100%; max-width: 380px; margin-top: 20px; max-height: 120px; overflow-y: auto; border-top: 1px solid #222; }
        .log-item { padding: 8px 5px; border-bottom: 1px solid #111; font-size: 0.75rem; color: #666; }
        
        .blink { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .reset-link { color: #333; font-size: 0.65rem; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1rem; letter-spacing: 2px;">HERYS ELITE <span class="version">V36</span></h1>
    <div id="live-clock" style="font-size: 0.7rem; color: #555;">00:00:00</div>
</div>

<div class="main-display">
    <div id="prob">0%</div>
    <div id="signal" style="font-weight: bold; color: var(--gold); font-size: 0.9rem;">EN ATTENTE DE SCAN</div>
    
    <div class="charge-container">
        <div id="charge-bar"></div>
    </div>
    <div id="wait-rounds" style="font-size: 0.8rem; font-weight: bold; color: var(--flash);">TOURS SANS >3x : 0</div>
</div>

<div class="prediction-grid">
    <div class="pred-card">
        <span class="label">Cible T1 (>3x)</span>
        <span id="t1-val" class="multi">--.-x</span>
    </div>
    <div class="pred-card">
        <span class="label">Cible T2 (Sniper)</span>
        <span id="t2-val" class="multi">--.-x</span>
    </div>
</div>

<div class="control-panel">
    <input type="number" id="multi-input" inputmode="decimal" placeholder="Entrer dernier multiplicateur">
    <button id="analyze-btn" onclick="runAnalysis()">Analyser & Cibler</button>
</div>

<div id="history-log"></div>
<span class="reset-link" onclick="clearData()">RÉINITIALISER TOUT</span>

<script>
    let history = JSON.parse(localStorage.getItem('herys_v36_history')) || [];
    let roundsWithoutBig = 0;

    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    window.onload = () => {
        if(localStorage.getItem('herys_v36_log')) {
            document.getElementById('history-log').innerHTML = localStorage.getItem('herys_v36_log');
            updateUI(0);
        }
    };

    function runAnalysis() {
        const input = document.getElementById('multi-input');
        const val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) return;

        // Mise à jour de l'historique
        history.push(val);
        if(history.length > 20) history.shift();
        localStorage.setItem('herys_v36_history', JSON.stringify(history));

        // Compteur de tours sans > 3x
        if (val < 3.0) {
            roundsWithoutBig++;
        } else {
            roundsWithoutBig = 0;
        }

        updateUI(val);
        addLog(val);

        input.value = "";
        input.focus();
    }

    function updateUI(lastVal) {
        let prob = 45;
        let signal = "ANALYSE DU FLUX";
        let color = "var(--gold)";
        let chargePercent = (roundsWithoutBig / 12) * 100; // Se remplit sur 12 tours

        // Logique Sniper > 3x
        if (roundsWithoutBig >= 5) {
            prob = 82 + (roundsWithoutBig * 2);
            signal = "SIGNAL SNIPER IMMINENT";
            color = "var(--sniper)";
        } else if (lastVal < 1.2) {
            prob = 15;
            signal = "DANGER : ZONE ROUGE";
            color = "#ff4444";
        }

        // Mise à jour visuelle
        const probEl = document.getElementById('prob');
        probEl.innerText = Math.min(99, prob).toFixed(0) + "%";
        probEl.style.color = color;
        
        document.getElementById('signal').innerText = signal;
        document.getElementById('signal').style.color = color;
        
        // Barre de charge
        const bar = document.getElementById('charge-bar');
        bar.style.width = Math.min(100, chargePercent) + "%";
        if (chargePercent > 70) bar.classList.add('blink'); else bar.classList.remove('blink');
        
        document.getElementById('wait-rounds').innerText = "TOURS SANS >3x : " + roundsWithoutBig;

        // Prédictions T1 & T2
        if (roundsWithoutBig >= 4) {
            document.getElementById('t1-val').innerText = (Math.random() * (3.8 - 3.1) + 3.1).toFixed(2) + "x";
            document.getElementById('t2-val').innerText = (Math.random() * (15 - 7) + 7).toFixed(2) + "x";
        } else {
            document.getElementById('t1-val').innerText = "--.-x";
            document.getElementById('t2-val').innerText = "--.-x";
        }
    }

    function addLog(val) {
        const log = document.getElementById('history-log');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<b>${val.toFixed(2)}x</b> - ${new Date().toLocaleTimeString()}`;
        log.prepend(item);
        localStorage.setItem('herys_v36_log', log.innerHTML);
    }

    function clearData() {
        if(confirm("Réinitialiser ?")) { localStorage.clear(); location.reload(); }
    }
</script>

</body>
</html>
