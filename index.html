<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS ELITE V38.9 - SMART SYNC</title>
    <style>
        :root { --neon-green: #0f0; --neon-purple: #bc13fe; --neon-pink: #ff00ff; }
        body { font-family: 'Courier New', monospace; background: #000; color: var(--neon-green); padding: 10px; margin: 0; overflow-x: hidden; }
        .container { border: 2px solid var(--neon-green); padding: 12px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); max-width: 500px; margin: auto; }
        h2 { text-align: center; font-size: 1.1em; text-shadow: 0 0 10px var(--neon-green); margin-bottom: 15px; }
        
        .box { background: #0a0a0a; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #222; }
        label { display: block; font-size: 0.7em; color: var(--neon-purple); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        
        input { background: #000; color: var(--neon-green); border: 1px solid #333; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; font-size: 0.95em; margin-bottom: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-purple); box-shadow: 0 0 5px var(--neon-purple); }

        .btn-main { background: var(--neon-green); color: #000; font-weight: bold; padding: 15px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; text-transform: uppercase; }
        .btn-calib { background: var(--neon-pink); color: #fff; font-size: 0.8em; margin-top: 5px; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .flex { display: flex; gap: 8px; margin-top: 10px; }
        .btn-tool { background: #1a1a1a; color: #fff; border: 1px solid #333; flex: 1; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.8em; }

        #status { font-size: 0.75em; text-align: center; margin: 12px 0; color: #ff0; min-height: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #050505; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #1a1a1a; padding: 10px; text-align: center; font-size: 0.85em; }
        th { color: var(--neon-purple); background: #0a0a0a; }

        .bleu { color: #3498db; }
        .violet { color: var(--neon-purple); font-weight: bold; }
        .win { color: var(--neon-pink); font-weight: bold; text-shadow: 0 0 8px var(--neon-pink); }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 HERYS ELITE V38.9 SMART-SYNC</h2>

    <div class="box">
        <label>Hash Serveur (Dernier tour) :</label>
        <input id="sSeed" type="text" placeholder="Coller le Server Seed ici...">
        
        <label>Seed Combiné / Client :</label>
        <input id="cSeed" type="text" placeholder="Coller le Seed du jeu ici...">

        <div style="display:flex; gap:8px;">
            <div style="flex:1">
                <label>Tour (Nonce) :</label>
                <input id="nonce" type="number" placeholder="Ex: 8093500">
            </div>
            <div style="flex:1">
                <label>RÉSULTAT RÉEL :</label>
                <input id="realRes" type="number" step="0.01" placeholder="Ex: 1.04">
            </div>
        </div>
        <button class="btn-calib" onclick="calibrate()">🛠️ SYNCHRONISER L'ALGORITHME</button>
    </div>

    <button class="btn-main" onclick="predict()">🔮 GÉNÉRER LES PRÉDICTIONS</button>

    <div class="flex">
        <button class="btn-tool" onclick="next()">TOUR +1</button>
        <button class="btn-tool" onclick="vider()">VIDER TOUT</button>
    </div>

    <div id="status">En attente de synchronisation...</div>

    <table>
        <thead>
            <tr>
                <th>TOUR</th>
                <th>PRÉDIT</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
    // Mémoire de l'application
    let bestConfig = JSON.parse(localStorage.getItem('herys_config')) || { algo: "SHA-512", bits: 32, sep: ":", edge: 0.98 };

    async function getHash(s, c, n, config) {
        const enc = new TextEncoder();
        // Le secret réside souvent dans l'ordre des seeds et le séparateur
        const msg = `${c}${config.sep}${n}`;
        const data = enc.encode(msg);
        const hashBuf = await crypto.subtle.digest(config.algo, data);
        return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function calc(hash, config) {
        const chars = (config.bits === 32) ? 8 : 13;
        const h = BigInt(`0x${hash.slice(0, chars)}`);
        const e = 2n ** BigInt(config.bits);
        let res = Number(BigInt(Math.floor(config.edge * 100)) * e / (e - h)) / 100;
        return Math.max(1.00, Math.floor(res * 100) / 100);
    }

    async function calibrate() {
        const s = document.getElementById('sSeed').value.trim();
        const c = document.getElementById('cSeed').value.trim();
        const n = document.getElementById('nonce').value;
        const target = parseFloat(document.getElementById('realRes').value);
        const status = document.getElementById('status');

        if(!s || !c || !target) { 
            status.innerHTML = "<span style='color:red'>⚠️ Entrez Seeds + Résultat Réel !</span>"; 
            return; 
        }
        
        status.innerText = "⏳ Scan des protocoles en cours...";
        
        const algos = ["SHA-512", "SHA-256"];
        const bits = [32, 52];
        const seps = [":", "-", ""];
        
        let found = false;
        for(let a of algos) {
            for(let b of bits) {
                for(let sp of seps) {
                    let cfg = { algo: a, bits: b, sep: sp, edge: 0.98 };
                    let h = await getHash(s, c, n, cfg);
                    let res = calc(h, cfg);
                    
                    // Si on est à moins de 0.02 du résultat réel, la formule est validée
                    if(Math.abs(res - target) < 0.02) {
                        bestConfig = cfg;
                        localStorage.setItem('herys_config', JSON.stringify(cfg));
                        status.innerHTML = `✅ ALGO SYNC : ${a} / ${b}bits`;
                        predict();
                        found = true;
                        break;
                    }
                }
                if(found) break;
            }
            if(found) break;
        }
        if(!found) status.innerHTML = "<span style='color:orange'>❌ Échec. Essaye un autre tour récent.</span>";
    }

    async function predict() {
        const s = document.getElementById('sSeed').value.trim();
        const c = document.getElementById('cSeed').value.trim();
        const n = parseInt(document.getElementById('nonce').value);
        const body = document.getElementById('resBody');
        
        if(!s || !c) return;

        let html = "";
        for(let i=1; i<=10; i++) {
            let tour = n + i;
            let h = await getHash(s, c, tour, bestConfig);
            let val = calc(h, bestConfig);
            
            let sig = (val < 2) ? "BAS" : (val < 10) ? "SNIPER" : "🔥 JACKPOT";
            let cls = (val < 2) ? "bleu" : (val < 10) ? "violet" : "win";
            
            html += `<tr><td>#${tour}</td><td class="${cls}">${val.toFixed(2)}x</td><td>${sig}</td></tr>`;
        }
        body.innerHTML = html;
    }

    function next() {
        let nInput = document.getElementById('nonce');
        nInput.value = parseInt(nInput.value) + 1;
        predict();
    }

    function vider() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('resBody').innerHTML = "";
        document.getElementById('status').innerText = "Mémoire effacée.";
    }

    window.onload = () => {
        document.getElementById('status').innerText = `Dernière Sync : ${bestConfig.algo} (${bestConfig.bits}b)`;
    };
</script>
</body>
</html>
