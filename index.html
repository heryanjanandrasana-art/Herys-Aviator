<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V35.2 - FINAL</title>
    <style>
        :root { 
            --premium-v: #8e44ff; --neon-b: #00d2ff; --vif-g: #00ff88; --hot-p: #ff00ff; --gold: #FFD700;
            --bg: #050505; --card: #111111; --border: #222; --danger: #ff4444;
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header-card { background: #0b0b0b; border: 1px solid var(--border); border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-around; }
        .stat-box { text-align: center; }
        .stat-v { font-size: 14px; font-weight: 900; color: var(--vif-g); display: block; }
        .stat-l { font-size: 8px; color: #666; text-transform: uppercase; }

        .img-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 16px; padding: 15px; margin-bottom: 8px; text-align: center; position: relative; }
        .hybrid-box { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
        .t-val { font-size: 32px; font-weight: 900; }
        .conf-circle { width: 75px; height: 75px; border: 5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; background: #000; }
        
        .elite-green { border-color: var(--vif-g) !important; color: var(--vif-g) !important; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .seq-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .seq-box { background: #161616; padding: 8px; border-radius: 8px; font-size: 9px; border: 1px solid #222; text-align: center; }
        .seq-val { font-weight: 900; display: block; margin-top: 4px; font-size: 11px; }

        .input-card { 
            background: var(--card); 
            border-top: 2px solid var(--premium-v); 
            border-radius: 20px 20px 0 0; 
            padding: 12px; 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            z-index: 100; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        .input-card.hidden { transform: translateY(calc(100% - 45px)); }
        .kb-trigger { width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 10px; }
        
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px; }
        .k { background: #222; color: #fff; border: none; padding: 12px 0; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .k-go { background: linear-gradient(45deg, var(--premium-v), var(--hot-p)); color: #fff; grid-column: span 3; font-weight: 900; font-size: 12px; border-radius: 8px; }

        .hist { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; flex-direction: row-reverse; height: 35px; }
        .dot { min-width: 45px; height: 20px; font-size: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
        
        .input-box { flex:1; background:#1a1a1a; color:#fff; padding:10px; border-radius:8px; text-align:center; font-weight:900; border: 2px solid #333; transition: 0.2s; }
        .active-in { border-color: var(--premium-v) !important; background: #222; }
    </style>
</head>
<body>

    <div class="header-card">
        <div class="stat-box"><span class="stat-l">Shield</span><span class="stat-v" id="shield-status">ACTIF</span></div>
        <div class="stat-box"><span class="stat-l">Signal</span><span class="stat-v" id="sig-power">--</span></div>
        <div class="stat-box"><span class="stat-l">Mode</span><span class="stat-v" style="color:var(--neon-b)">AUTO-FLUID</span></div>
    </div>

    <div class="img-card">
        <div class="hybrid-box">
            <div class="target-group"><div style="font-size:9px; color:#aaa;">VIOLET</div><div class="t-val" id="t1-val" style="color:var(--premium-v);">--</div></div>
            <div class="conf-circle" id="conf-circle">--</div>
            <div class="target-group"><div style="font-size:9px; color:#aaa;">ÉLITE VERT</div><div class="t-val" id="t2-val" style="color:var(--hot-p);">--</div></div>
        </div>
        <div id="trend-txt" style="font-size:10px; color:var(--gold); font-weight: 900; height: 15px;">PRÊT</div>
    </div>

    <div class="seq-container" id="seq-list">
        <div class="seq-box">R+1 <span class="seq-val">--</span></div>
        <div class="seq-box">R+2 <span class="seq-val">--</span></div>
        <div class="seq-box">R+3 <span class="seq-val">--</span></div>
        <div class="seq-box">R+4 <span class="seq-val">--</span></div>
        <div class="seq-box">R+5 <span class="seq-val">--</span></div>
    </div>

    <div class="input-card" id="kb-panel">
        <div class="kb-trigger" onclick="toggleKB()"></div>
        <div style="display: flex; gap: 8px;">
            <div id="bH" class="input-box active-in" onclick="showKB('h')">HASH</div>
            <div id="bS" class="input-box" onclick="showKB('s')">LAST X</div>
        </div>
        <div class="kb">
            <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k" onclick="p('A')" style="color:var(--neon-b)">A</button>
            <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k" onclick="p('B')" style="color:var(--neon-b)">B</button>
            <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k" onclick="p('C')" style="color:var(--neon-b)">C</button>
            <button class="k" onclick="p('D')" style="color:var(--neon-b)">D</button><button class="k" onclick="p('E')" style="color:var(--neon-b)">E</button><button class="k" onclick="p('F')" style="color:var(--neon-b)">F</button><button class="k" onclick="p('0')">0</button>
            <button class="k" onclick="p('.')">.</button><button class="k" onclick="p('DEL')" style="color:var(--danger)">⌫</button>
            <button class="k-go" onclick="run()">ANALYSER</button>
        </div>
        <div id="ht" class="hist" style="margin-top:8px;"></div>
    </div>

<script>
    let logs = [];
    let cur = 'h', vH = "", vS = "";
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(freq, dur) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; gain.gain.value = 0.05;
        osc.start(); setTimeout(() => osc.stop(), dur);
    }

    function toggleKB() { document.getElementById('kb-panel').classList.toggle('hidden'); }
    function showKB(mode) { document.getElementById('kb-panel').classList.remove('hidden'); cur = mode; updateInputUI(); }

    function p(v) {
        if(v === 'DEL') { 
            if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1); 
        } else { 
            if(cur === 'h') {
                if(vH.length < 4) { vH += v; if(vH.length === 4) { cur = 's'; playBeep(600, 50); } }
            } else if(cur === 's') { vS += v; }
        }
        updateInputUI();
    }

    function updateInputUI() {
        document.getElementById('bH').innerText = vH || "HASH";
        document.getElementById('bS').innerText = vS || "LAST X";
        document.getElementById('bH').classList.toggle('active-in', cur === 'h');
        document.getElementById('bS').classList.toggle('active-in', cur === 's');
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        document.getElementById('kb-panel').classList.add('hidden');
        const w = parseInt(vH, 16);
        const last = parseFloat(vS);
        const ratio = w / 65535;
        
        let vTarget = 1.40 + (ratio * 2.2);
        let eTarget = 118 / (118 - (ratio * 115.5));

        const shieldStatus = document.getElementById('shield-status');
        if (last <= 1.05) {
            vTarget *= 0.5; eTarget *= 0.2;
            shieldStatus.innerText = "DANGER"; shieldStatus.style.color = "var(--danger)";
            playBeep(200, 400); 
        } else {
            shieldStatus.innerText = "OK"; shieldStatus.style.color = "var(--vif-g)";
        }

        if(last > 10) vTarget *= 0.7;
        if(vH[0].toUpperCase() === 'F') eTarget *= 1.4;

        document.getElementById('t1-val').innerText = vTarget.toFixed(2) + "X";
        document.getElementById('t2-val').innerText = eTarget.toFixed(2) + "X";
        
        const circle = document.getElementById('conf-circle');
        if(eTarget >= 50) {
            circle.className = "conf-circle elite-green";
            playBeep(1200, 150); setTimeout(()=>playBeep(1500, 200), 200);
            document.getElementById('trend-txt').innerText = "🟢 SIGNAL VERT";
        } else {
            circle.className = "conf-circle";
            playBeep(440, 80);
            document.getElementById('trend-txt').innerText = "📡 FLUX OK";
        }

        document.getElementById('sig-power').innerText = (ratio * 100).toFixed(0) + "%";
        circle.innerText = Math.floor(65 + ratio * 34) + "%";

        const seq = document.getElementById('seq-list');
        seq.innerHTML = "";
        for(let i=1; i<=5; i++) {
            let val = (1.1 + (Math.abs(Math.sin(w * i + last)) * 70));
            if (last <= 1.05) val *= 0.4; 
            let col = val >= 50 ? "var(--vif-g)" : (val >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            seq.innerHTML += `<div class="seq-box">R+${i}<span class="seq-val" style="color:${col}">${val.toFixed(2)}X</span></div>`;
        }

        logs.unshift(last); uUI();
        vH = ""; vS = ""; cur = 'h'; 
        setTimeout(() => { updateInputUI(); }, 500);
    }

    function uUI() {
        document.getElementById('ht').innerHTML = logs.slice(0,25).map(e => {
            let c = e >= 50 ? "var(--vif-g)" : (e >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            return `<div class="dot" style="background:${c}">${e.toFixed(1)}</div>`;
        }).join('');
    }
</script>
</body>
</html>
