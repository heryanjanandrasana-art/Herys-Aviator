<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS ELITE V38.9 - SMART SYNC</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #0f0; padding: 10px; margin: 0; }
        .container { border: 2px solid #0f0; padding: 12px; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
        h2 { text-align: center; font-size: 1.1em; text-shadow: 0 0 5px #0f0; }
        
        .box { background: #111; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #333; }
        label { display: block; font-size: 0.65em; color: #bc13fe; font-weight: bold; margin-bottom: 2px; }
        
        input { background: #000; color: #0f0; border: 1px solid #444; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; font-size: 0.9em; margin-bottom: 8px; }

        .btn-main { background: #0f0; color: #000; font-weight: bold; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        .btn-calib { background: #ff00ff; color: #fff; font-size: 0.8em; margin-top: 5px; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; }
        
        #status { font-size: 0.75em; text-align: center; margin: 10px 0; color: #ff0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; }
        th, td { border: 1px solid #222; padding: 8px; text-align: center; }
        .win { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 HERYS ELITE V38.9</h2>

    <div class="box">
        <label>SERVER SEED :</label>
        <input id="sSeed" type="text" placeholder="Hash long...">
        
        <label>CLIENT SEED :</label>
        <input id="cSeed" type="text" placeholder="Seed combiné...">

        <div style="display:flex; gap:5px;">
            <div style="flex:1">
                <label>TOUR (NONCE) :</label>
                <input id="nonce" type="number" value="8093500">
            </div>
            <div style="flex:1">
                <label>RÉSULTAT RÉEL :</label>
                <input id="realRes" type="number" step="0.01" placeholder="Ex: 1.21">
            </div>
        </div>
        <button class="btn-calib" onclick="calibrate()">🛠️ AUTO-CALIBRATION</button>
    </div>

    <button class="btn-main" onclick="predict()">🔮 PRÉDIRE LA SUITE</button>

    <div id="status">En attente de calibration...</div>

    <table>
        <thead>
            <tr>
                <th>TOUR</th>
                <th>PRÉDICTION</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
    let bestConfig = { algo: "SHA-512", bits: 32, sep: ":", edge: 0.98 };

    async function getHash(s, c, n, config) {
        const enc = new TextEncoder();
        const msg = `${c}${config.sep}${n}`;
        const data = enc.encode(msg);
        const hashBuf = await crypto.subtle.digest(config.algo, data);
        return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function calc(hash, config) {
        const chars = (config.bits === 32) ? 8 : 13;
        const h = BigInt(`0x${hash.slice(0, chars)}`);
        const e = 2n ** BigInt(config.bits);
        let res = Number(BigInt(Math.floor(config.edge * 100)) * e / (e - h)) / 100;
        return Math.max(1.00, Math.floor(res * 100) / 100);
    }

    async function calibrate() {
        const s = document.getElementById('sSeed').value.trim();
        const c = document.getElementById('cSeed').value.trim();
        const n = document.getElementById('nonce').value;
        const target = parseFloat(document.getElementById('realRes').value);
        const status = document.getElementById('status');

        if(!s || !c || !target) { status.innerText = "❌ Entre les seeds + le résultat réel !"; return; }
        
        status.innerText = "⏳ Recherche de la formule exacte...";
        
        const algos = ["SHA-512", "SHA-256"];
        const bits = [32, 52];
        const seps = [":", "-", ""];
        
        for(let a of algos) {
            for(let b of bits) {
                for(let sp of seps) {
                    let cfg = { algo: a, bits: b, sep: sp, edge: 0.98 };
                    let h = await getHash(s, c, n, cfg);
                    let res = calc(h, cfg);
                    
                    if(Math.abs(res - target) < 0.05) {
                        bestConfig = cfg;
                        status.innerHTML = `✅ CALIBRÉ ! Mode: ${a} (${b}b) / Séparateur: "${sp}"`;
                        predict();
                        return;
                    }
                }
            }
        }
        status.innerText = "⚠️ Aucune correspondance parfaite. Mode par défaut activé.";
    }

    async function predict() {
        const s = document.getElementById('sSeed').value.trim();
        const c = document.getElementById('clientSeed')?.value || document.getElementById('cSeed').value;
        const n = parseInt(document.getElementById('nonce').value);
        const body = document.getElementById('resBody');
        
        let html = "";
        for(let i=1; i<=8; i++) {
            let tour = n + i;
            let h = await getHash(s, c, tour, bestConfig);
            let val = calc(h, bestConfig);
            let sig = (val < 2) ? "BAS" : (val < 10) ? "SNIPER" : "JACKPOT";
            let cls = (val >= 10) ? "win" : "";
            html += `<tr><td>#${tour}</td><td class="${cls}">${val.toFixed(2)}x</td><td>${sig}</td></tr>`;
        }
        body.innerHTML = html;
    }
</script>
</body>
</html>
