<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS MASTER - ULTIMATE TACTICAL</title>
    <style>
        :root {
            --royal: #7300ff; --bg: #0a0a0a; --card-bg: #161616;
            --success: #00ff88; --danger: #ff3e3e; --neutral: #222;
            /* Paliers de couleurs */
            --lvl-bleu: #00d4ff;   /* 1.00 - 1.99 */
            --lvl-violet: #a335ee; /* 2.00 - 4.99 */
            --lvl-rose: #ff00ff;   /* 5.00 - 9.99 */
            --lvl-vert: #00ff88;   /* 10.00+ */
        }
        body {
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .engine-container {
            background: var(--card-bg); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 20px; border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .input-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 14px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--royal); }
        label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        .btn-main {
            width: 100%; background: var(--royal); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-sync {
            width: 100%; background: transparent; color: var(--success);
            border: 2px solid var(--success); padding: 14px; border-radius: 12px;
            font-weight: 900; cursor: pointer; margin: 15px 0;
        }

        /* Graphique Barres */
        .energy-grid {
            height: 60px; display: flex; align-items: flex-end; gap: 4px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 5px;
        }
        .energy-bar { flex: 1; border-radius: 2px 2px 0 0; transition: height 0.5s ease; }

        #cycle-status { font-size: 11px; font-weight: bold; text-align: center; margin-bottom: 15px; }

        .time-display {
            text-align: center; padding: 15px; border: 2px solid #333;
            border-radius: 15px; margin-bottom: 15px;
        }
        #t1 { font-size: 38px; font-weight: 900; letter-spacing: 2px; color: var(--success); }

        /* Historique & Badges */
        .history-header {
            display: flex; justify-content: space-between; width: 100%;
            max-width: 400px; margin-top: 20px; font-size: 11px; color: #555;
        }
        #hist-list { width: 100%; max-width: 400px; }
        .history-item {
            background: #111; margin-top: 8px; padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; font-size: 13px; align-items: center;
        }
        .badge-x {
            padding: 6px 12px; border-radius: 8px; font-weight: 900; font-size: 15px;
            min-width: 65px; text-align: center;
        }
    </style>
</head>
<body>

    <div style="font-weight: 900; color: var(--royal); font-size: 28px; margin-bottom: 15px;">HERYS MASTER</div>
    
    <div class="engine-container">
        <div class="input-group">
            <label>Saisie Tactique (Heure & X)</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="manualTime" placeholder="12:00:00" style="flex: 1.5;">
                <input type="number" id="inputX" placeholder="X.XX" step="0.01" style="flex: 1;">
            </div>
            <button class="btn-main" onclick="analyze(false)">ANALYSER LE VOL</button>
        </div>

        <button class="btn-sync" onclick="analyze(true)">⚡ SYNC EXPLOSION DIRECTE</button>

        <div id="energy-container" class="energy-grid"></div>
        <div id="cycle-status">EN ATTENTE...</div>

        <div class="time-display">
            <label>Prochaine Prédiction</label>
            <div id="t1">--:--:--</div>
            <div id="count-label" style="font-size: 11px; font-weight: bold; color: var(--danger); height: 15px; margin-top: 5px;"></div>
        </div>
    </div>

    <div class="history-header">
        <span>HISTORIQUE DES PRÉDICTIONS</span>
        <span onclick="clearHistory()" style="cursor:pointer; color: var(--danger);">🗑️ EFFACER</span>
    </div>
    <div id="hist-list"></div>

    <script>
        let nextTime = null;
        let historiqueX = JSON.parse(localStorage.getItem('herys_history')) || [];

        window.onload = () => {
            const now = new Date();
            document.getElementById('manualTime').value = now.toTimeString().split(' ')[0];
            refreshUI();
        };

        function analyze(isSync) {
            const inputX = parseFloat(document.getElementById('inputX').value);
            const timeStr = document.getElementById('manualTime').value;
            if (isNaN(inputX)) return;

            let dateRef = new Date();
            if (!isSync) {
                let parts = timeStr.split(':');
                dateRef.setHours(parseInt(parts[0])||0, parseInt(parts[1])||0, parseInt(parts[2])||0, 0);
            }

            const dureeVol = Math.log(inputX) / Math.log(1.10);
            nextTime = new Date(dateRef.getTime() + (dureeVol * 1000) + 6250);
            document.getElementById('t1').innerText = nextTime.toTimeString().split(' ')[0];
            
            historiqueX.push(inputX);
            if(historiqueX.length > 10) historiqueX.shift();
            localStorage.setItem('herys_history', JSON.stringify(historiqueX));
            refreshUI();
        }

        function refreshUI() {
            const container = document.getElementById('energy-container');
            const status = document.getElementById('cycle-status');
            const hist = document.getElementById('hist-list');
            
            container.innerHTML = "";
            hist.innerHTML = "";

            historiqueX.forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'energy-bar';
                let color = getPalierColor(val);
                bar.style.backgroundColor = color;
                bar.style.boxShadow = `0 0 10px ${color}44`;
                const heightPercent = Math.min((val / 10) * 100, 100);
                bar.style.height = `${Math.max(heightPercent, 10)}%`; 
                container.appendChild(bar);
            });

            if(historiqueX.length > 0) {
                const last = historiqueX[historiqueX.length - 1];
                status.innerHTML = `<span style="color:${getPalierColor(last)}">PRÉDICTION : CYCLE ${last < 2 ? 'RÉCUPÉRATION' : 'PROFIT'}</span>`;
            }

            [...historiqueX].reverse().forEach(x => {
                const item = document.createElement('div');
                item.className = 'history-item';
                let color = getPalierColor(x);
                item.innerHTML = `
                    <span style="color:#666; font-size:10px;">SIGNAL</span> 
                    <span class="badge-x" style="background:${color}15; color:${color}; border: 1px solid ${color}">
                        ${x.toFixed(2)}x
                    </span>
                `;
                hist.appendChild(item);
            });
        }

        function getPalierColor(val) {
            if (val < 2) return 'var(--lvl-bleu)';
            if (val < 5) return 'var(--lvl-violet)';
            if (val < 10) return 'var(--lvl-rose)';
            return 'var(--lvl-vert)';
        }

        function clearHistory() {
            if(confirm("Effacer l'historique ?")) {
                historiqueX = [];
                localStorage.removeItem('herys_history');
                refreshUI();
            }
        }

        setInterval(() => {
            if (!nextTime) return;
            let diff = Math.floor((nextTime - new Date()) / 1000);
            const label = document.getElementById('count-label');
            if (diff > 0) {
                label.innerText = `DÉCOLLAGE DANS ${diff}S`;
            } else if (diff > -5) {
                label.innerText = "VOL EN COURS...";
            } else {
                label.innerText = "";
                nextTime = null;
            }
        }, 1000);
    </script>
</body>
</html>
