<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERYS ELITE V40 - PLATINUM</title>
    <style>
        :root {
            --bg-dark: #050508;
            --panel: rgba(20, 20, 30, 0.8);
            --gold: #D4AF37;
            --violet: #8A2BE2;
            --rose: #FF1493;
            --bas: #444;
            --text-main: #E0E0FF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #appContent {
            display: none; /* Masqué jusqu'à validation du code */
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h2 {
            color: var(--gold);
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        .version {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
            display: block;
        }

        #display {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 25px 0;
            min-height: 60px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.8rem;
            color: #9CA3B7;
            margin-left: 10px;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0F0F1A;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .btn-predict {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
            transition: transform 0.1s;
        }

        .btn-predict:active { transform: scale(0.96); }

        .history-container {
            margin-top: 25px;
            text-align: left;
        }

        .history-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none; /* Firefox */
        }

        .history-list::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .badge {
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 45px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="appContent">
    <div class="glass-card">
        <h2>HERYS ELITE</h2>
        <span class="version">V40.0 PLATINUM MASTER</span>
        
        <div id="display" style="color: #444;">PRÊT</div>
        
        <div class="input-group">
            <label>DERNIER MULTIPLICATEUR :</label>
            <input type="number" step="0.01" id="valInput" placeholder="0.00" inputmode="decimal">
        </div>
        
        <button class="btn-predict" onclick="analyzeData()">ANALYSER CYCLE</button>

        <div class="history-container">
            <label>HISTORIQUE RÉCENT :</label>
            <div class="history-list" id="history"></div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SECRET_HASH = "809865662706e40854f9a06689d7010411a2f6460980590c6810a9058b8d00d2"; // code: anja2026
    let history = [];
    
    // Éléments DOM cachés (Optimisation Perplexity)
    const display = document.getElementById('display');
    const input = document.getElementById('valInput');
    const historyBox = document.getElementById('history');

    // --- SÉCURITÉ ---
    async function verifyAccess() {
        const pass = prompt("Entrez la clé d'accès Herys Elite :");
        if(!pass) return window.location.reload();

        const msgUint8 = new TextEncoder().encode(pass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if (hashHex === SECRET_HASH) {
            document.getElementById('appContent').style.display = "block";
        } else {
            alert("Clé invalide.");
            window.location.reload();
        }
    }

    // --- LOGIQUE CORE ---
    function categorize(v) {
        if (v >= 2 && v < 5) return "VIOLET";
        if (v >= 5) return "ROSE";
        return "BAS";
    }

    function analyzeData() {
        const val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) return;

        history.push(val);
        
        // UI Updates
        updateUI();
        makePrediction();

        // Mobile UX: Reset & Keep keyboard open
        input.value = "";
        input.focus();
    }

    function makePrediction() {
        if (history.length < 5) {
            display.innerText = "DATA INSUFFISANTE";
            display.style.color = "#444";
            return;
        }

        // Algorithme de Transition (Logic ChatGPT)
        let transitions = { "BAS": { "VIOLET": 0, "ROSE": 0 }, "VIOLET": { "VIOLET": 0, "ROSE": 0 }, "ROSE": { "VIOLET": 0, "ROSE": 0 } };
        
        for (let i = 0; i < history.length - 1; i++) {
            let current = categorize(history[i]);
            let next = categorize(history[i+1]);
            if (transitions[current] && next !== "BAS") {
                transitions[current][next]++;
            }
        }

        const lastCat = categorize(history[history.length - 1]);
        const nextStats = transitions[lastCat];

        // Décision
        if (nextStats.ROSE >= nextStats.VIOLET && nextStats.ROSE > 0) {
            display.innerText = "ROSE PROBABLE";
            display.style.color = "#FF1493";
        } else if (nextStats.VIOLET > 0) {
            display.innerText = "VIOLET PROBABLE";
            display.style.color = "#8A2BE2";
        } else {
            display.innerText = "CYCLE INSTABLE";
            display.style.color = "#D4AF37";
        }
        
        display.style.textShadow = `0 0 20px ${display.style.color}`;
    }

    function updateUI() {
        // Optimisation DocumentFragment (Logic Perplexity)
        historyBox.innerHTML = "";
        const fragment = document.createDocumentFragment();
        const recent = history.slice(-6);

        recent.forEach(h => {
            const span = document.createElement('span');
            span.className = 'badge';
            const cat = categorize(h);
            span.style.background = cat === "VIOLET" ? "#8A2BE2" : (cat === "ROSE" ? "#FF1493" : "#333");
            span.textContent = h.toFixed(2);
            fragment.appendChild(span);
        });
        historyBox.appendChild(fragment);
    }

    // Initialisation
    window.onload = verifyAccess;
</script>

</body>
</html>
