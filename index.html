<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS HYBRID v6.0 - COUNTDOWN PRO</title>
    <style>
        :root { --neon: #22c55e; --danger: #e91e63; --royal: #9b59b6; --bg: #050507; --glass: rgba(255, 255, 255, 0.05); }
        body { display: none; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; flex-direction: column; align-items: center; margin: 0; padding-bottom: 50px; }
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; background: var(--glass); border-bottom: 1px solid #1a1a20; font-size: 11px; }
        .brand { font-size: 32px; font-weight: 900; letter-spacing: 10px; color: var(--neon); text-shadow: 0 0 20px rgba(34, 197, 94, 0.6); margin: 20px 0; }
        
        /* Compte à rebours */
        .timer-display { font-size: 14px; color: #aaa; margin-bottom: 10px; font-weight: bold; letter-spacing: 2px; }
        #countdown { color: var(--neon); font-size: 22px; }

        .engine-container { width: 90%; max-width: 400px; background: #0c0c0f; border-radius: 25px; padding: 20px; border: 1px solid #222; position: relative; overflow: hidden; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon); top: -2px; left: 0; opacity: 0.2; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        label { font-size: 9px; color: #555; font-weight: bold; display: block; margin-top: 10px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #1a1a20; border-radius: 12px; padding: 15px; color: var(--neon); font-size: 22px; text-align: center; margin: 8px 0; box-sizing: border-box; outline: none; }
        input[type="time"] { color-scheme: dark; }

        .res-grid { display: grid; gap: 12px; margin-top: 15px; }
        .card { background: #050507; border-radius: 15px; padding: 15px; border: 1px solid #1a1a20; text-align: center; }
        .time { font-size: 28px; font-weight: bold; font-family: monospace; display: block; letter-spacing: 2px; }
        .label { font-size: 9px; font-weight: 900; margin-top: 5px; color: #444; }

        .btn-main { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; width: 90%; max-width: 400px; cursor: pointer; margin-top: 20px; font-size: 16px; text-transform: uppercase; }
        .history { width: 90%; max-width: 400px; margin-top: 25px; font-size: 10px; color: #666; }
    </style>

    <script>
        const AUTH = { "hery": "Nandrasana" };
        let countdownInterval;

        function checkAuth() {
            if (sessionStorage.getItem("h_auth") !== "true") {
                const u = prompt("USER:"); const p = prompt("PASS:");
                if (AUTH[u] && AUTH[u] === p) { sessionStorage.setItem("h_auth", "true"); window.location.reload(); }
                else { window.location.href = "https://google.com"; }
            } else { document.addEventListener("DOMContentLoaded", () => { document.body.style.display = "flex"; syncTana(); setInterval(syncTana, 1000); }); }
        }

        function syncTana() {
            const t = new Date().toLocaleString("en-US", {timeZone: "Indian/Antananarivo", hour12: false});
            document.getElementById('clock').innerText = "EAT TANA: " + new Date(t).toTimeString().split(' ')[0];
        }

        function startTimer(targetTimeStr) {
            clearInterval(countdownInterval);
            const countdownEl = document.getElementById('countdown');
            
            countdownInterval = setInterval(() => {
                const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Indian/Antananarivo"}));
                const [h, m, s] = targetTimeStr.split(':').map(Number);
                const target = new Date(now);
                target.setHours(h, m, s, 0);

                const diff = target - now;

                if (diff <= 0) {
                    countdownEl.innerText = "PRÊT ! MISER MAINTENANT";
                    countdownEl.style.color = "#e91e63";
                    clearInterval(countdownInterval);
                } else {
                    const mins = Math.floor(diff / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    countdownEl.innerText = `${mins}m ${secs}s RESTANTS`;
                    countdownEl.style.color = "#22c55e";
                }
            }, 1000);
        }

        function runHybridAnalysis() {
            const lastX = parseFloat(document.getElementById('inputX').value);
            const lastTimeVal = document.getElementById('lastTime').value;
            if(isNaN(lastX) || !lastTimeVal) return alert("Remplir l'heure et le X");

            let [h, m] = lastTimeVal.split(':').map(Number);
            
            function predict(addMin) {
                let sec = 07; // Pause de 7s respectée
                let nm = m + addMin;
                let nh = h;
                if(nm >= 60) { nm -= 60; nh += 1; }
                return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }

            let r1 = predict(lastX < 2.0 ? 2 : 3);
            document.getElementById('t1').innerText = r1;
            document.getElementById('t2').innerText = predict(5);
            
            // Lancer le chrono sur le premier signal
            startTimer(r1);

            const item = document.createElement('div');
            item.innerHTML = `Explosion: ${lastTimeVal} -> <b style="color:var(--neon)">Décollage: ${r1}</b>`;
            document.getElementById('hist-list').prepend(item);
        }
        checkAuth();
    </script>
</head>
<body>
    <div class="status-bar">
        <span id="clock">--:--:--</span>
        <span onclick="sessionStorage.clear(); location.reload();" style="color:var(--danger); cursor:pointer;">SORTIR</span>
    </div>

    <div class="brand">HERYS</div>

    <div class="timer-display">PROCHAIN SIGNAL DANS : <span id="countdown">-- --</span></div>

    <div class="engine-container">
        <div class="scan-line"></div>
        <label>Heure du dernier vol (ex: 17:56)</label>
        <input type="time" id="lastTime">
        <label>Multiplicateur (X)</label>
        <input type="number" id="inputX" placeholder="1.21">

        <div class="res-grid">
            <div class="card" style="border-color: var(--royal);">
                <span class="time" id="t1" style="color: var(--royal);">--:--:--</span>
                <span class="label">DÉCOLLAGE ESTIMÉ</span>
            </div>
            <div class="card" style="border-color: var(--danger);">
                <span class="time" id="t2" style="color: var(--danger);">--:--:--</span>
                <span class="label">SIGNAL SÉCURITÉ</span>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="runHybridAnalysis()">Générer Signal & Chrono</button>

    <div class="history" id="hist-list"></div>
</body>
</html>
