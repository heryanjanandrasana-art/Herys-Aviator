<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS ELITE V38.3 - PRO</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 10px; margin: 0; }
        .container { max-width: 100%; border: 1px solid #0f0; padding: 15px; box-shadow: 0 0 10px #0f0; }
        h2 { text-align: center; font-size: 1.1em; color: #0f0; text-shadow: 0 0 5px #0f0; margin-bottom: 20px; }
        
        label { display: block; margin-top: 10px; font-size: 0.75em; color: #bc13fe; font-weight: bold; }
        input, button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; margin: 5px 0; width: 100%; box-sizing: border-box; outline: none; border-radius: 4px; }
        
        .flex-row { display: flex; gap: 8px; }
        #nonceInput { width: 35%; text-align: center; font-weight: bold; color: #ff00ff; }

        button { cursor: pointer; font-weight: bold; background: #0f0; color: #000; transition: 0.2s; border: none; }
        button:active { transform: scale(0.98); background: #bc13fe; }
        .copy-btn { background: #333; color: #fff; font-size: 0.8em; padding: 5px; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
        th { background: #111; color: #bc13fe; font-size: 0.8em; }

        .bleu { color: #3498db; }
        .violet { color: #bc13fe; font-weight: bold; }
        .rose { color: #ff00ff; font-weight: bold; animation: glow 1s infinite alternate; }
        
        @keyframes glow {
            from { text-shadow: 0 0 2px #ff00ff; }
            to { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        #status { margin-top: 15px; padding: 10px; border-left: 3px solid #0f0; font-size: 0.8em; background: #0a0a0a; min-height: 20px; }
    </style>
</head>
<body>

<div class="container" id="mainApp">
    <h2>🛩️ HERYS ELITE V38.3 (ALERTE)</h2>

    <label>Server Seed (depuis la vidéo) :</label>
    <input id="serverSeed" type="text" placeholder="Coller le Hash ici...">

    <div class="flex-row">
        <div style="flex-grow: 1;">
            <label>Client Seed :</label>
            <input id="clientSeed" type="text" value="0000000000000000000">
        </div>
        <div style="width: 80px;">
            <label>Tour (Nonce) :</label>
            <input id="nonceInput" type="number" value="1">
        </div>
    </div>

    <button onclick="genererPrevisions()">🔥 ANALYSER & SURVEILLER</button>
    <button class="copy-btn" onclick="copierResultats()">📋 COPIER LA LISTE</button>

    <div id="status">Prêt pour l'analyse...</div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>TOUR</th>
                <th>CÔTE</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    async function hmacSha512(key, message) {
        const encoder = new TextEncoder();
        const cryptoKey = await crypto.subtle.importKey(
            "raw", encoder.encode(key),
            { name: "HMAC", hash: "SHA-512" },
            false, ["sign"]
        );
        const signature = await crypto.subtle.sign("HMAC", cryptoKey, encoder.encode(message));
        return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function calculateMultiplier(hash) {
        const hex13 = hash.slice(0, 13);
        const intVal = parseInt(hex13, 16);
        const floatVal = intVal / Math.pow(2, 52);
        const result = 0.97 / (1 - floatVal);
        return Math.max(1.00, Math.floor(result * 100) / 100);
    }

    async function genererPrevisions() {
        const sSeed = document.getElementById('serverSeed').value.trim();
        const cSeed = document.getElementById('clientSeed').value.trim();
        const startNonce = parseInt(document.getElementById('nonceInput').value);
        const statusEl = document.getElementById('status');
        const resBody = document.getElementById('resBody');
        const alertSnd = document.getElementById('alertSound');

        if (!sSeed) {
            statusEl.innerHTML = "<span style='color:red'>⚠️ Entrez la Server Seed !</span>";
            return;
        }

        let tempHTML = "";
        let roseDetecte = false;
        let listePrevisions = "";

        for (let i = 0; i < 10; i++) {
            let currentNonce = startNonce + i;
            const hash = await hmacSha512(sSeed, `${cSeed}:${currentNonce}`);
            const mult = calculateMultiplier(hash);

            let colorClass = mult < 2 ? 'bleu' : mult < 10 ? 'violet' : 'rose';
            let icon = mult < 2 ? '🔵' : mult < 10 ? '🟣' : '🌸';

            if (mult >= 10) roseDetecte = true;

            tempHTML += `
                <tr>
                    <td>#${currentNonce}</td>
                    <td class="${colorClass}"><b>${mult.toFixed(2)}x</b></td>
                    <td class="${colorClass}">${icon}</td>
                </tr>
            `;
        }

        resBody.innerHTML = tempHTML;

        if (roseDetecte) {
            statusEl.innerHTML = "<span style='color:#ff00ff'>🚨 ALERTE : ROSE DÉTECTÉ DANS LA SÉQUENCE !</span>";
            alertSnd.play().catch(e => console.log("Audio bloqué par le navigateur"));
            document.getElementById('mainApp').style.borderColor = "#ff00ff";
        } else {
            statusEl.innerHTML = "✅ Analyse stable (Pas de Rose imminent).";
            document.getElementById('mainApp').style.borderColor = "#0f0";
        }
    }

    function copierResultats() {
        const rows = document.querySelectorAll('#resBody tr');
        let texte = "Herys Elite V38.3 Results:\n";
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            texte += `${cells[0].innerText} : ${cells[1].innerText}\n`;
        });
        navigator.clipboard.writeText(texte);
        alert("Copié dans le presse-papier !");
    }
</script>

</body>
</html>
