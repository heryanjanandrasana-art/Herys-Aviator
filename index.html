<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS MASTER-EDITION</title>
    <style>
        :root {
            --royal: #7300ff; --rose: #ff00ff; --blue: #00d4ff;
            --danger: #ff4b2b; --bg: #0a0a0a; --card-bg: #161616;
            --success: #00ff88;
        }
        body {
            background-color: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .engine-container {
            background: var(--card-bg); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 20px; border: 1px solid #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        /* Timer & Tendance */
        .time-display {
            text-align: center; padding: 20px; border: 2px solid #333;
            border-radius: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.02);
        }
        #t1 { font-size: 38px; font-weight: 900; letter-spacing: 1px; }
        .trend-bar { display: flex; justify-content: center; gap: 15px; font-size: 10px; margin-top: 10px; font-weight: bold; }
        
        /* Grille & Cards */
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .card { border: 2px solid #333; padding: 12px; border-radius: 12px; text-align: center; transition: 0.5s; }
        .fiab { font-size: 9px; opacity: 0.7; margin-top: 4px; }

        /* Buttons */
        .btn-sync {
            width: 100%; background: transparent; color: var(--success);
            border: 2px solid var(--success); padding: 14px; border-radius: 12px;
            font-weight: 900; cursor: pointer; margin-bottom: 15px; transition: 0.2s;
        }
        .btn-sync:active { transform: scale(0.95); background: rgba(0,255,136,0.1); }
        
        .btn-main {
            width: 100%; background: var(--royal); color: white;
            border: none; padding: 16px; border-radius: 12px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* Inputs */
        .input-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        input {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;
        }
        label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* Animations */
        @keyframes urgent-blink { 50% { border-color: var(--danger); box-shadow: 0 0 20px var(--danger); transform: scale(1.02); } }
        .urgent { animation: urgent-blink 0.5s infinite; }
        
        .history-item {
            background: #111; margin-top: 8px; padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; font-size: 13px; border-left: 4px solid var(--royal);
        }
    </style>
</head>
<body>

    <div style="font-weight: 900; color: var(--royal); font-size: 32px; letter-spacing: -1px;">HERYS <span style="color:white; font-size: 12px; vertical-align: middle; opacity: 0.5;">MASTER</span></div>
    
    <div class="engine-container" style="margin-top: 15px;">
        <div id="main-timer-box" class="time-display">
            <div style="font-size: 9px; color: #555; letter-spacing: 2px; margin-bottom: 5px;">PROCHAIN SIGNAL CALCULÉ</div>
            <div id="t1">--:--:--</div>
            <div id="count-label" style="font-size: 11px; color: var(--danger); font-weight: bold; height: 15px;"></div>
            
            <div class="trend-bar">
                <span id="trend-up" style="opacity: 0.2;">📈 HAUSSE</span>
                <span id="trend-stable" style="color: var(--blue);">● STABLE</span>
                <span id="trend-down" style="opacity: 0.2;">📉 BAISSE</span>
            </div>
        </div>

        <div class="res-grid">
            <div id="c1" class="card">
                <span style="font-size: 9px; color: #888;">SAFE</span>
                <div id="p1" style="font-size: 20px; font-weight: bold;">--</div>
                <div id="f1" class="fiab"></div>
            </div>
            <div id="c2" class="card">
                <span style="font-size: 9px; color: #888;">RISK</span>
                <div id="p2" style="font-size: 20px; font-weight: bold;">--</div>
                <div id="f2" class="fiab"></div>
            </div>
        </div>

        <div id="bank-box" style="background: rgba(0,255,136,0.05); padding: 12px; border-radius: 12px; border: 1px solid #00ff8822; margin-bottom: 15px; text-align: center;">
            <label style="color: var(--success);">Conseil de Mise</label>
            <div id="bet-advice" style="font-weight: bold; font-size: 14px;">SOLDE REQUIS</div>
            <input type="number" id="balance" placeholder="Votre Solde (ex: 500)" style="margin-top: 10px; border-color: #00ff8844; text-align: center; height: 35px;">
        </div>

        <button class="btn-sync" onclick="analyze(true)">⚡ SYNC EXPLOSION DIRECTE ⚡</button>
        
        <div class="input-group">
            <label>Analyse manuelle (Historique)</label>
            <input type="time" id="lastTime">
            <input type="number" id="inputX" placeholder="Dernier Multiplicateur (ex: 1.85)" step="0.01">
            <button class="btn-main" onclick="analyze(false)">Lancer l'Analyse</button>
        </div>
    </div>

    <div id="hist-list" style="width:100%; max-width:400px; margin-top:20px;"></div>

    <script>
        let nextTime = null;
        let historiqueX = [];

        function analyze(isSync) {
            const inputX = parseFloat(document.getElementById('inputX').value);
            const timeVal = document.getElementById('lastTime').value;
            const solde = parseFloat(document.getElementById('balance').value) || 0;

            if (isNaN(inputX)) return alert("Entrez le dernier X");

            let dateRef = new Date();
            if (!isSync) {
                if (!timeVal) return alert("Entrez l'heure du bet");
                let [h, m] = timeVal.split(':').map(Number);
                dateRef.setHours(h, m, 30, 0); 
            }

            // Calcul du Timing
            const dureeVol = Math.log(inputX) / Math.log(1.10);
            nextTime = new Date(dateRef.getTime() + (dureeVol * 1000) + 6250);
            
            document.getElementById('t1').innerText = nextTime.toTimeString().split(' ')[0];
            document.getElementById('t1').style.color = isSync ? "#00ff88" : "#ffcc00";

            // Analyse de Cycle
            historiqueX.push(inputX);
            if(historiqueX.length > 8) historiqueX.shift();
            let score = historiqueX.filter(x => x < 1.8).length;
            
            // UI & Tendance
            let color = score >= 3 ? "#ff00ff" : "#00d4ff";
            let fSafe = score >= 3 ? "95%" : "88%";
            let fRisk = score >= 3 ? "75%" : "60%";
            
            updateUI(color, score >= 3 ? "1.50X+" : "1.20X", score >= 3 ? "2.10X+" : "1.50X", fSafe, fRisk);
            updateTrend(historiqueX);
            
            // Bankroll
            if (solde > 0) {
                let mise = score >= 3 ? solde * 0.05 : solde * 0.02;
                document.getElementById('bet-advice').innerText = "MISEZ : " + mise.toFixed(2) + " (MAX)";
            }

            // Historique
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>[${nextTime.toLocaleTimeString()}]</span> <span>X: ${inputX.toFixed(2)}</span> <span style="color:${color}">●</span>`;
            document.getElementById('hist-list').prepend(item);
        }

        function updateUI(c, v1, v2, f1, f2) {
            document.getElementById('c1').style.borderColor = c;
            document.getElementById('c2').style.borderColor = c;
            document.getElementById('p1').innerText = v1; document.getElementById('p1').style.color = c;
            document.getElementById('p2').innerText = v2; document.getElementById('p2').style.color = c;
            document.getElementById('f1').innerText = "FIAB: " + f1;
            document.getElementById('f2').innerText = "FIAB: " + f2;
        }

        function updateTrend(list) {
            const avg = list.reduce((a,b) => a+b, 0) / list.length;
            document.getElementById('trend-up').style.opacity = avg > 2 ? "1" : "0.2";
            document.getElementById('trend-down').style.opacity = avg < 1.4 ? "1" : "0.2";
            document.getElementById('trend-stable').style.opacity = (avg >= 1.4 && avg <= 2) ? "1" : "0.2";
        }

        setInterval(() => {
            if (!nextTime) return;
            let diff = Math.floor((nextTime - new Date()) / 1000);
            let label = document.getElementById('count-label');
            let box = document.getElementById('main-timer-box');

            if (diff > 0) {
                label.innerText = `DÉCOLLAGE DANS ${diff}S`;
                if (diff <= 10) box.classList.add('urgent');
                else box.classList.remove('urgent');
            } else if (diff > -5) {
                label.innerText = "VOL EN COURS...";
                box.classList.remove('urgent');
            } else {
                label.innerText = "";
                box.classList.remove('urgent');
                nextTime = null;
            }
        }, 1000);
    </script>
</body>
</html>
