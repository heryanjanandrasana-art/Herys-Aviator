<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERYS ELITE V41</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
:root {
    --gold: #d4af37;
    --pink: #ec4899;
    --blue: #3b82f6;
    --violet: #a855f7;
    --bg: #0a0a0a;
}

body {
    background: var(--bg);
    color: #fff;
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 450px;
    background: #161616;
    border-radius: 20px;
    padding: 20px;
}

h1 {
    text-align: center;
    color: var(--gold);
}

input {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border-radius: 10px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: var(--gold);
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 10px;
}

#display {
    font-size: 3rem;
    text-align: center;
    margin: 15px 0;
}

.scan-item {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #222;
    padding: 5px 0;
}

.stat {
    margin-top: 15px;
    padding: 10px;
    background: #222;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>HERYS ELITE V41</h1>

<input id="seed" placeholder="Server Seed (hash)">
<input id="c1" placeholder="Client Seed 1" value="0">
<input id="c2" placeholder="Client Seed 2" value="0">
<input id="c3" placeholder="Client Seed 3" value="0">
<input id="nonce" type="number" placeholder="Nonce">

<button onclick="run()">SCANNER</button>

<div id="display">---</div>

<div class="stat">
PROBA ROSE : <span id="prob">0%</span>
</div>

<div id="list"></div>

</div>

<script>

function crash(seed, c1, c2, c3, nonce) {
    const input = seed + c1 + c2 + c3 + nonce;
    const hash = CryptoJS.SHA512(input).toString();

    if (parseInt(hash.substring(0, 8), 16) % 33 === 0) return 1.00;

    const h = parseInt(hash.substring(0, 13), 16) / Math.pow(2, 52);
    return Math.floor((0.97 / (1 - h)) * 100) / 100;
}

function analyze(results) {
    let high = 0;

    results.forEach(r => {
        if (r >= 10) high++;
    });

    return (high / results.length) * 100;
}

function run() {

    const seed = document.getElementById("seed").value;
    const c1 = document.getElementById("c1").value;
    const c2 = document.getElementById("c2").value;
    const c3 = document.getElementById("c3").value;
    const nonce = parseInt(document.getElementById("nonce").value);

    if (!seed || isNaN(nonce)) {
        alert("Remplis les champs !");
        return;
    }

    let html = "";
    let results = [];

    for (let i = 1; i <= 10; i++) {

        const n = nonce + i;
        const res = crash(seed, c1, c2, c3, n);

        results.push(res);

        let color = "#3b82f6";

        if (res >= 10) color = "#ec4899";
        else if (res >= 2) color = "#a855f7";

        html += `
        <div class="scan-item" style="color:${color}">
            <span>TOUR ${n}</span>
            <b>${res.toFixed(2)}x</b>
        </div>`;
    }

    document.getElementById("list").innerHTML = html;

    const prob = analyze(results);

    document.getElementById("prob").innerText = prob.toFixed(1) + "%";

    document.getElementById("display").innerText =
        results[0].toFixed(2) + "x";

}

</script>

</body>
</html>
