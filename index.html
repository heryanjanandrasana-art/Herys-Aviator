<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERYS PRO AI V2</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #050505;
    color: #00f2ff;
    font-family: 'Orbitron', monospace;
    text-align: center;
}

input, button {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #00f2ff;
    background: #111;
    color: #00f2ff;
    width: 250px;
}

button {
    background: linear-gradient(45deg, #00f2ff, #ff007b);
    color: black;
    font-weight: bold;
}

#signal {
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🔥 HERYS PRO AI V2</h2>

<input id="mult" placeholder="Multiplicateur"><br>

<button onclick="analyze()">ANALYSER</button>

<div id="result"></div>
<div id="prob"></div>
<div id="prediction"></div>
<div id="signal"></div>

<canvas id="chart" width="300" height="150"></canvas>

<script>
let history = [];

function weightedProb(history) {
    let low = 0, mid = 0, high = 0;
    let totalWeight = 0;

    history.forEach((v, i) => {
        let weight = history.length - i;
        totalWeight += weight;

        if (v < 2) low += weight;
        else if (v < 5) mid += weight;
        else high += weight;
    });

    return {
        low: (low / totalWeight) * 100 || 0,
        mid: (mid / totalWeight) * 100 || 0,
        high: (high / totalWeight) * 100 || 0
    };
}

function simulate10(probs) {
    let out = [];
    let rose = false;

    for (let i = 0; i < 10; i++) {
        let r = Math.random() * 100;

        if (r < probs.low) {
            out.push("🔵");
        } else if (r < probs.low + probs.mid) {
            out.push("🟣");
        } else {
            out.push("🔴⭐");
            rose = true;
        }
    }

    return { out, rose };
}

let chart;

function updateChart(data) {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: data.map((_, i) => i + 1),
            datasets: [{
                label: 'Multiplicateur',
                data: data
            }]
        }
    });
}

function analyze() {
    let mult = parseFloat(document.getElementById("mult").value);

    if (isNaN(mult)) return;

    history.unshift(mult);
    if (history.length > 20) history.pop();

    let probs = weightedProb(history);

    let sim = simulate10(probs);

    let confidence = (probs.high * 0.5 + probs.mid * 0.3 + probs.low * 0.2);

    let signal = "ATTENDRE";
    if (confidence > 60) signal = "MISER";
    if (probs.high > 30) signal = "FORT RISQUE 🔥";

    document.getElementById("result").innerHTML = "Historique OK";

    document.getElementById("prob").innerHTML = `
    🔵 Low: ${probs.low.toFixed(1)}%<br>
    🟣 Mid: ${probs.mid.toFixed(1)}%<br>
    🔴 High: ${probs.high.toFixed(1)}%
    `;

    document.getElementById("prediction").innerHTML =
        "🎯 10 tours: " + sim.out.join(" ");

    document.getElementById("signal").innerHTML =
        "⚡ SIGNAL: " + signal +
        (sim.rose ? "<br>⭐ ROSE détecté" : "<br>⚠️ Aucun rose");

    updateChart(history);
}
</script>

</body>
</html>
