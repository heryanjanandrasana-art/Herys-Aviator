<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V7.9 - ULTRA-FLEX</title>
    <style>
        :root {
            --royal: #7300ff; --lvl-bleu: #00d4ff; --lvl-vert: #00ff88;
            --lvl-rose: #ff00ff; --bg: #050505; --card-bg: #121212; --danger: #ff2a2a;
        }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .engine-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .glass-card { background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #222; position: relative; }
        .smart-input { background: #000; border: 2px solid #333; color: white; padding: 15px; border-radius: 12px; font-size: 14px; width: 100%; text-align: center; box-sizing: border-box; transition: 0.3s; }
        .smart-input:focus { border-color: var(--royal); outline: none; }
        .btn-main { width: 100%; background: linear-gradient(45deg, var(--royal), #9d4cff); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 16px; }
        #prob-indicator { text-align: center; font-size: 11px; font-weight: 900; padding: 8px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .high-prob { display: block !important; background: var(--lvl-vert); color: black; animation: pulse 0.8s infinite; }
        @keyframes pulse { 50% { transform: scale(1.02); } }
        .prediction-display { background: #000; padding: 20px; border-radius: 25px; border: 2px solid #222; text-align: center; }
        .timer-val { font-size: 34px; font-weight: 900; }
        .prefix-display { font-size: 45px; font-weight: 900; margin: 10px 0; font-family: monospace; }
        .winrate-box { display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; color: #555; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div style="font-weight: 900; color: var(--royal); font-size: 24px; letter-spacing: 1px;">HERYS ELITE V7.9</div>
    <div style="font-size: 10px; opacity: 0.5; margin-bottom: 20px;">SYSTEME FLEXIBLE (MULTI-HASH)</div>

    <div class="engine-container">
        <div class="glass-card">
            <div id="prob-indicator">🔥 HAUTE PROBABILITÉ 🔥</div>
            <label style="font-size: 10px; color: #666; font-weight: 800;">1. DERNIER SCORE</label>
            <input type="number" id="inputX" class="smart-input" placeholder="Ex: 1.56" step="0.01" style="margin-bottom: 15px;">
            <label style="font-size: 10px; color: #666; font-weight: 800;">2. COLLEZ LE HASH ICI</label>
            <textarea id="smartPaste" class="smart-input" placeholder="Collez ici..." rows="2" oninput="cleanAndShow()"></textarea>
            <button class="btn-main" onclick="analyze()">ANALYSER MAINTENANT</button>
            <div class="winrate-box">
                <div>SESSION : <span id="stat-winrate" style="color:var(--lvl-vert)">0%</span></div>
                <div style="cursor:pointer" onclick="localStorage.clear(); location.reload();">RESET</div>
            </div>
        </div>
        <div class="prediction-display">
            <div style="font-size: 10px; color: #666;">DENSITÉ DU SIGNAL</div>
            <div id="big-prefix" class="prefix-display">--</div>
            <div style="display: flex; justify-content: space-around; border-top: 1px solid #222; padding-top: 15px;">
                <div><div style="font-size: 10px; color: var(--lvl-vert);">SAFE</div><div id="t1" class="timer-val">--:--</div></div>
                <div><div style="font-size: 10px; color: var(--lvl-rose);">RISK</div><div id="t2" class="timer-val">--:--</div></div>
            </div>
        </div>
    </div>

    <script>
        let currentPrediction = null;
        let totalSignals = parseInt(localStorage.getItem('h_total')) || 0;
        let winSignals = parseInt(localStorage.getItem('h_win')) || 0;

        function cleanAndShow() {
            const area = document.getElementById('smartPaste');
            // MODIFICATION ICI : On accepte n'importe quelle longueur de hash (min 2 caractères)
            const match = area.value.match(/[a-fA-F0-9]{2,128}/g);
            if (match) {
                const hash = match[0];
                const prefix = hash.substring(0, 2).toUpperCase();
                const display = document.getElementById('big-prefix');
                display.innerText = prefix;
                if (/[E-F]/.test(prefix[0])) display.style.color = "var(--lvl-vert)";
                else if (/[0-3]/.test(prefix[0])) display.style.color = "var(--danger)";
                else display.style.color = "white";
            }
        }

        function analyze() {
            const valX = parseFloat(document.getElementById('inputX').value);
            const area = document.getElementById('smartPaste');
            const hash = area.value.trim();
            
            // MODIFICATION ICI : On demande seulement 2 caractères minimum
            if (isNaN(valX) || hash.length < 2) {
                alert("Veuillez remplir le score et le hash !");
                return;
            }

            if (currentPrediction) {
                totalSignals++;
                if (valX >= currentPrediction) winSignals++;
                updateWR();
            }

            // Calcul de puissance flexible
            let calcHash = hash.padEnd(8, '0');
            const power = (parseInt(calcHash.substring(0, 8), 16) / 0xffffffff) * 100;
            const isHighProb = (power > 72 && valX < 2.0) || (power > 88);
            
            let targetS = isHighProb ? "1.65" : "1.28";
            let targetR = isHighProb ? "6.00" : "1.90";
            if (valX > 12) { targetS = "1.12"; targetR = "1.25"; }

            currentPrediction = parseFloat(targetS);
            document.getElementById('t1').innerText = targetS + "X";
            document.getElementById('t2').innerText = targetR + "X";
            document.getElementById('prob-indicator').className = isHighProb ? "high-prob" : "";
        }

        function updateWR() {
            document.getElementById('stat-winrate').innerText = Math.round((winSignals/totalSignals)*100) + "%";
            localStorage.setItem('h_total', totalSignals); localStorage.setItem('h_win', winSignals);
        }

        window.onload = () => { if(totalSignals > 0) updateWR(); };
    </script>
</body>
</html>
