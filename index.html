<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herys Ultimate V7.0 - Protégé</title>
    <style>
        /* Écran de verrouillage */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050507;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }
        .lock-box {
            background: #0c0c0f;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #f97316;
            text-align: center;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
        }
        .lock-box h2 { color: #f97316; margin-bottom: 20px; font-family: sans-serif; }
        .lock-box input {
            background: #000; border: 1px solid #333;
            color: #f97316; padding: 15px; border-radius: 10px;
            text-align: center; font-size: 20px; width: 150px; outline: none;
        }
        .lock-box button {
            margin-top: 20px; background: #f97316; color: white;
            border: none; padding: 10px 25px; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }
        /* Cacher le site par défaut */
        #main-content { display: none; }

        /* Ton style d'origine (Simplifié pour l'exemple) */
        body { background-color: #050507; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .brand-name { font-size: 38px; font-weight: 900; letter-spacing: 10px; color: #f97316; text-transform: uppercase; margin: 10px 0 20px 0; text-shadow: 0 0 20px rgba(249, 115, 22, 0.8); }
        .engine-block { background: #0c0c0f; border-radius: 20px; padding: 15px; border: 1px solid #1a1a20; margin-bottom: 10px; width: 100%; max-width: 400px; }
        input.main-input { width: 100%; background: #000; border: 1px solid #222; border-radius: 10px; padding: 12px; color: #f97316; text-align: center; margin-bottom: 10px; }
        .btn-predict { background: linear-gradient(135deg, #f97316, #ea580c); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2>ACCÈS SÉCURISÉ</h2>
            <input type="password" id="passInput" placeholder="CODE">
            <br>
            <button onclick="checkCode()">ENTRER</button>
            <p id="errorMsg" style="color: red; font-size: 10px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="main-content">
        <div class="brand-name">HERYS</div>
        <div class="engine-block">
            <div style="color: #f97316; font-size: 10px; text-align: center; margin-bottom: 10px;">V7.0 ACTIVE</div>
            <input type="text" class="main-input" placeholder="HEURE">
            <input type="text" class="main-input" placeholder="MULTIPLIER">
            <button class="btn-predict">ANALYSER</button>
        </div>
    </div>

    <script>
        function checkCode() {
            const code = document.getElementById('passInput').value;
            // CHANGE LE CODE ICI (actuellement Nandrasana)
            if (code === "Nandrasana") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
            } else {
                document.getElementById('errorMsg').innerText = "CODE INCORRECT";
            }
        }
    </script>
</body>
</html>
