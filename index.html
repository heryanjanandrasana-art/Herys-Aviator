<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS V26 - ULTRA-CONTRASTE</title>
    <style>
        :root { 
            --neon: #00f2ff; --rose: #ff00ff; --vert: #00ff88; --violet: #9d4cff; --orange: #ff9500;
        }
        
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 10px; 
        }

        .container { width: 100%; max-width: 420px; margin: auto; }
        
        .scanner-area { 
            background: #111; 
            border: 3px solid #333; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
        }

        /* POWER CORE EN GRANDE TAILLE */
        #p-val { font-size: 40px; font-weight: 900; color: #fff; margin: 10px 0; text-shadow: 2px 2px #000; }

        /* CHAMPS DE SAISIE ULTRA VISIBLES */
        textarea, input { 
            width: 100%; 
            background: #ffffff !important; /* Fond Blanc */
            border: 4px solid var(--neon); 
            color: #000000 !important; /* Texte Noir */
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            font-size: 22px; 
            font-weight: bold;
            text-align: center;
        }

        .btn-analyze { 
            width: 100%; 
            padding: 20px; 
            background: var(--neon); 
            color: #000; 
            font-size: 20px;
            font-weight: 900; 
            border: none;
            border-radius: 10px;
            text-transform: uppercase;
        }

        /* TIMELINE CONTRASTÉE */
        .timeline-header { 
            margin-top: 25px; 
            background: var(--neon);
            color: #000;
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            border-radius: 5px 5px 0 0;
        }

        .timeline-scroll { 
            height: 300px; 
            overflow-y: auto; 
            background: #0a0a0a; 
            border: 3px solid #333;
            border-radius: 0 0 10px 10px; 
        }

        .time-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 10px; 
            border-bottom: 2px solid #222; 
        }

        .t-round { color: #ffff00; font-weight: bold; width: 60px; } /* Jaune */
        .t-clock { color: #ffffff; font-weight: bold; width: 90px; } /* Blanc */
        .t-signal { font-weight: 900; font-size: 16px; text-align: right; }

        .history-container { display: flex; gap: 10px; margin-top: 20px; overflow-x: auto; padding: 10px 0; flex-direction: row-reverse; }
        .dot { min-width: 55px; height: 35px; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #000; font-weight: 900; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="scanner-area">
        <div id="status-display" style="font-size: 50px;">⚡</div>
        <div style="color: #aaa; font-size: 12px;">SERVER POWER</div>
        <div id="p-val">00000</div>
        
        <textarea id="hashInput" maxlength="4" placeholder="HEX HASH"></textarea>
        <input type="number" id="lastScore" step="0.01" placeholder="SCORE">
        <button class="btn-analyze" onclick="processCore()">DECODE SEQUENCE</button>
    </div>

    <div class="timeline-header">SEQUENCE PREDICTIONS</div>
    <div class="timeline-scroll" id="timeline"></div>

    <div id="history" class="history-container"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('herys_v26_logs')) || [];

    function processCore() {
        let h = document.getElementById('hashInput').value.trim();
        const s = parseFloat(document.getElementById('lastScore').value);
        if(h.length < 4 || isNaN(s)) return;

        const weight = parseInt(h, 16);
        const pVal = document.getElementById('p-val');
        pVal.innerText = weight;
        
        // Couleurs Power
        if (weight > 40000) pVal.style.color = "var(--vert)";
        else if (weight > 20000) pVal.style.color = "var(--orange)";
        else pVal.style.color = "#ff4444";

        document.getElementById('status-display').innerHTML = (s >= 1.5) ? '✅' : '❌';

        const now = new Date();
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = ""; 

        for(let i = 1; i <= 50; i++) {
            let futureWeight = (weight + (i * 1337)) % 65535;
            let futureClock = new Date(now.getTime() + (i * 22) * 1000).toTimeString().split(' ')[0];
            
            let sig = null;
            if (futureWeight > 60000) sig = { n: "VERT 🟢", c: "var(--vert)" };
            else if (futureWeight > 42000) sig = { n: "ROSE 🌸", c: "var(--rose)" };
            else if (futureWeight > 22000) sig = { n: "VIOLET 🟣", c: "var(--violet)" };

            if(sig) {
                timeline.innerHTML += `
                    <div class="time-row">
                        <span class="t-round">R+${i}</span>
                        <span class="t-clock">${futureClock}</span>
                        <span class="t-signal" style="color:${sig.c}">${sig.n}</span>
                    </div>`;
            }
        }

        logs.unshift({ score: s });
        if(logs.length > 15) logs.pop();
        localStorage.setItem('herys_v26_logs', JSON.stringify(logs));
        updateUI();
        
        document.getElementById('lastScore').value = "";
        document.getElementById('hashInput').value = "";
        document.getElementById('hashInput').focus();
    }

    function updateUI() {
        const hist = document.getElementById('history');
        hist.innerHTML = logs.map((entry) => {
            let c = entry.score >= 5 ? "var(--rose)" : (entry.score >= 2 ? "var(--violet)" : "var(--neon)");
            return `<div class="dot" style="background:${c}">${entry.score.toFixed(2)}</div>`;
        }).join('');
    }
    updateUI();
</script>
</body>
</html>
