<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HERYS ALGO-REVERSION V45</title>
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --warn: #ff3366; }
        body { background: #050505; color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; }
        .panel { width: 450px; border: 2px solid var(--neon); border-radius: 15px; padding: 25px; background: #0a0a0a; box-shadow: 0 0 30px rgba(0,255,204,0.15); }
        h2 { text-align: center; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; background: #111; padding: 15px; border-radius: 8px; border-left: 3px solid var(--gold); }
        label { font-size: 0.75em; color: #888; text-transform: uppercase; display: block; margin-bottom: 8px; }
        select, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
        select:focus { border-color: var(--neon); }

        .btn-calc { width: 100%; padding: 15px; background: var(--gold); color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; transition: 0.3s; }
        .btn-calc:hover { background: var(--neon); box-shadow: 0 0 20px var(--neon); }

        #display-logic { margin-top: 25px; padding: 15px; border-radius: 8px; text-align: center; font-size: 0.9em; min-height: 80px; transition: 0.5s; }
        .prob-bar { height: 10px; background: #222; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .prob-fill { height: 100%; background: var(--neon); width: 0%; transition: 1s ease-in-out; }
    </style>
</head>
<body>

<div class="panel">
    <h2>HERYS ALGO V45</h2>

    <div class="input-group">
        <label>1. Dernier Score en Zone C/D (Bas)</label>
        <select id="prev_score">
            <option value="3">Gros Score (3-0, 4-0, 4-1)</option>
            <option value="1" selected>Score Moyen (1-0, 2-1, 2-0)</option>
            <option value="0">Nul ou Défaite</option>
        </select>
    </div>

    <div class="input-group">
        <label>2. Position Match Actuel</label>
        <select id="current_zone">
            <option value="high">Zone A/B (Matchs 1 à 5)</option>
            <option value="low">Zone C/D (Matchs 6 à 10)</option>
        </select>
    </div>

    <div class="input-group">
        <label>3. Type d'Adversaire (Top 10?)</label>
        <select id="opp_rank">
            <option value="strong">Top 10 (Adversaire Fort)</option>
            <option value="weak">Bas de tableau</option>
        </select>
    </div>

    <button class="btn-calc" onclick="runAlgo()">DÉCODER LA SÉQUENCE</button>

    <div id="display-logic" style="border: 1px solid #333;">
        SCANNER EN ATTENTE...
    </div>
    <div class="prob-bar"><div id="p-fill" class="prob-fill"></div></div>
</div>

<script>
function runAlgo() {
    const score = parseInt(document.getElementById('prev_score').value);
    const zone = document.getElementById('current_zone').value;
    const opp = document.getElementById('opp_rank').value;
    const display = document.getElementById('display-logic');
    const fill = document.getElementById('p-fill');

    let proba = 50; // Base neutrale
    let motif = "";

    // LOGIQUE MATHÉMATIQUE BASÉE SUR TES RECHERCHES :
    
    if (score === 3 && zone === 'high') {
        // Cas du Pullback Mean Reversion (70%)
        proba = 43; 
        motif = "<span style='color:var(--warn)'>DANGER : Mean Reversion détecté. Probabilité Under 2.5 élevée (43%). L'algorithme freine le momentum.</span>";
        display.style.borderColor = "var(--warn)";
    } 
    else if (score === 1 && zone === 'high' && opp === 'weak') {
        // Boost lambda home 1.88 + Persistance 0.3
        proba = 72;
        motif = "<span style='color:var(--neon)'>SIGNAL OPTIMAL : Persistance 0.3 active. Équipe stable, forte probabilité de Over 1.5.</span>";
        display.style.borderColor = "var(--neon)";
    }
    else if (score === 0) {
        proba = 30;
        motif = "SÉQUENCE FROIDE : Aucune persistance détectée. Attendre le prochain cycle.";
        display.style.borderColor = "#333";
    }
    else {
        proba = 55;
        motif = "FLUX NEUTRE : Risque modéré. Gestion de bankroll recommandée.";
        display.style.borderColor = var(--gold);
    }

    display.innerHTML = motif;
    fill.style.width = proba + "%";
}
</script>

</body>
</html>
