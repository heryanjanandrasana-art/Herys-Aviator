<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herys Sentinel v46</title>
    <style>
        :root {
            --bg: #0a0a0c; --card: #15151e; --green: #00ff88;
            --red: #ff3e3e; --gold: #ffcc00; --blue: #00d4ff; --text: #e0e0e0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .app-container {
            width: 350px; background: var(--card); border-radius: 24px;
            padding: 20px; border: 1px solid #2d2d3a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 12px; }
        .indicator { display: flex; align-items: center; gap: 6px; font-size: 9px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.4s; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: #1c1c27; padding: 12px; border-radius: 16px; border: 1px solid #2d2d3a; text-align: center; }
        .val { font-size: 24px; font-weight: 900; margin: 2px 0; }
        .sub { font-size: 9px; color: #888; text-transform: uppercase; }

        input { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 12px; font-size: 14px; margin-bottom: 10px;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--blue); }

        /* Bouton avec barre de chargement */
        .btn-wrapper { position: relative; width: 100%; height: 55px; overflow: hidden; border-radius: 14px; margin-top: 5px; }
        .btn-go {
            position: absolute; width: 100%; height: 100%; background: var(--green); color: #000;
            border: none; font-weight: 900; cursor: pointer; text-transform: uppercase;
            z-index: 2; transition: 0.2s;
        }
        #btn-loader {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: rgba(255,255,255,0.3); z-index: 3; pointer-events: none;
        }

        .history { display: flex; gap: 6px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .badge { font-size: 10px; padding: 5px 10px; background: #1c1c27; border-radius: 6px; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-bar">
        <div class="indicator"><div id="danger-dot" class="dot"></div> SÉCURITÉ</div>
        <div class="indicator"><div id="jackpot-dot" class="dot"></div> GOLD POT</div>
    </div>

    <div class="grid">
        <div class="card"><div class="sub">T1 SAFE</div><div id="t1" class="val" style="color:var(--green)">0.00x</div><div id="t1-t" class="sub" style="font-weight:bold; color:#fff">--:--:--</div></div>
        <div class="card"><div class="sub">T2 RISK</div><div id="t2" class="val" style="color:var(--gold)">0.00x</div><div id="t2-t" class="sub" style="font-weight:bold; color:#fff">--:--:--</div></div>
    </div>

    <input type="text" id="hash" placeholder="Hash (8 chars)" maxlength="8" style="text-transform: uppercase;">
    <input type="number" step="0.01" id="multi" placeholder="Dernier Multi (ex: 1.50)" inputmode="decimal">

    <div class="btn-wrapper">
        <button class="btn-go" id="btn" onclick="analyze()">Analyser & Prédire</button>
        <div id="btn-loader"></div>
    </div>

    <div class="history" id="log"></div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('sentinel_data')) || [];
    const ui = {
        t1: document.getElementById('t1'), t2: document.getElementById('t2'),
        t1t: document.getElementById('t1-t'), t2t: document.getElementById('t2-t'),
        danger: document.getElementById('danger-dot'), jackpot: document.getElementById('jackpot-dot'),
        log: document.getElementById('log'), inHash: document.getElementById('hash'),
        inMulti: document.getElementById('multi'), btn: document.getElementById('btn'),
        loader: document.getElementById('btn-loader')
    };

    function playBeep(isHigh) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = isHigh ? 850 : 450;
            g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    async function analyze() {
        const val = parseFloat(ui.inMulti.value);
        if(isNaN(val)) return;

        // Animation de la barre sur le bouton
        ui.btn.innerText = "Calcul IA...";
        ui.btn.disabled = true;
        ui.loader.style.width = "0%";
        ui.loader.style.transition = "width 0.8s linear";
        setTimeout(() => ui.loader.style.width = "100%", 10);

        logs.unshift(val); if(logs.length > 10) logs.pop();
        localStorage.setItem('sentinel_data', JSON.stringify(logs));

        await new Promise(r => setTimeout(r, 800));

        // Logique Sentinel
        const isDanger = (val < 1.35 || (logs.length > 1 && logs[1] < 1.6));
        let t1 = isDanger ? 1.15 : (val * 0.95);
        let t2 = isDanger ? 1.45 : (val * 1.75);

        const now = new Date();
        const fmt = (d) => d.toTimeString().split(' ')[0];
        const timeT1 = new Date(now.getTime() + (Math.round(t1 * 1.5) * 1000));
        const timeT2 = new Date(now.getTime() + (Math.round(t2 * 2.5) * 1000));

        ui.t1.innerText = Math.max(1.10, t1).toFixed(2) + "x";
        ui.t2.innerText = Math.max(t1 * 1.3, t2).toFixed(2) + "x";
        ui.t1t.innerText = fmt(timeT1);
        ui.t2t.innerText = fmt(timeT2);
        
        ui.danger.style.background = isDanger ? "var(--red)" : "var(--green)";
        ui.danger.style.boxShadow = isDanger ? "0 0 12px var(--red)" : "none";

        const hashText = ui.inHash.value || "0";
        const isJackpot = hashText.length >= 4 && (hashText.charCodeAt(0) % 6 === 0);
        ui.jackpot.style.background = isJackpot ? "var(--gold)" : "#333";

        playBeep(!isDanger);
        
        // Reset bouton
        ui.btn.innerText = "Analyser & Prédire";
        ui.btn.disabled = false;
        ui.loader.style.transition = "none";
        ui.loader.style.width = "0%";
        
        ui.inMulti.value = ""; 
        renderLogs();
    }

    function renderLogs() {
        ui.log.innerHTML = '';
        logs.forEach(l => {
            const c = l < 2 ? 'var(--red)' : 'var(--green)';
            ui.log.innerHTML += `<div class="badge" onclick="ui.inMulti.value='${l}';ui.inMulti.focus();" style="border-bottom: 2px solid ${c}">${l.toFixed(2)}x</div>`;
        });
    }

    ui.inMulti.onclick = function() { this.select(); };
    ui.inHash.onclick = function() { this.select(); };

    renderLogs();
</script>

</body>
</html>
