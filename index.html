<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERYS HYBRID v6.0 - Madagascar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --accent: #22c55e;
            --text: #ffffff;
            --border: #333333;
            --pink: #e91e63;
            --purple: #9b59b6;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--accent); letter-spacing: 4px; margin: 0; font-size: 22px; text-shadow: 0 0 10px rgba(34,197,94,0.3); }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .prediction-box { display: flex; justify-content: space-around; font-size: 26px; font-weight: 800; margin: 15px 0; font-family: monospace; }
        
        input {
            width: 100%; box-sizing: border-box; padding: 18px; border-radius: 12px;
            border: 1px solid var(--border); background: #000; color: #fff;
            font-size: 20px; text-align: center; margin-bottom: 15px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--accent); color: #000; font-weight: bold;
            font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        .glow-pink { border-color: var(--pink); box-shadow: 0 0 20px rgba(233, 30, 99, 0.2); }
        .glow-purple { border-color: var(--purple); box-shadow: 0 0 20px rgba(155, 89, 182, 0.2); }
        .glow-green { border-color: var(--accent); box-shadow: 0 0 25px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>HERYS HYBRID v6.0</h1>
        <small style="color: #555;">ALGORITHM ENGINE B</small>
    </div>

    <div class="card">
        <div id="safeMsg" style="font-size: 13px; margin-bottom: 12px; color: #777;">SYSTÈME PRÊT</div>
        <input type="number" id="inputValue" step="0.01" placeholder="DERNIER MULTIPLICATEUR">
        <button class="btn-main" onclick="startAnalysis()">GÉNÉRER SIGNAL</button>
    </div>

    <div class="card" id="cardResult">
        <div style="font-size: 11px; color: #555; text-transform: uppercase;">Heures estimées</div>
        <div class="prediction-box">
            <span id="res1">--:--:--</span>
            <span id="res2">--:--:--</span>
        </div>
        <div id="typeLabel" style="font-weight: bold; font-size: 18px;">---</div>
    </div>
</div>

<script>
// Chargement des sons
const soundNormal = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
const soundSpecial = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

function startAnalysis() {
    const x = parseFloat(document.getElementById('inputValue').value);
    const safeMsg = document.getElementById('safeMsg');
    const r1 = document.getElementById('res1');
    const r2 = document.getElementById('res2');
    const card2 = document.getElementById('cardResult');
    const stat2 = document.getElementById('typeLabel');

    if (isNaN(x)) return;

    let min1, sec1, min2, sec2;
    let now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();

    // Reset des classes
    card2.className = "card";

    // LOGIQUE ENGINE B
    if (x <= 1.05) {
        soundSpecial.play(); // Son plus fort pour le VERT
        min1 = 3; sec1 = 10; min2 = 6; sec2 = 40; 
        safeMsg.innerText = "💎 SIGNAL VERT DÉTECTÉ"; safeMsg.style.color = "#22c55e";
        card2.classList.add('glow-green');
        stat2.innerText = "VERT 🔋"; stat2.style.color = "#22c55e";
    } else {
        soundNormal.play(); // Son standard
        if (x < 2) {
            min1 = 2; sec1 = 15; min2 = 4; sec2 = 50;
            safeMsg.innerText = "✅ CYCLE FLUIDE"; safeMsg.style.color = "#22c55e";
            card2.classList.add('glow-pink');
            stat2.innerText = "ROSE 🌸"; stat2.style.color = "#e91e63";
        } else {
            min1 = 4; sec1 = 05; min2 = 8; sec2 = 20;
            safeMsg.innerText = "⚠️ ZONE DE PRUDENCE"; safeMsg.style.color = "#e91e63";
            card2.classList.add('glow-purple');
            stat2.innerText = "VIOLET 💜"; stat2.style.color = "#9b59b6";
        }
    }

    function calc(mAdd, sBase) {
        let s = Math.floor(Math.random() * 20) + sBase;
        let nm = m + mAdd; let nh = h;
        if(s >= 60) { s -= 60; nm += 1; }
        if(nm >= 60) { nm -= 60; nh += 1; }
        const pad = (n) => n < 10 ? '0'+n : n;
        return pad(nh)+":"+pad(nm)+":"+pad(s);
    }

    r1.innerText = calc(min1, sec1);
    r2.innerText = calc(min2, sec2);
}
</script>
</body>
</html>
