<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Engine - Madagascar Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --green: #22c55e;
            --pink: #ec4899;
            --purple: #a855f7;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .glow-green { border: 2px solid var(--green); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .glow-pink { border: 2px solid var(--pink); box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }
        .glow-purple { border: 2px solid var(--purple); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        
        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            background: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background: var(--green);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .stats { display: flex; justify-content: space-around; width: 100%; margin-top: 10px; font-size: 14px; }
        .history { display: flex; overflow-x: auto; gap: 5px; padding: 10px; width: 100%; max-width: 400px; }
        .token { padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap; }
        .t-blue { background: #3b82f6; } .t-purple { background: var(--purple); } .t-pink { background: var(--pink); }
    </style>
</head>
<body>

    <div class="card" id="cardMain">
        <h2>Hybrid Engine</h2>
        <div class="stats">
            <div>Win Rate: <span id="winRate">0%</span></div>
            <div>Time: <span id="liveClock">00:00:00</span></div>
        </div>
        <canvas id="myChart" style="height:100px; width:100%; margin-top:10px;"></canvas>
    </div>

    <div class="card" id="card2">
        <h3 id="type2">EN ATTENTE...</h3>
        <div style="display:flex; justify-content: space-around; font-size: 20px; font-weight: bold;">
            <div id="time1">--:--:--</div>
            <div id="time2">--:--:--</div>
        </div>
    </div>

    <div class="card">
        <input type="number" id="lastX" step="0.01" placeholder="Dernier multiplicateur...">
        <button onclick="processHybrid()">ANALYSER</button>
        <br>
        <button onclick="testSignal()" style="margin-top:15px; background:transparent; border:1px solid #555; color:#888; font-size:11px;">🔊 TESTER L'ALERTE</button>
    </div>

    <div class="history" id="sessionHistory"></div>
