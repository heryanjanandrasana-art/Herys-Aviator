<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ELITE V29 - ULTIMATE HYBRIDE</title>
    <style>
        :root { 
            --premium-v: #8e44ff; --neon-b: #00d2ff; --vif-g: #00ff88; --hot-p: #ff00ff; --gold: #FFD700;
            --bg: #000; --card: #121212; --border: #222;
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* JOURNAL DE BORD RÉTRACTABLE (HAUT) */
        .journal-card { 
            background: #0b0b0b; border: 1px solid var(--border); border-radius: 0 0 15px 15px; 
            padding: 10px; position: fixed; top: 0; left: 10px; right: 10px; 
            transition: transform 0.4s ease; z-index: 101; text-align: center;
        }
        .journal-card.hidden { transform: translateY(-80%); }
        .journal-stats { display: flex; justify-content: space-around; margin-top: 10px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: 900; color: var(--vif-g); }
        .toggle-jr { 
            background: #1a1a1a; color: #666; border: 1px solid var(--border); padding: 2px 12px; 
            border-radius: 0 0 8px 8px; font-size: 9px; font-weight: bold;
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
        }

        /* ESPACE POUR LE JOURNAL */
        .spacer-top { height: 35px; }

        .img-card { background: #0b0b0b; border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px; margin-bottom: 6px; text-align: center; }
        
        .bar-chart { height: 30px; display: flex; align-items: flex-end; justify-content: space-around; background: #080808; border-radius: 8px; padding: 4px; margin-bottom: 5px; }
        .bar { width: 8px; border-radius: 2px; transition: height 0.4s; background: #222; }

        .hybrid-box { display: flex; justify-content: space-around; align-items: center; margin: 8px 0; }
        .t-val { font-size: 26px; font-weight: 900; }
        .conf-circle { width: 65px; height: 65px; border: 4px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; transition: all 0.3s; background: #000; }
        .strong-signal { border-color: var(--gold) !important; color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .seq-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .seq-box { background: #1a1a1a; padding: 6px; border-radius: 6px; font-size: 9px; border: 1px solid #222; }
        .seq-val { font-weight: 900; display: block; margin-top: 2px; font-size: 11px; }

        /* CLAVIER RÉTRACTABLE (BAS) */
        .input-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 0 0; 
            padding: 15px; position: fixed; bottom: 0; left: 0; right: 0; 
            transition: transform 0.4s ease; z-index: 100;
        }
        .input-card.hidden { transform: translateY(82%); }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-box { flex: 1; background: #fff; color: #000; padding: 12px; border-radius: 8px; font-weight: 900; text-align: center; border: 3px solid transparent; font-size: 16px; }
        .active { border-color: var(--premium-v); }
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .k { background: #1a1a1a; color: #fff; border: 1px solid #2a2a2a; padding: 14px 0; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .k-go { background: var(--premium-v); color: #fff; grid-column: span 2; font-weight: 900; text-transform: uppercase; font-size: 13px; }
        .toggle-kb { background: var(--premium-v); color: white; border: none; padding: 5px 15px; border-radius: 20px 20px 0 0; font-size: 11px; font-weight: bold; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); }

        .hist { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; flex-direction: row-reverse; height: 35px; }
        .dot { min-width: 42px; height: 20px; font-size: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div class="journal-card hidden" id="jr-card">
        <div style="font-size:9px; font-weight:900; color:#666; letter-spacing:1px;">SESSION TRACKER PRO</div>
        <div class="journal-stats">
            <div class="stat-item"><div class="stat-label">Scans</div><div class="stat-val" id="st-scans">0</div></div>
            <div class="stat-item"><div class="stat-label">Winrate</div><div class="stat-val" id="st-rate">0%</div></div>
            <div class="stat-item"><div class="stat-label">Précision</div><div class="stat-val" style="color:var(--premium-v)" id="st-acc">0.0</div></div>
        </div>
        <button class="toggle-jr" onclick="toggleJR()">📊 JOURNAL</button>
    </div>

    <div class="spacer-top"></div>

    <div class="img-card">
        <div class="bar-chart" id="chart"></div>
        <div id="flux-txt" style="font-size:10px; font-weight:900; color:var(--vif-g);">💎 FLUX : SESSION ANALYSÉE</div>
    </div>

    <div class="img-card">
        <div class="hybrid-box">
            <div class="target-group">
                <div style="font-size:9px; color:var(--vif-g); font-weight:900;">SAFE T1</div>
                <div class="t-val" id="t1-val">--</div>
            </div>
            <div class="conf-circle" id="conf-circle">--</div>
            <div class="target-group">
                <div style="font-size:9px; color:var(--hot-p); font-weight:900;">RISK T2</div>
                <div class="t-val" id="t2-val">--</div>
            </div>
        </div>
        <div id="trend-txt" style="font-size:10px; color:#666; font-weight:bold;">ATTENTE DE DONNÉES...</div>
    </div>

    <div class="img-card">
        <div style="font-size:9px; color:#666; margin-bottom:8px; font-weight:bold;">SÉQUENCE NEXT 5</div>
        <div class="seq-container" id="seq-list">
            <div class="seq-box">R+1 <span class="seq-val">--</span></div>
            <div class="seq-box">R+2 <span class="seq-val">--</span></div>
            <div class="seq-box">R+3 <span class="seq-val">--</span></div>
            <div class="seq-box">R+4 <span class="seq-val">--</span></div>
            <div class="seq-box">R+5 <span class="seq-val">--</span></div>
        </div>
    </div>

    <div class="input-card" id="main-kb">
        <button class="toggle-kb" onclick="toggleKB()">⌨️ CLAVIER</button>
        <div class="input-group">
            <div id="bH" class="input-box active" onclick="openAndSwitch('h')">HASH</div>
            <div id="bS" class="input-box" onclick="openAndSwitch('s')">SCORE</div>
        </div>
        <div class="kb">
            <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k" onclick="p('A')">A</button>
            <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k" onclick="p('B')">B</button>
            <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k" onclick="p('C')">C</button>
            <button class="k" onclick="p('0')">0</button><button class="k" onclick="p('.')">.</button><button class="k" style="color:red" onclick="p('D')">⌫</button>
            <button class="k-go" onclick="run()">SCANNER LE SIGNAL</button>
        </div>
        <div id="ht" class="hist"></div>
    </div>

<script>
    let logs = JSON.parse(localStorage.getItem('h_u_v29')) || [];
    let session = { scans: 0, wins: 0, lastPred: 0 };
    let cur = 'h', vH = "", vS = "";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(f, d) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.value = 0.05;
        o.start(); setTimeout(() => o.stop(), d);
    }

    function toggleJR() { document.getElementById('jr-card').classList.toggle('hidden'); }
    function toggleKB() { document.getElementById('main-kb').classList.toggle('hidden'); }
    function openAndSwitch(m) { document.getElementById('main-kb').classList.remove('hidden'); sF(m); }
    function sF(m) { cur = m; document.getElementById('bH').classList.toggle('active', m==='h'); document.getElementById('bS').classList.toggle('active', m==='s'); }
    
    function p(v) {
        if(v === 'D') { if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1); }
        else { if(cur === 'h' && vH.length < 4) { vH += v; if(vH.length === 4) sF('s'); } else if(cur === 's') vS += v; }
        document.getElementById('bH').innerText = vH || "HASH"; document.getElementById('bS').innerText = vS || "SCORE";
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        const w = parseInt(vH, 16);
        const score = parseFloat(vS);
        
        // Vérification de la précision de la prédiction précédente
        if(session.lastPred > 0) {
            session.scans++;
            if(score >= session.lastPred) session.wins++;
            updateStats();
        }

        // --- CALCULS HYBRIDES ---
        const lastScore = logs[0] || 2.0;
        let safety = lastScore < 1.3 ? 0.9 : 1.0;
        const safe = ( (1.20 + (w/65535) * 1.5) * safety ).toFixed(2);
        const risk = ( (97 / (100 - (w/65535)*96)) * safety ).toFixed(2);
        
        session.lastPred = parseFloat(safe); // On enregistre la prédiction pour le prochain tour

        document.getElementById('t1-val').innerText = safe + "X";
        document.getElementById('t2-val').innerText = risk + "X";
        
        let conf = Math.floor(65 + (w/65535)*30);
        const circle = document.getElementById('conf-circle');
        circle.innerText = conf + "%";
        
        if(conf >= 95) {
            circle.classList.add('strong-signal');
            document.getElementById('trend-txt').innerText = "⚡ SIGNAL 100% (ÉLITE)";
            document.getElementById('trend-txt').style.color = "var(--gold)";
            playBeep(900, 100); setTimeout(() => playBeep(1200, 150), 150);
        } else {
            circle.classList.remove('strong-signal');
            document.getElementById('trend-txt').innerText = "ANALYSE STABLE";
            document.getElementById('trend-txt').style.color = "#666";
        }

        // Séquence
        const seqList = document.getElementById('seq-list');
        seqList.innerHTML = "";
        for(let i=1; i<=5; i++) {
            let val = (1.1 + (Math.abs(Math.sin(w + i + score)) * 8)).toFixed(2);
            let col = val > 4 ? "var(--hot-p)" : val > 2 ? "var(--premium-v)" : "var(--neon-b)";
            seqList.innerHTML += `<div class="seq-box">R+${i} <span class="seq-val" style="color:${col}">${val}X</span></div>`;
        }

        document.getElementById('main-kb').classList.add('hidden');
        logs.unshift(score); if(logs.length > 10) logs.pop();
        localStorage.setItem('h_u_v29', JSON.stringify(logs));
        vH = ""; vS = ""; uUI(); sF('h');
        if(window.navigator.vibrate) window.navigator.vibrate(50);
    }

    function updateStats() {
        document.getElementById('st-scans').innerText = session.scans;
        const rate = session.scans > 0 ? Math.floor((session.wins / session.scans) * 100) : 0;
        document.getElementById('st-rate').innerText = rate + "%";
        document.getElementById('st-acc').innerText = logs[0] ? logs[0].toFixed(1) : "0.0";
    }

    function uUI() {
        document.getElementById('ht').innerHTML = logs.map(e => {
            let c = e >= 5 ? "var(--hot-p)" : (e >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            return `<div class="dot" style="background:${c}">${e.toFixed(1)}</div>`;
        }).join('');
    }

    const chart = document.getElementById('chart');
    for(let i=0; i<15; i++) chart.innerHTML += `<div class="bar" style="height:20%"></div>`;
    uUI();
</script>
</body>
</html>
