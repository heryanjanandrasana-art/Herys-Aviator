<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>HERYS ULTIMATE ELITE V29</title>
    <style>
        :root { 
            --premium-v: #8e44ff; --neon-b: #00d2ff; --vif-g: #00ff88; --hot-p: #ff00ff;
            --bg: #050505; --card: #121212; --border: #222;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* HEADER STYLE IMAGE 3 */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; margin-bottom: 6px; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        #p-val { font-size: 26px; font-weight: 900; color: var(--premium-v); text-shadow: 0 0 15px rgba(142,68,255,0.5); }

        /* ANALYSEUR DE FLUX (GRAPHIQUE) */
        .flux-container { display: flex; align-items: flex-end; gap: 4px; height: 40px; margin: 10px 0; justify-content: center; }
        .bar { width: 8px; border-radius: 2px; background: #222; transition: height 0.3s; }

        /* INPUTS */
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        .box { 
            flex: 1; background: #fff; color: #000; padding: 12px; border-radius: 8px; 
            font-weight: 900; font-size: 16px; text-align: center; border: 3px solid transparent;
        }
        .active { border-color: var(--premium-v); box-shadow: 0 0 12px rgba(142,68,255,0.4); }

        /* TIMELINE & OBJECTIFS */
        .scroll-area { flex-grow: 1; overflow-y: auto; background: #080808; border: 1px solid #1a1a1a; border-radius: 12px; margin: 5px 0; }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #151515; font-size: 13px; }
        .target-box { display: flex; gap: 5px; margin-bottom: 5px; }
        .target { flex: 1; background: #1a1a1a; padding: 8px; border-radius: 8px; text-align: center; border-bottom: 2px solid #333; }

        /* CLAVIER TACTIQUE MINI */
        .kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: var(--card); padding: 8px; border-radius: 16px; border: 1px solid var(--border); }
        .k { background: #222; color: #fff; border: 1px solid #333; padding: 12px 0; border-radius: 8px; font-size: 15px; font-weight: bold; }
        .k:active { background: var(--premium-v); transform: scale(0.95); }
        .k-go { background: var(--premium-v); color: #fff; grid-column: span 2; font-weight: 900; }

        .hist { display: flex; gap: 5px; overflow-x: auto; padding: 5px; flex-direction: row-reverse; height: 25px; }
        .dot { min-width: 40px; height: 20px; font-size: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div class="card">
        <div class="flex-row">
            <span class="label">Scanner Status: <span style="color:var(--vif-g)">Online</span></span>
            <span class="label">V29 Ultimate</span>
        </div>
        <div style="text-align:center; margin: 5px 0;">
            <div class="label">Server Energy</div>
            <div id="p-val">00000</div>
        </div>
        
        <div class="flux-container" id="flux">
            <div class="bar" style="height:20%"></div><div class="bar" style="height:40%"></div><div class="bar" style="height:15%"></div><div class="bar" style="height:80%"></div><div class="bar" style="height:30%"></div><div class="bar" style="height:60%"></div><div class="bar" style="height:90%"></div>
        </div>

        <div class="input-group">
            <div id="bH" class="box active" onclick="sF('h')">HASH</div>
            <div id="bS" class="box" onclick="sF('s')">SCORE</div>
        </div>
    </div>

    <div class="target-box">
        <div class="target"><div class="label" style="color:var(--vif-g)">Objectif Safe</div><div id="t1" style="font-weight:900">--</div></div>
        <div class="target"><div class="label" style="color:var(--hot-p)">Objectif Risk</div><div id="t2" style="font-weight:900">--</div></div>
    </div>

    <div class="scroll-area" id="tl"></div>

    <div class="kb">
        <button class="k" onclick="p('1')">1</button><button class="k" onclick="p('2')">2</button><button class="k" onclick="p('3')">3</button><button class="k" onclick="p('A')">A</button>
        <button class="k" onclick="p('4')">4</button><button class="k" onclick="p('5')">5</button><button class="k" onclick="p('6')">6</button><button class="k" onclick="p('B')">B</button>
        <button class="k" onclick="p('7')">7</button><button class="k" onclick="p('8')">8</button><button class="k" onclick="p('9')">9</button><button class="k" onclick="p('C')">C</button>
        <button class="k" onclick="p('0')">0</button><button class="k" onclick="p('.')">.</button><button class="k" style="color:red" onclick="p('D')">⌫</button><button class="k-go" onclick="run()">SCANNER SEQUENCE</button>
    </div>

    <div id="ht" class="hist"></div>

<script>
    let logs = JSON.parse(localStorage.getItem('h_u_v29')) || [];
    let cur = 'h'; let vH = ""; let vS = "";

    function sF(m) { cur = m; document.getElementById('bH').classList.toggle('active', m==='h'); document.getElementById('bS').classList.toggle('active', m==='s'); }

    function p(v) {
        if(v === 'D') { if(cur === 'h') vH = vH.slice(0,-1); else vS = vS.slice(0,-1); }
        else { if(cur === 'h' && vH.length < 4) { vH += v; if(vH.length === 4) sF('s'); } else if(cur === 's') vS += v; }
        document.getElementById('bH').innerText = vH || "HASH"; document.getElementById('bS').innerText = vS || "SCORE";
    }

    function run() {
        if(vH.length < 4 || vS === "") return;
        const w = parseInt(vH, 16); const s = parseFloat(vS);
        
        // Power & Feedback
        document.getElementById('p-val').innerText = w;
        if(window.navigator.vibrate) window.navigator.vibrate(w > 40000 ? [100,50,100] : 50);

        // Objectifs Brillants
        document.getElementById('t1').innerText = (1.5 + (w/65535)*2).toFixed(2) + "X";
        document.getElementById('t2').innerText = (5 + (w/65535)*50).toFixed(2) + "X";

        // Flux Animation
        const bars = document.querySelectorAll('.bar');
        bars.forEach(b => b.style.height = Math.random()*100 + "%");

        // Timeline
        const tl = document.getElementById('tl'); tl.innerHTML = "";
        const now = new Date();
        for(let i=1; i<=15; i++) {
            let fW = (w + (i*1337)) % 65535;
            let fC = new Date(now.getTime() + (i*22)*1000).toTimeString().split(' ')[0];
            let sig = fW > 60000 ? ["VERT 🟢","var(--vif-g)"] : fW > 42000 ? ["ROSE 🌸","var(--hot-p)"] : fW > 22000 ? ["VIOLET 🟣","var(--premium-v)"] : null;
            if(sig) tl.innerHTML += `<div class="row"><span style="color:#ff0">R+${i}</span><span style="color:#888">${fC}</span><span style="font-weight:900;color:${sig[1]}">${sig[0]}</span></div>`;
        }

        logs.unshift(s); if(logs.length > 10) logs.pop();
        localStorage.setItem('h_u_v29', JSON.stringify(logs));
        vH = ""; vS = ""; document.getElementById('bH').innerText = "HASH"; document.getElementById('bS').innerText = "SCORE";
        sF('h'); uUI();
    }

    function uUI() {
        document.getElementById('ht').innerHTML = logs.map(e => {
            let c = e >= 5 ? "var(--hot-p)" : (e >= 2 ? "var(--premium-v)" : "var(--neon-b)");
            return `<div class="dot" style="background:${c}">${e.toFixed(1)}</div>`;
        }).join('');
    }
    uUI();
</script>
</body>
</html>
